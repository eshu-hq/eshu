name: Benchmarks

# B-1 (#3794): run the Go micro-benchmark suite on every PR and upload the
# results as an artifact so per-function ns/op / B/op / allocs/op are visible
# per change.
#
# B-2 (#3795): the bench-regression job compares the current run against the
# committed testdata/benchmarks/baseline.txt with benchstat and reports sec/op regressions
# > 10%. It is advisory until the baseline is recaptured on this runner class by
# the weekly bench-baseline-refresh workflow (a committed baseline from a
# different machine is not a valid benchstat comparison); flip it to blocking via
# BENCH_REGRESSION_ENFORCE=true once the baseline is CI-refreshed.
#
# The run is hermetic: backend-bound benchmarks self-skip without a DSN and the
# graph-write benchmarks use in-process no-op executors, so no Postgres/NornicDB
# service is needed.

on:
  pull_request:
    # Path-filtered (#4218): benchmarks only need to run when Go code or the
    # benchmark harness changes. main runs unconditionally below as the backstop.
    paths:
      - "go/**"
      - "scripts/run-go-benchmarks.sh"
      - "scripts/verify-bench-regression.sh"
      - "scripts/refresh-bench-baseline.sh"
      - "scripts/ci/install-apt-packages.sh"
      - "testdata/benchmarks/**"
      - ".github/workflows/bench.yml"
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test-mirror:
    name: bench script contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install ripgrep
        run: scripts/ci/install-apt-packages.sh ripgrep

      - name: Run bench script contract mirror
        run: scripts/test-run-go-benchmarks.sh

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run bench regression contract mirror
        run: scripts/test-verify-bench-regression.sh

      - name: Run reducer perf gate contract mirror
        run: scripts/test-verify-reducer-perf-gate.sh

  benchmarks:
    name: go benchmarks
    needs: test-mirror
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install ripgrep
        run: scripts/ci/install-apt-packages.sh ripgrep

      - name: Run Go benchmarks (credential-free, no regression gate)
        env:
          BENCH_OUTPUT: ${{ github.workspace }}/bench-results.txt
          # Stable signal without an unbounded CI run. B-2 (#3795) pins the
          # benchtime/count used for the gated baseline comparison.
          BENCH_TIME: 200ms
          BENCH_COUNT: 1
        run: scripts/run-go-benchmarks.sh

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-benchmark-results
          path: bench-results.txt
          if-no-files-found: error

  bench-regression:
    name: bench regression (benchstat vs baseline)
    needs: test-mirror
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install ripgrep
        run: scripts/ci/install-apt-packages.sh ripgrep

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Compare current benchmarks against committed baseline
        env:
          # Advisory comparison only: keep this runner-bounded sample in lockstep
          # with scripts/refresh-bench-baseline.sh so baseline refresh and PR/current
          # generation have the same shape without exceeding CI budget.
          BENCH_TIME: 100ms
          BENCH_COUNT: 1
          BENCH_REGRESSION_PCT: 10
          BENCH_ALPHA: 0.05
          # Advisory until the baseline is recaptured on this runner class by the
          # weekly bench-baseline-refresh workflow; then set to true to block.
          BENCH_REGRESSION_ENFORCE: false
        run: scripts/verify-bench-regression.sh

      - name: Upload current benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-benchmark-current
          path: testdata/benchmarks/current.txt
          if-no-files-found: ignore

  reducer-perf-gate:
    # B-9 (#3802): per-materialization-handler latency gate. Asserts each
    # credential-free reducer handler benchmark stays under its absolute ns/op
    # ceiling (testdata/benchmarks/reducer-handler-budgets.txt). Complementary to
    # the benchstat-relative bench-regression job above; this one answers the
    # #3802 acceptance "CI asserts main meets per-handler budgets" directly and
    # holds regardless of the Epic D file/monorepo split.
    name: reducer per-handler latency gate
    needs: test-mirror
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install ripgrep
        run: scripts/ci/install-apt-packages.sh ripgrep

      - name: Assert reducer handlers within per-handler latency budgets
        env:
          # Same count/benchtime the budgets were captured with so the median
          # comparison is like-for-like. Keep in lockstep with
          # scripts/refresh-reducer-handler-budgets.sh.
          REDUCER_PERF_BENCHTIME: 100ms
          REDUCER_PERF_COUNT: 6
          # Advisory until the budget baseline is recaptured on this runner class
          # (it was captured on darwin/arm64); then set to true to block. Refresh
          # with scripts/refresh-reducer-handler-budgets.sh on ubuntu-latest.
          REDUCER_PERF_ENFORCE: false
        run: scripts/verify-reducer-perf-gate.sh
