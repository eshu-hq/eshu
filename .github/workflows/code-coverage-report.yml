name: Code Coverage Report

# Advisory Go code-coverage reporting for #4227. This is ordinary executable
# test coverage and intentionally does not replace replay, golden-corpus, or
# full-corpus proof. The workflow uploads current PR artifacts; the committed
# docs report is the public baseline and README badge source.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  static-mirror:
    name: static mirror
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Install tools
        run: scripts/ci/install-apt-packages.sh jq ripgrep
      - name: Validate coverage report contract
        run: bash scripts/test-generate-code-coverage-report.sh

  coverage-report:
    name: Generate Go code coverage report
    # Advisory report only — it does not gate correctness (see the header). The
    # ~15-18m full-coverage run is intentionally OFF the PR path: it caught no
    # code defects there, it only refreshed the badge/baseline. That refresh
    # happens post-merge on the push-to-main lane below (every merge updates the
    # committed docs report + README shield) and on manual dispatch. The cheap
    # static-mirror contract check above still runs on every PR, so a change to
    # the generator script is still validated pre-merge.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: static-mirror
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - name: Generate advisory Go coverage report
        env:
          ESHU_CODE_COVERAGE_PROFILE_OUT: ${{ github.workspace }}/go-code-coverage.out
          ESHU_CODE_COVERAGE_REPORT_OUT: code-coverage.md
          ESHU_CODE_COVERAGE_SHIELD_OUT: code-coverage-shield.json
        run: bash scripts/generate-code-coverage-report.sh
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: |
            go-code-coverage.out
            code-coverage.md
            code-coverage-shield.json
          if-no-files-found: error
