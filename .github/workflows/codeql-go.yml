name: CodeQL Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 9 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze-go:
    name: Analyze Go
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: manual

      - name: Build Go module
        working-directory: go
        run: |
          # The full module build is covered by the normal build workflow.
          # CodeQL traces this representative shipped runtime set to keep
          # generated collector packages from exhausting the PR scanner.
          go build \
            ./cmd/eshu \
            ./cmd/api \
            ./cmd/mcp-server \
            ./cmd/ingester \
            ./cmd/reducer \
            ./cmd/bootstrap-index \
            ./cmd/bootstrap-data-plane \
            ./cmd/workflow-coordinator \
            ./cmd/scanner-worker

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"
