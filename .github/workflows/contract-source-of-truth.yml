name: Contract Source of Truth

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test-generate:
    name: Verify contract test mirror
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run test mirror
        run: scripts/test-verify-contracttest.sh

      - name: Run fact-kind registry test mirror
        run: scripts/test-verify-fact-kind-registry.sh

  generate:
    name: Verify contract source-of-truth gate
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: test-generate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Generate contract data
        shell: bash
        run: |
          set -o pipefail
          scripts/generate-contracttest.sh 2>&1 | tee /tmp/contracttest.log
          scripts/generate-fact-kind-registry.sh 2>&1 | tee /tmp/fact-kind-registry.log

      - name: Check for uncommitted drift
        shell: bash
        run: |
          set -o pipefail
          if ! git diff --exit-code -- \
            go/internal/collector/contracttest/contract_data.go \
            go/internal/facts/fact_kind_registry.generated.go \
            go/internal/facts/FACT_KIND_REGISTRIES.md; then
            {
              printf 'contract-source-of-truth: generated contract artifacts drifted from their YAML specs.\n'
              printf 'Re-run: scripts/generate-contracttest.sh && scripts/generate-fact-kind-registry.sh\n'
              printf '\nDiff:\n'
              git diff -- \
                go/internal/collector/contracttest/contract_data.go \
                go/internal/facts/fact_kind_registry.generated.go \
                go/internal/facts/FACT_KIND_REGISTRIES.md
            } >&2
            exit 1
          fi

      - name: Upload drift report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: contracttest-drift-report
          path: |
            /tmp/contracttest.log
            /tmp/fact-kind-registry.log
          if-no-files-found: warn
