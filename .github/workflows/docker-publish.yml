name: Publish Image and Helm Chart

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - Dockerfile
      - .dockerignore
      - go/**
      - deploy/helm/**
      - .github/workflows/docker-publish.yml
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - go/**
      - deploy/helm/**
      - .github/workflows/docker-publish.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CHART_PATH: deploy/helm/eshu
  CHART_REGISTRY: oci://ghcr.io/${{ github.repository_owner }}/charts
  IMAGE_PLATFORMS: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      image: ${{ steps.filter.outputs.image }}
      chart: ${{ steps.filter.outputs.chart }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Decide release artifact lanes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            {
              echo "image=true"
              echo "chart=true"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${GITHUB_SHA}"
            if [[ "${base_sha}" =~ ^0+$ ]]; then
              base_sha="$(git rev-parse "${head_sha}^")"
            fi
          fi

          image=false
          chart=false
          while IFS= read -r path; do
            case "${path}" in
              Dockerfile|.dockerignore|go/*)
                image=true
                ;;
              deploy/helm/*)
                chart=true
                ;;
              .github/workflows/docker-publish.yml)
                image=true
                chart=true
                ;;
            esac
          done < <(git diff --name-only "${base_sha}" "${head_sha}")

          {
            echo "image=${image}"
            echo "chart=${chart}"
          } >> "${GITHUB_OUTPUT}"

  build-and-push-image:
    needs: changes
    if: needs.changes.outputs.image == 'true'
    timeout-minutes: 45
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Compute source date epoch
        id: epoch
        run: echo "epoch=$(git log -1 --format=%ct)" >> "$GITHUB_OUTPUT"

      - name: Pin deterministic labels
        id: labels
        run: |
          CREATED="$(date -u -d "@${{ steps.epoch.outputs.epoch }}" '+%Y-%m-%dT%H:%M:%SZ')"
          printf '%s\n' '${{ steps.meta.outputs.labels }}' > /tmp/labels.txt
          sed -i "s|org\.opencontainers\.image\.created=.*|org.opencontainers.image.created=${CREATED}|" /tmp/labels.txt
          { echo 'labels<<EOF'; cat /tmp/labels.txt; echo 'EOF'; } >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            ESHU_VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
            SOURCE_DATE_EPOCH=${{ steps.epoch.outputs.epoch }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.labels.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ env.IMAGE_PLATFORMS }}

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign Docker image
        if: github.event_name != 'pull_request'
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE_REF}"

      - name: Verify Docker image signature
        if: github.event_name != 'pull_request'
        env:
          CERTIFICATE_IDENTITY: https://github.com/${{ github.workflow_ref }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          cosign verify "${IMAGE_REF}" \
            --certificate-identity "${CERTIFICATE_IDENTITY}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Prepare release metadata output
        if: github.event_name != 'pull_request'
        run: mkdir -p dist

      - name: Generate image SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: dist/eshu-image.spdx.json
          artifact-name: eshu-image-sbom.spdx.json
          upload-artifact: true
          upload-release-assets: false

      - name: Generate SBOM attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: dist/eshu-image.spdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Verify image attestations
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          OCI_IMAGE_REF: oci://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          gh attestation verify "${OCI_IMAGE_REF}" \
            -R "${GITHUB_REPOSITORY}"
          gh attestation verify "${OCI_IMAGE_REF}" \
            -R "${GITHUB_REPOSITORY}" \
            --predicate-type https://spdx.dev/Document/v2.3

  verify-reproducibility:
    needs:
      - changes
      - build-and-push-image
    if: needs.changes.outputs.image == 'true'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute source date epoch
        id: epoch
        run: echo "epoch=$(git log -1 --format=%ct)" >> "$GITHUB_OUTPUT"

      - name: Build image (first)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg SOURCE_DATE_EPOCH="${{ steps.epoch.outputs.epoch }}" \
            --build-arg ESHU_VERSION=reproducibility-test \
            --provenance=false \
            --no-cache \
            --output type=local,dest=/tmp/out1 \
            .

      - name: Build image (second, no cache)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg SOURCE_DATE_EPOCH="${{ steps.epoch.outputs.epoch }}" \
            --build-arg ESHU_VERSION=reproducibility-test \
            --provenance=false \
            --no-cache \
            --output type=local,dest=/tmp/out2 \
            .

      - name: Compare builds
        run: |
          (cd /tmp/out1 && find . -type f -exec sha256sum {} \; | sort -k2) > /tmp/out1.sha256
          (cd /tmp/out2 && find . -type f -exec sha256sum {} \; | sort -k2) > /tmp/out2.sha256
          grep './usr/local/bin/' /tmp/out1.sha256 | sort -k2 > /tmp/out1.binaries.sha256
          grep './usr/local/bin/' /tmp/out2.sha256 | sort -k2 > /tmp/out2.binaries.sha256
          if ! diff /tmp/out1.binaries.sha256 /tmp/out2.binaries.sha256; then
            echo "::error::Go binaries differ across builds. Reproducibility failed."
            exit 1
          fi
          echo "::notice::All Go binaries are byte-identical across builds."
          echo "Reproducibility summary:"
          echo "  Go binaries in /usr/local/bin: IDENTICAL"
          echo "  Total files compared: $(wc -l < /tmp/out1.sha256)"
          if diff /tmp/out1.sha256 /tmp/out2.sha256 > /tmp/repro.diff 2>&1; then
            echo "  Full filesystem: IDENTICAL"
          else
            DIFF_COUNT=$(grep -c '^<' /tmp/repro.diff 2>/dev/null || echo 0)
            echo "  Full filesystem: ${DIFF_COUNT} files differ (acceptable: apk-installed system package metadata variance)"
          fi

  attach-release-sbom:
    needs:
      - changes
      - build-and-push-image
    if: needs.changes.outputs.image == 'true' && github.ref_type == 'tag'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download image SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: eshu-image-sbom.spdx.json
          path: dist

      - name: Wait for GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for attempt in {1..30}; do
            if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}"

      - name: Attach image SBOM to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" "dist/eshu-image-sbom.spdx.json" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  package-and-push-chart:
    needs: changes
    if: needs.changes.outputs.chart == 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Lint Helm chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm package ${{ env.CHART_PATH }} --destination dist

      - name: Push Helm chart to GHCR
        if: github.event_name != 'pull_request'
        run: |
          helm registry login ${{ env.REGISTRY }} \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}"
          helm push dist/eshu-*.tgz ${{ env.CHART_REGISTRY }}
