name: Frontend

# Gates for the JavaScript/TypeScript product surfaces that the Go-focused
# `Build Test` workflow does not cover:
#   * the root Vite marketing site (builds to `site-dist`, served by Cloudflare Pages)
#   * the console package under `apps/console`
#
# The marketing-site and console jobs run in parallel so a failure in one is
# clearly attributable in the checks list (distinct job/check names) instead of
# being hidden inside a single combined log.
#
# The lint + format jobs (issue #3763 O3) catch unsafe / undisciplined TS
# before it lands. The lint job is the eslint flat config at the repo root
# applied to src/ + apps/console/src/. The format job is Prettier scoped to
# the files touched by this PR, so existing drift in untouched files does
# not block the gate while every new / modified file stays formatted.
#
# npm audit policy (see the `audit` job):
#   CI fails on HIGH and CRITICAL advisories (`--audit-level=high`). Moderate and
#   low advisories are reported but do not block, because the only known residual
#   is a low, Windows-only, dev-server esbuild advisory that never ships in the
#   production `site-dist` bundle (CI runs on Linux). Critical/high frontend
#   supply-chain findings are NOT silently ignored — they break the build.

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "src/**"
      - "apps/console/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "wrangler.jsonc"
      - "eslint.config.js"
      - ".prettierrc.json"
      - ".prettierignore"
      - "tests/lint-fixture/**"
      - "scripts/test-eslint-config.sh"
      - "scripts/verify-eslint-config.sh"
      - "scripts/test-verify-frontend-format-changed.sh"
      - "scripts/verify-frontend-format-changed.sh"
      - "scripts/ci/install-apt-packages.sh"
      - "scripts/run-console-live-e2e.sh"
      - "scripts/run-console-retained-e2e.sh"
      - "scripts/test-run-console-live-e2e.sh"
      - "scripts/test-run-console-retained-e2e.sh"
      - "scripts/console-live-e2e-runtime.mjs"
      - "scripts/lib/console-retained-create-proof-schema.sql"
      - "scripts/lib/console-retained-verify-public-identity.sql"
      - ".pre-commit-config.yaml"
      - ".github/workflows/frontend.yml"
      # SSO auth E2E (#4971) surfaces — the browser gate, its runtime, the
      # Compose stack it owns and the base stack it extends, the image it builds,
      # the mock OIDC IdP it drives, and the backend auth/OIDC/session handlers
      # it exercises end to end. A regression in any of these must re-run the
      # fresh-stack browser gate on that same PR rather than merge false-green.
      - "scripts/lib/auth_e2e_cli.sh"
      - "scripts/test-auth-e2e-cli.sh"
      - "scripts/run-auth-e2e.sh"
      - "scripts/console-auth-e2e-runtime.mjs"
      - "docker-compose.e2e.yaml"
      - "docker-compose.yaml"
      - "Dockerfile"
      - "go/cmd/mock-oidc-idp/**"
      - "go/cmd/api/**"
      - "go/internal/oidclogin/**"
      # MCP-identity auth E2E (F-9, #5170) surfaces — the sibling browser+scripted
      # gate, its sensitivity/manifest verifiers, the mutation override, the
      # named baseline, the stubbed GitHub counterparty, the MCP transport, and
      # the backend bearer/GitHub/auth handlers it exercises end to end. A
      # regression in any of these must re-run the gate on that same PR.
      # (apps/console/** above already covers the apps/console/e2e/** modules.)
      - "scripts/run-auth-mcp-e2e.sh"
      - "scripts/auth-mcp-e2e-runtime.mjs"
      - "scripts/verify-auth-mcp-e2e-sensitivity.sh"
      - "scripts/verify-auth-mcp-e2e-manifest.sh"
      - "scripts/refresh-auth-mcp-e2e-baseline.sh"
      - "scripts/lib/auth_mcp_e2e_sensitivity.sh"
      - "scripts/lib/auth_mcp_e2e_manifest.sh"
      - "scripts/test-verify-auth-mcp-e2e-sensitivity.sh"
      - "scripts/test-verify-auth-mcp-e2e-manifest.sh"
      - "docker-compose.e2e.mutation.yaml"
      - "testdata/golden/auth-mcp-e2e-baseline.json"
      - "go/cmd/mock-github/**"
      - "go/cmd/mcp-server/**"
      - "go/internal/oidcbearer/**"
      - "go/internal/githublogin/**"
      # The query auth surface (public-route allowlist, transport-auth
      # middleware, OAuth discovery/challenge, bearer resolution) and the MCP
      # transport itself: a revert of the public-route fix or an MCP-transport
      # auth regression MUST re-trigger this gate (design §7).
      - "go/internal/query/**"
      - "go/internal/mcp/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  marketing-site:
    name: Marketing site (root Vite)
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (clean, lockfile-pinned)
        run: npm ci

      - name: Typecheck root site
        run: npm run typecheck

      - name: Test root site
        run: npm test

      - name: Build root site
        run: npm run build

  console:
    name: Console (apps/console)
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (clean, lockfile-pinned)
        run: npm ci

      - name: Install live harness dependencies
        run: scripts/ci/install-apt-packages.sh ripgrep

      - name: Verify live console harness contracts
        run: |
          bash scripts/test-run-console-live-e2e.sh
          bash scripts/test-run-console-retained-e2e.sh

      - name: Typecheck console
        run: npm run console:typecheck

      - name: Test console
        run: npm run console:test

      - name: Build console
        run: npm run console:build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run per-page e2e (mocked)
        run: npm run console:e2e:mock

  auth-sso-e2e:
    name: SSO auth E2E (browser, fresh stack)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (clean, lockfile-pinned)
        run: npm ci

      - name: Install ripgrep
        run: scripts/ci/install-apt-packages.sh ripgrep

      - name: Verify the auth E2E CLI build contract
        run: bash scripts/test-auth-e2e-cli.sh

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # scripts/run-auth-e2e.sh owns the docker-compose.e2e.yaml lifecycle
      # (fresh `up --build --wait` then `down -v`), drives all 17 acceptance
      # steps — first-run wizard, generated-credential claim/consumption,
      # UI-configured OIDC provider, non-admin gating, require_sso + break-glass,
      # and the item-6 negative-leakage scan — and exits non-zero on any failure.
      # It reuses the existing browser gate rather than duplicating the console
      # lane's mock-mode harness (#4971 acceptance; extends the #3326/#3328 lane).
      - name: Run the fresh-stack SSO auth E2E
        run: bash scripts/run-auth-e2e.sh

      - name: Upload auth E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-sso-e2e-artifacts
          path: e2e-artifacts/
          if-no-files-found: ignore

  auth-mcp-e2e:
    name: MCP-identity auth E2E (browser + scripted OAuth, fresh stack)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (clean, lockfile-pinned)
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Sibling of run-auth-e2e.sh (issue #4971), scoped to the MCP HTTP
      # transport identity story (F-9, #5170): it owns the docker-compose.e2e.yaml
      # lifecycle (fresh up --build --wait then down -v) and drives all three org
      # shapes — token-only, GitHub (stubbed), OIDC (scripted RFC 9728 + PKCE) —
      # plus the negative-leakage module, exiting non-zero on any failure.
      # Distinct compose project + port block from run-auth-e2e.sh, so the two
      # gates never collide.
      - name: Run the fresh-stack MCP-identity auth E2E
        run: bash scripts/run-auth-mcp-e2e.sh

      # Assert the runner's report matches the named baseline manifest (exact
      # ordered step-id list, per-step status, runtime bound).
      - name: Verify the report against the named baseline manifest
        run: bash scripts/verify-auth-mcp-e2e-manifest.sh

      # Prove the negative credential-less module is live (real gate PASS ->
      # mutated FAIL-on-gate -> restored PASS), on its own isolated stack.
      - name: Run the mutation-sensitivity gate
        run: bash scripts/verify-auth-mcp-e2e-sensitivity.sh

      - name: Upload MCP-identity auth E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-mcp-e2e-artifacts
          path: e2e-artifacts/
          if-no-files-found: ignore

  console-a11y:
    name: Console a11y audit (axe-core)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (clean, lockfile-pinned)
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run a11y audit gate (critical + serious fail)
        run: npm run console:a11y

  lint:
    name: "ESLint flat config (issue #3763)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (clean, lockfile-pinned)
        run: npm ci

      - name: Lint (eslint flat config, src + apps/console/src)
        run: scripts/verify-eslint-config.sh

      - name: Test eslint config catches no-console + no-unused-vars + import/order
        run: scripts/test-eslint-config.sh

  format:
    name: "Prettier format check (issue #3763)"
    # The O3 acceptance contract is "the scan/lint runs in CI and fails on
    # violation" — that contract is met by the `lint` job above. Prettier
    # is wired up as `npm run format` / `format:check` for local use and
    # surfaced as a non-blocking check here so contributors see drift in
    # the PR logs without the gate refusing to merge a first-time
    # Prettier introduction against the existing code base. Tighten
    # `continue-on-error` to `false` once the existing drift is cleared
    # by a follow-up formatting PR.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (clean, lockfile-pinned)
        run: npm ci

      - name: Prettier check on changed frontend files
        shell: bash
        run: scripts/verify-frontend-format-changed.sh

  audit:
    name: npm audit (fail on high/critical)
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies (clean, lockfile-pinned)
        run: npm ci

      - name: Report all advisories (non-blocking)
        run: npm audit || true

      - name: Fail on high/critical advisories
        run: npm audit --audit-level=high
