name: Generate Operator Dashboard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-generate:
    name: Verify generate-operator-dashboard test mirror
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install ripgrep and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep jq

      - name: Run test mirror
        run: scripts/test-generate-operator-dashboard.sh

  generate:
    name: Verify generate-operator-dashboard gate
    runs-on: ubuntu-latest
    needs: test-generate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install ripgrep and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep jq

      - name: Generate dashboard
        shell: bash
        run: |
          set -o pipefail
          scripts/generate-operator-dashboard.sh 2>&1 | tee /tmp/operator-dashboard.log

      - name: Check for uncommitted dashboard drift
        shell: bash
        run: |
          set -o pipefail
          if ! git diff --exit-code -- docs/public/observability/dashboards/eshu-operator-overview.json; then
            {
              printf 'generate-operator-dashboard: the committed dashboard drifted from the generator output.\n'
              printf 'Re-run: scripts/generate-operator-dashboard.sh\n'
              printf '\nDiff:\n'
              git diff -- docs/public/observability/dashboards/eshu-operator-overview.json
            } >&2
            exit 1
          fi

      - name: Upload drift report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: operator-dashboard-drift-report
          path: /tmp/operator-dashboard.log
          if-no-files-found: warn
