name: Ifa Determinism Gate

# P4 (#4397) advisory->blocking flip (design doc
# docs/internal/design/4389-ifa-conformance-platform.md, line 517's RULE): the
# Ifa graph-determinism matrix (Layer 2, scripts/verify-ifa-determinism.sh)
# and its dead-letter failure-path leg (scripts/verify-ifa-dead-letter-
# matrix.sh) become per-PR path-filtered BLOCKING CI gates, mirroring
# golden-corpus-gate.yml. The RULE requires the N-sensitive Tier 2 run (the
# demo-org cassette PLUS the 8-project synth-multiscope cassette) — a gate
# that only ever ran the single-generation demo-org cassette could stay green
# forever without ever exercising a genuine worker-count race. Both matrix
# scripts already drive that Tier 2 combination; this workflow wires them
# into per-PR CI instead of leaving them local-only.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'go/internal/ifa/graphdump/**'
      # The determinism matrix drives the Tier-2 synth-multiscope cassette
      # generated by go/internal/synth/gcp (GenerateMultiScope). A change there
      # that broke scope disjointness would make the worker matrix go inert, so
      # it MUST retrigger this gate.
      - 'go/internal/synth/gcp/**'
      - 'go/internal/ifa/mutate.go'
      - 'go/internal/ifa/dead_letters.go'
      - 'go/cmd/ifa/**'
      - 'go/internal/reducer/gcp_resource_materialization.go'
      - 'go/internal/reducer/gcp_resource_materialization_teeth.go'
      - 'go/internal/reducer/gcp_resource_materialization_teeth_off.go'
      - 'go/internal/storage/cypher/cloud_resource_node_writer.go'
      - 'go/internal/storage/cypher/cloud_resource_node_writer_teeth.go'
      - 'go/internal/storage/cypher/cloud_resource_node_writer_teeth_off.go'
      - 'scripts/verify-ifa-determinism.sh'
      - 'scripts/test-verify-ifa-determinism.sh'
      - 'scripts/verify-ifa-dead-letter-matrix.sh'
      - 'scripts/test-verify-ifa-dead-letter-matrix.sh'
      - 'scripts/lib/ifa_determinism_common.sh'
      # P6 (#4580) deterministic fault-injection: the in-binary decorator, its
      # build-tagged classification regression test, the reducer fault wiring,
      # and the Docker gate that proves real recovery (zero dead letters, graph
      # identical to the fault-free baseline). A change to any of these must
      # re-run the fault matrix.
      - 'go/internal/storage/cypher/fault_executor.go'
      - 'go/internal/storage/cypher/fault_executor_off.go'
      - 'go/internal/storage/cypher/fault_executor_classification_test.go'
      - 'go/internal/replay/faultreplay/**'
      - 'go/cmd/reducer/ifa_fault_wiring.go'
      - 'go/cmd/reducer/ifa_fault_wiring_off.go'
      - 'scripts/verify-ifa-fault-injection.sh'
      - 'scripts/test-verify-ifa-fault-injection.sh'
      - 'scripts/lib/ifa_fault_injection_common.sh'
      - '.github/workflows/ifa-determinism-gate.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: the gate only checks out and reads the repo.
permissions:
  contents: read

jobs:
  static-mirror:
    name: static mirror
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Install ripgrep
        run: scripts/ci/install-apt-packages.sh ripgrep
      - name: Validate determinism matrix mirror
        run: bash scripts/test-verify-ifa-determinism.sh
      - name: Validate dead-letter matrix mirror
        run: bash scripts/test-verify-ifa-dead-letter-matrix.sh
      - name: Validate fault-injection matrix mirror
        run: bash scripts/test-verify-ifa-fault-injection.sh

  determinism-matrix:
    name: determinism-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      # No retry-to-green: this platform's flake policy (design doc P4)
      # forbids normalizing a real divergence away by retrying or lowering N.
      - name: Run Ifa graph-determinism matrix (N=1,2,4; demo-org + synth-multiscope, Tier 2)
        env:
          ESHU_NEO4J_PASSWORD: change-me
          ESHU_POSTGRES_PASSWORD: change-me
        run: bash scripts/verify-ifa-determinism.sh

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f docker-compose.yaml logs --tail=200 || true

      - name: Tear down Docker services
        if: always()
        run: docker compose -f docker-compose.yaml down -v || true

  dead-letter-matrix:
    name: dead-letter-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Run Ifa dead-letter-set determinism matrix (N=1,2,4)
        env:
          ESHU_NEO4J_PASSWORD: change-me
          ESHU_POSTGRES_PASSWORD: change-me
        run: bash scripts/verify-ifa-dead-letter-matrix.sh

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f docker-compose.yaml logs --tail=200 || true

      - name: Tear down Docker services
        if: always()
        run: docker compose -f docker-compose.yaml down -v || true

  fault-injection:
    name: fault-injection
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      # The classification regression test that pins the P6 fault-error
      # fidelity fix is behind the ifafaultinjection build tag, so a normal
      # `go test ./...` never runs it. Run it explicitly here, alongside the
      # tagged decorator and reducer-wiring tests, so a revert of the
      # Retryable()/FailureClass() contract fails CI even before the Docker leg.
      - name: Run tagged fault-classification unit tests
        working-directory: go
        run: go test -tags ifafaultinjection ./internal/storage/cypher ./internal/replay/faultreplay ./cmd/reducer -count=1

      # No retry-to-green: a non-zero dead_letter count or a canonical graph
      # digest that diverges from the fault-free baseline is a real recovery
      # defect, never normalized away by retrying or lowering worker count.
      - name: Run Ifa fault-injection matrix (5 cells, fresh stack per cell)
        env:
          ESHU_NEO4J_PASSWORD: change-me
          ESHU_POSTGRES_PASSWORD: change-me
        run: bash scripts/verify-ifa-fault-injection.sh

      - name: Dump service logs on failure
        if: failure()
        run: docker compose -f docker-compose.yaml logs --tail=200 || true

      - name: Tear down Docker services
        if: always()
        run: docker compose -f docker-compose.yaml down -v || true
