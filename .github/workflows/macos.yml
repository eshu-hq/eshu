name: macOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    # Path-filtered (#4218): the macOS build only needs to run on Go changes.
    # main runs unconditionally above as the backstop.
    paths:
      - "go/**"
      - ".github/workflows/macos.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Debug info
        run: |
          uname -a
          go version
          df -h

      - name: Build Go CLI
        working-directory: go
        run: |
          VERSION="${GITHUB_SHA::12}"
          CGO_ENABLED=1 go build -ldflags "-X github.com/eshu-hq/eshu/go/internal/buildinfo.Version=${VERSION}" -o eshu ./cmd/eshu

      - name: Run Go tests
        working-directory: go
        run: go test ./... -count=1 -timeout 300s

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-logs
          path: |
            ~/.eshu
            *.log
