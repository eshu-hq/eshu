name: Product Claim Ledger

on:
  pull_request:
    paths:
      - README.md
      - docs/public/**
      - specs/product-claims.v1.yaml
      - specs/capability-catalog.v1.yaml
      - specs/capability-matrix.v1.yaml
      - specs/capability-matrix/**
      - go/internal/capabilitycatalog/**
      - go/cmd/capability-inventory/**
      - scripts/ci/install-apt-packages.sh
      - .github/workflows/product-claim-ledger.yml
  push:
    branches:
      - main
    paths:
      - README.md
      - docs/public/**
      - specs/product-claims.v1.yaml
      - specs/capability-catalog.v1.yaml
      - specs/capability-matrix.v1.yaml
      - specs/capability-matrix/**
      - go/internal/capabilitycatalog/**
      - go/cmd/capability-inventory/**
      - scripts/ci/install-apt-packages.sh
      - .github/workflows/product-claim-ledger.yml
  workflow_dispatch:
  schedule:
    - cron: "23 9 * * 1"

permissions:
  contents: read
  issues: read

jobs:
  verify-product-claims:
    name: Verify product claim ledger
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install workflow test dependencies
        run: scripts/ci/install-apt-packages.sh ripgrep

      - name: Run product claim workflow contract mirror
        run: scripts/test-product-claim-ledger-workflow.sh

      # -mode product-claims runs only the product claim ledger guard (ledger
      # <-> marker <-> proof chain, plus the live issue-state check below). It
      # skips the capability-state and collector-state marker scans that
      # -mode docs also performs, because mcp-schema-drift.yml already runs
      # the full -mode docs scan on every PR; repeating that scan here just to
      # reach the ledger check wasted CI time as the docs tree grew (#4073).
      # The live issue-state check is bounded (30s) and PR-safe: it always
      # runs here (pull_request, push, schedule, and workflow_dispatch all hit
      # this one step) using the read-only Actions token.
      - name: Run product-claim ledger verify
        working-directory: go
        shell: bash
        env:
          ESHU_VERIFY_PRODUCT_CLAIM_ISSUES_LIVE: "1"
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -o pipefail
          go run ./cmd/capability-inventory -mode product-claims 2>&1 | tee /tmp/product-claims.log

      - name: Upload product claim report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: product-claim-ledger-report
          path: /tmp/product-claims.log
          if-no-files-found: warn
