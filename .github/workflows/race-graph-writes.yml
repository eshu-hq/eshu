name: Race Graph Writes

on:
  pull_request:
    paths:
      - "go/cmd/ingester/**"
      - "go/cmd/projector/**"
      - "go/internal/storage/cypher/**"
      - "go/internal/storage/nornicdb/**"
      - "go/internal/reducer/**"
      - "go/internal/projector/**"
      - "go/internal/correlation/**"
      - "go/internal/content/shape/**"
      - "go/internal/relationships/**"
      - ".github/workflows/race-graph-writes.yml"
  push:
    branches:
      - main
    paths:
      - "go/cmd/ingester/**"
      - "go/cmd/projector/**"
      - "go/internal/storage/cypher/**"
      - "go/internal/storage/nornicdb/**"
      - "go/internal/reducer/**"
      - "go/internal/projector/**"
      - "go/internal/correlation/**"
      - "go/internal/content/shape/**"
      - "go/internal/relationships/**"
      - ".github/workflows/race-graph-writes.yml"
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  race:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Run graph-write tests with race detector
        working-directory: go
        run: go test -race -count=1 -timeout 600s ./cmd/ingester/... ./cmd/projector/... ./internal/storage/cypher/... ./internal/storage/nornicdb/... ./internal/reducer/... ./internal/projector/... ./internal/correlation/... ./internal/content/shape/... ./internal/relationships/...
