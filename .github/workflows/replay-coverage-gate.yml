name: Replay Coverage Gate

# C-1/C-8/C-9/C-10 replay coverage manifest + lockstep gate (#4173, #4187, #4188, #4189, epic #4172).
# Enumerates every surface Eshu claims to support from the source-of-truth
# registries and reports any required surface/scenario_type pair lacking a green
# replay scenario. Static, credential-free, Docker-free — it composes with (does
# not replace) the gates that actually replay the scenarios it counts.
#
# BLOCKING: C-2..C-10 have burned the replay coverage gaps down, so any uncovered
# surface/scenario_type pair now fails this job and the uploaded C-7 coverage
# report is the regression artifact. Keep the gate blocking so new supported
# surfaces and required scenario types land with their replay scenarios.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'go/cmd/replay-coverage-gate/**'
      - 'go/cmd/eshu/**'
      - 'go/internal/replaycoverage/**'
      - 'go/internal/cigates/**'
      - 'go/internal/query/**'
      - 'go/internal/mcp/**'
      - 'go/internal/scopedtoken/**'
      - 'go/internal/replay/inputtape/**'
      - 'go/internal/replay/parserfixture/**'
      - 'go/internal/replay/schedulereplay/**'
      - 'go/internal/replay/crashreplay/**'
      - 'go/internal/capabilitycatalog/**'
      - 'go/internal/facts/**'
      - 'go/internal/goldengate/**'
      - 'go/internal/storage/cypher/**'
      - 'specs/ci-gates.v1.yaml'
      - 'specs/capability-budget-proof.v1.yaml'
      - 'specs/capability-catalog.v1.yaml'
      - 'specs/replay-coverage-manifest.v1.yaml'
      - 'specs/replay-depth-requirements.v1.yaml'
      - 'specs/authorization-catalog.v1.yaml'
      - 'specs/authorization-replay-coverage.v1.yaml'
      - 'specs/parser-backing-ledger.v1.yaml'
      - 'specs/language-feature-parity-ledger.v1.yaml'
      - 'specs/fact-kind-registry.v1.yaml'
      - 'specs/surface-inventory.v1.yaml'
      - 'specs/capability-matrix.v1.yaml'
      - 'specs/capability-matrix/**'
      - 'specs/product-claims.v1.yaml'
      - 'testdata/golden/e2e-20repo-snapshot.json'
      - 'testdata/cassettes/**'
      - 'scripts/verify-replay-coverage-gate.sh'
      - 'scripts/test-verify-replay-coverage-gate.sh'
      - 'scripts/ci/install-apt-packages.sh'
      - '.github/workflows/replay-coverage-gate.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege: the gate only checks out and reads the repo.
permissions:
  contents: read

jobs:
  static-mirror:
    name: static mirror
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Install ripgrep
        run: scripts/ci/install-apt-packages.sh ripgrep
      - name: Validate gate contract
        run: bash scripts/test-verify-replay-coverage-gate.sh

  coverage-gate:
    name: coverage-gate (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - name: Run replay coverage gate (blocking)
        env:
          RCOV_REPORT_OUT: replay-coverage-report.json
        run: bash scripts/verify-replay-coverage-gate.sh --blocking
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: replay-coverage-report
          path: replay-coverage-report.json
          if-no-files-found: error
