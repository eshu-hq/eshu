name: Security Scan

# Per-issue #3764 + #3765 (Epic O O4 + O5): catch known CVEs in deps, in the
# Go source (static analysis + supply-chain license posture), and in the
# published container image before they reach customers. Five scan jobs run
# side by side:
#
#   trivy-fs        — scans the working tree (every PR + push to main +
#                     weekly schedule + manual dispatch) for vulnerable
#                     dependencies, leaked secrets, and IaC
#                     misconfigurations. Triggered from O4.
#   trivy-image     — scans ghcr.io/eshu-hq/eshu:<tag> after docker-publish
#                     has actually pushed an image. Triggered via
#                     workflow_run so we always scan the digest that was
#                     just shipped. Triggered from O4.
#   govulncheck     — `govulncheck ./...` on every PR; the canonical Go
#                     vulnerability database (pkg.go.dev/vuln). Fails on
#                     any known CVE the code imports, including transitive
#                     stdlib calls. Triggered from O5.
#   gosec           — `gosec ./...` static analysis on every PR; surfaces
#                     hard-coded credentials, weak crypto, unsafe HTTP,
#                     integer overflow, command-injection sinks, and the
#                     rest of the OWASP-GoSec catalog. SARIF uploaded to
#                     the Security tab. Triggered from O5.
#   nancy           — `nancy sleuth` against go.sum for CVE + license
#                     drift; Sonatype's curated OSS Index. Triggered from
#                     O5.
#
# All scanners:
#   * Use --exit-code 1 (or equivalent) so any reported finding fails the
#     gate (the O4 + O5 acceptance contract).
#   * Upload SARIF to the GitHub Security tab where the action supports it
#     (trivy, gosec) so findings show up alongside CodeQL on the PR.
#
# Permission model: each job declares only the permissions it needs. The
# trivy-fs + govulncheck + gosec + nancy jobs need `security-events: write`
# to upload SARIF; trivy-image also needs `packages: read` to pull from
# GHCR.

on:
  pull_request:
    # A docs-only PR (docs tree, root markdown, mkdocs config) cannot introduce
    # a Go CVE, a leaked secret in source, or an IaC misconfiguration that these
    # scanners catch, so skip the heavy security lane for it. Push-to-main, the
    # weekly schedule, and the post-publish image scan remain the backstop, so a
    # secret that somehow lands via a docs path is still caught on merge.
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'mkdocs.yml'
      - '.github/**/*.md'
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
  schedule:
    # Weekly Monday 06:00 UTC — catches newly-published CVEs in deps that
    # were clean at PR time but flagged since. The PR + push triggers only
    # re-run the gate when the working tree changes; the schedule is the
    # long-stop for "dep was green last week, flagged this week" cases.
    - cron: "0 6 * * 1"
  workflow_run:
    # Trigger after docker-publish finishes so the image scan always has a
    # digest to pull. workflow_run only fires for runs the default branch
    # token can see (so fork PRs land on trivy-fs / govulncheck / gosec /
    # nancy only, never trivy-image).
    workflows: ["Publish Image and Helm Chart"]
    types: [completed]

# Coalesce superseded PR runs, but never coalesce release image scans.
# For workflow_run events GitHub sets github.ref to the default branch, so a
# naive `${{ github.workflow }}-${{ github.ref }}` group would put every
# trivy-image run in one group; GitHub keeps only a single pending run per
# group (even with cancel-in-progress: false), so back-to-back image
# publishes would drop the earlier shipped digest's scan. Keying on the
# triggering run's head_sha gives each shipped digest its own group; PRs and
# branch/tag pushes fall back to github.ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  trivy-fs:
    name: Trivy filesystem scan (vuln + secret + config)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'workflow_run'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Trivy filesystem scan (vuln + secret + config)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          # With format: sarif, trivy-action does NOT apply `severity` to the
          # SARIF or the exit code by default — it emits every severity and
          # `exit-code: 1` then fires on MEDIUM/LOW findings too (e.g. the
          # opinionated k8s/Docker hardening rules on our own charts). This
          # flag applies the CRITICAL,HIGH threshold to the SARIF + exit code,
          # so only CRITICAL/HIGH block the gate, matching the intent above.
          limit-severities-for-sarif: true
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          # Skip non-product trees: intentionally-vulnerable govuln test
          # fixtures (they embed known CVEs to test the vulnerability-
          # intelligence collector and MUST NOT be "fixed"), the example
          # collector-extension artifacts (e.g. the scorecard OCI worker that
          # runs as root by design to read the mounted docker socket), and the
          # replay parser-fixture source trees (synthetic Terraform/Kubernetes/
          # Dockerfile inputs that exist to exercise the parsers, not to deploy —
          # Trivy misconfig findings on them are noise, like tests/fixtures), and
          # the mock OIDC IdP (#4971) whose keys.go embeds a fixed, committed,
          # synthetic RSA signing key — a documented non-secret test constant
          # (already `#nosec G101`) that Trivy's secret scanner flags HIGH
          # (AsymmetricPrivateKey). The mock IdP is a test-only binary: its
          # Dockerfile stage is never COPYed into the released final image (only
          # docker-compose.e2e.yaml builds/runs it), so the image scan below
          # never sees it.
          skip-dirs: go/cmd/eshu/testdata/vuln_scan_repo_fixtures,go/internal/collector/vulnerabilityintelligence/testdata,go/internal/replay/parserfixture/testdata,tests/fixtures,examples,node_modules,apps/console/node_modules,go/cmd/mock-oidc-idp

      - name: Upload Trivy fs SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-image:
    name: Trivy image scan (ghcr.io/eshu-hq/eshu)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch')
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image reference from triggering workflow_run
        id: image
        env:
          TRIGGER_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          ref=""
          branch="${TRIGGER_HEAD_BRANCH:-}"
          sha="${TRIGGER_HEAD_SHA:-}"
          if [[ "${branch}" =~ ^v[0-9] ]]; then
            ref="ghcr.io/${REPOSITORY}:${branch#v}"
          elif [ -n "${branch}" ]; then
            ref="ghcr.io/${REPOSITORY}:${branch}"
          else
            ref="ghcr.io/${REPOSITORY}:sha-${sha::12}"
          fi
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"
          echo "image-scan: scanning ${ref}"

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.image.outputs.ref }}
          severity: CRITICAL,HIGH
          # See trivy-fs: apply the severity threshold to the SARIF + exit code
          # so only CRITICAL/HIGH block the gate.
          limit-severities-for-sarif: true
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif

      - name: Upload Trivy image SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  govulncheck:
    name: govulncheck (Go vulnerability database)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'workflow_run'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install govulncheck (pinned)
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck on every Go package
        working-directory: go
        # -scan package, not the default symbol mode. The symbol-level scan
        # builds an SSA call graph via golang.org/x/tools, which panics on
        # Go 1.26 generics ("ForEachElement called on type containing
        # *types.TypeParam"); the bug is present in the latest released
        # x/tools (v0.46.0) and on x/vuln master, so no govulncheck version
        # survives symbol mode here yet. Package mode resolves vulnerable
        # imports without the SSA call graph, so it does not panic. It is
        # strictly more conservative than symbol mode (it flags an imported
        # vulnerable package even when no vulnerable symbol is called), so it
        # never hides a vulnerability the default mode would have caught.
        run: |
          set -euo pipefail
          govulncheck -scan package ./... 2>&1 | tee govulncheck.out
          status=${PIPESTATUS[0]}
          if [ "${status}" -ne 0 ]; then
            printf 'govulncheck: vulnerabilities found, see govulncheck.out above\n' >&2
            exit "${status}"
          fi

      - name: Upload govulncheck output as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-output
          path: go/govulncheck.out
          if-no-files-found: ignore

  gosec:
    name: gosec (Go static analysis)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'workflow_run'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install gosec (pinned)
        # v2.27.1, not v2.22.0: gosec builds an SSA representation via
        # golang.org/x/tools, which panics on Go 1.26 generics. v2.22.0 lets
        # that panic abort the run; v2.27.1 recovers ("skipping SSA analysis")
        # and continues with the AST-based rules. Two packages (reducer, query)
        # whose generics trip the loader fall back to AST-only coverage; the
        # rest get full coverage.
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1

      - name: Run gosec on every Go package (SARIF)
        working-directory: go
        # Single pass. gosec is slow on Go 1.26 (it attempts SSA per package
        # and recovers from the x/tools generics panic), so scanning the whole
        # module twice — once for SARIF, once for text — pushed wall time past
        # the timeout. Only the SARIF is consumed (uploaded to the Security
        # tab), so emit SARIF only.
        #
        # `-no-fail` because gosec's bundled go/types loader cannot fully
        # type-check some Go 1.26 generics (it logs "package <x> has type
        # errors, skipping SSA analysis" for `query`/`reducer` and then exits
        # non-zero) even when there are zero security findings. That exit is an
        # analysis-tooling artifact, not a real finding. So we suppress gosec's
        # own exit code and instead gate on the actual finding count in the
        # SARIF: any reported result fails the job; the benign type-check
        # errors (which carry no SARIF results) do not.
        run: |
          set -euo pipefail
          gosec -severity=low -confidence=low -no-fail -fmt=sarif -out gosec.sarif ./...
          findings="$(jq '[.runs[].results[]] | length' gosec.sarif)"
          printf 'gosec: %s finding(s) in SARIF\n' "${findings}"
          if [ "${findings}" -ne 0 ]; then
            printf 'gosec: security findings present — see the SARIF / Security tab\n' >&2
            exit 1
          fi

      - name: Upload gosec SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: go/gosec.sarif
          category: gosec

  nancy:
    name: nancy (Sonatype dep CVE + license scan)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'workflow_run'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install nancy (pinned)
        run: go install github.com/sonatype-nexus-community/nancy@latest

      - name: Run nancy sleuth on go.sum
        working-directory: go
        # nancy returns non-zero whenever it finds a vulnerable module in
        # the dependency graph; the CVE list is Sonatype's curated OSS
        # Index, so this catches drift that govulncheck misses (e.g.
        # indirect deps, older advisories).
        run: |
          set -euo pipefail
          nancy sleuth --no-color 2>&1 | tee nancy.out
          status=${PIPESTATUS[0]}
          if [ "${status}" -ne 0 ]; then
            printf 'nancy: vulnerable dependencies found, see nancy.out above\n' >&2
            exit "${status}"
          fi

      - name: Upload nancy output as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nancy-output
          path: go/nancy.out
          if-no-files-found: ignore
