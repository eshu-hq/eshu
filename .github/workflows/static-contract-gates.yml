name: Static Contract Gates

# Consolidates the credential-free static contract verifiers (#4218) that
# previously lived in one workflow file each (verify-openapi, verify-route-
# coverage, verify-edge-source-tool-coverage, verify-evidence-continuity,
# verify-skill-roundtrip, verify-telemetry-coverage, generate-operator-dashboard,
# contract-source-of-truth). One `changes` job (dorny/paths-filter) decides which
# gates the PR's changed paths select — mirroring specs/ci-gates.v1.yaml triggers
# — and a single matrix job runs only the selected gates, sharing one
# checkout + Go + ripgrep/jq setup instead of duplicating it across eight
# workflows. Each matrix entry keeps a readable, stable check name. On push to
# main every gate is included in the selected matrix.
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed gate paths
    runs-on: ubuntu-latest
    outputs:
      openapi: ${{ steps.filter.outputs.openapi }}
      route: ${{ steps.filter.outputs.route }}
      edge: ${{ steps.filter.outputs.edge }}
      evidence: ${{ steps.filter.outputs.evidence }}
      skill: ${{ steps.filter.outputs.skill }}
      telemetry: ${{ steps.filter.outputs.telemetry }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      envdoc: ${{ steps.filter.outputs.envdoc }}
      contract: ${{ steps.filter.outputs.contract }}
      ifa: ${{ steps.filter.outputs.ifa }}
      ifaload: ${{ steps.filter.outputs.ifaload }}
      ifareplaydrive: ${{ steps.filter.outputs.ifareplaydrive }}
      heredoc: ${{ steps.filter.outputs.heredoc }}
      docsrefs: ${{ steps.filter.outputs.docsrefs }}
      doccitations: ${{ steps.filter.outputs.doccitations }}
      remotevalidation: ${{ steps.filter.outputs.remotevalidation }}
      maturitydrift: ${{ steps.filter.outputs.maturitydrift }}
      matrix: ${{ steps.gate-matrix.outputs.matrix }}
      any: ${{ steps.gate-matrix.outputs.any }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Filter changed paths against gate triggers
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # On push (no base), dorny treats everything as changed → all gates run.
          # Path sets mirror the gate triggers in specs/ci-gates.v1.yaml; the
          # gate-registry-drift check keeps the two in lockstep. Every filter
          # also includes this workflow + the registry so a change to either
          # re-runs all gates. (Self-check paths are inlined per filter rather
          # than via a YAML anchor — dorny's handling of an anchored *list* item
          # is version-dependent, and inlining is unambiguous.)
          filters: |
            openapi:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'go/internal/query/**'
              - 'go/internal/mcp/**'
              - 'specs/surface-inventory.v1.yaml'
              - 'specs/capability-catalog.v1.yaml'
              - 'specs/capability-matrix.v1.yaml'
              - 'scripts/*verify-openapi*.sh'
            route:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'go/internal/query/**'
              - 'go/cmd/api/**'
              - 'scripts/*verify-route-coverage*.sh'
            edge:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'go/internal/relationships/**'
              - 'go/internal/collector/**'
              - 'specs/surface-inventory.v1.yaml'
              - 'scripts/*verify-edge-source-tool-coverage*.sh'
            evidence:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'go/internal/collector/**'
              - 'go/internal/facts/**'
              - 'go/internal/relationships/**'
              - 'specs/evidence-continuity.v1.yaml'
              - 'scripts/*verify-evidence-continuity*.sh'
            skill:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'go/cmd/skillgen/**'
              - 'go/internal/extensions/skillgen/**'
              - '.agents/skills/**'
              - 'skill-fragments/**'
              - 'scripts/*verify-skill-roundtrip*.sh'
            telemetry:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'go/internal/**'
              - 'go/cmd/**'
              - 'docs/public/observability/telemetry-coverage.md'
              - 'scripts/*verify-telemetry-coverage*.sh'
              - 'scripts/lib/test-verify-telemetry-coverage-*'
            dashboard:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'go/internal/query/**'
              - 'go/internal/mcp/**'
              - 'docs/public/observability/**'
              - 'scripts/*generate-operator-dashboard*.sh'
              - 'scripts/lib/operator-dashboard-*.json.tmpl'
              - 'scripts/lib/operator-dashboard-metrics.sh'
            envdoc:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'go/internal/envregistry/**'
              - 'docs/public/reference/env-registry.md'
              - 'scripts/*env-registry-doc*.sh'
            contract:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'go/internal/facts/**'
              - 'go/internal/collector/contracttest/**'
              - 'specs/fact-kind-registry.v1.yaml'
              - 'specs/collector_fact_contract.v1.yaml'
              - 'scripts/*verify-contracttest*.sh'
              - 'scripts/*fact-kind-registry*.sh'
            ifa:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'go/internal/ifa/**'
              - 'go/internal/synth/gcp/**'
              - 'go/cmd/ifa/**'
              - 'docs/internal/design/4389-ifa-conformance-platform.md'
              - 'specs/ifa-coverage-manifest.v1.yaml'
              - 'specs/fact-kind-registry.v1.yaml'
              - 'specs/replay-coverage-manifest.v1.yaml'
              - 'testdata/golden/e2e-20repo-snapshot.json'
              # #5351 materialized-edge exhaustiveness gate: the SQL relationship
              # family's write path (edge_writer_sql.go, sql_relationship_*.go)
              # and its fixtures/manifest. A write-path-only regression here is
              # exactly the silent-no-op class the gate exists for and the pure
              # seam cannot catch, so it MUST retrigger the Ifa contract-layer
              # gate (which runs the pure ifa-materialized-edge-coverage go test).
              - 'go/internal/reducer/materialized_edge_families.go'
              - 'go/internal/reducer/shared_projection.go'
              - 'go/internal/reducer/sql_relationship_materialization.go'
              - 'go/internal/reducer/sql_relationship_embedded_query.go'
              - 'go/internal/reducer/sql_relationship_metadata.go'
              - 'go/internal/storage/cypher/edge_writer_sql.go'
              - 'specs/ifa-materialized-edge-coverage.v1.yaml'
              - 'testdata/cassettes/sqlrelationships/**'
            ifaload:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'go/internal/ifa/amplify.go'
              - 'go/internal/ifa/slots.go'
              - 'go/internal/ifa/saturation/**'
              - 'go/internal/ifa/throughput/**'
              - 'specs/scale-lab-corpus.v1.yaml'
              - 'go/internal/storage/cypher/backpressure_executor.go'
              - 'go/internal/storage/cypher/timeout_executor.go'
              - 'go/internal/storage/postgres/reducer_queue_helpers.go'
              - 'go/internal/storage/postgres/reducer_queue_readiness_sql.go'
              - 'go/internal/reducer/intent.go'
            ifareplaydrive:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'scripts/verify-ifa-replay-drive.sh'
              - 'scripts/test-verify-ifa-replay-drive.sh'
            heredoc:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'scripts/**/*.sh'
              - 'scripts/heredoc-budget-baseline.txt'
              - 'go/cmd/heredoc-budget/**'
            docsrefs:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'docs/public/**'
              - 'docs/mkdocs.yml'
              - 'scripts/verify-docs-refs.sh'
              - 'scripts/test-verify-docs-refs.sh'
              - 'scripts/docs-refs-baseline.txt'
            doccitations:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'docs/public/languages/**'
              - 'docs/public/reference/parity-closure-matrix.md'
              - 'go/internal/**/*_test.go'
              - 'tests/fixtures/**'
              - 'scripts/verify-doc-citations.sh'
              - 'scripts/test-verify-doc-citations.sh'
              - 'scripts/docs-citations-baseline.txt'
            remotevalidation:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'specs/capability-matrix.v1.yaml'
              - 'specs/capability-matrix/**'
              - 'go/internal/capabilitycatalog/**'
              - 'go/cmd/capability-inventory/**'
              - 'docs/internal/remote-validation/**'
              - 'specs/remote-validation-baseline.txt'
              - 'specs/remote-validation-frozen.txt'
              - 'scripts/verify-remote-validation-artifacts.sh'
              - 'scripts/test-verify-remote-validation-artifacts.sh'
            maturitydrift:
              - '.github/workflows/static-contract-gates.yml'
              - 'specs/ci-gates.v1.yaml'
              - 'scripts/verify-golden-corpus-gate.sh'
              - 'testdata/golden/e2e-20repo-snapshot.json'
              - 'docs/public/languages/support-maturity.md'
              - 'specs/language-feature-parity-ledger.v1.yaml'
              - 'tests/fixtures/ecosystems/**'
              - 'scripts/verify-maturity-drift-guard.sh'
              - 'scripts/test-verify-maturity-drift-guard.sh'
              - 'scripts/lib/maturity-drift-guard-language-extensions.sh'
      - name: Build selected gate matrix
        id: gate-matrix
        run: |
          matrix_items=""
          any=false

          append_gate() {
            local selected="$1"
            local key="$2"
            local display="$3"
            local test="$4"
            local gate="$5"

            if [[ "${{ github.event_name }}" == "push" || "${selected}" == "true" ]]; then
              local item="{\"key\":\"${key}\",\"display\":\"${display}\",\"test\":\"${test}\",\"gate\":\"${gate}\"}"
              if [[ -n "${matrix_items}" ]]; then
                matrix_items="${matrix_items},${item}"
              else
                matrix_items="${item}"
              fi
              any=true
            fi
          }

          append_gate "${{ steps.filter.outputs.openapi }}" "openapi" "Verify OpenAPI gate" "scripts/test-verify-openapi.sh" "scripts/verify-openapi.sh"
          append_gate "${{ steps.filter.outputs.route }}" "route" "Verify route coverage gate" "scripts/test-verify-route-coverage.sh" "scripts/verify-route-coverage.sh"
          append_gate "${{ steps.filter.outputs.edge }}" "edge" "Verify edge source-tool coverage gate" "bash scripts/test-verify-edge-source-tool-coverage.sh" "scripts/verify-edge-source-tool-coverage.sh"
          append_gate "${{ steps.filter.outputs.evidence }}" "evidence" "Verify evidence continuity gate" "scripts/test-verify-evidence-continuity.sh" "scripts/verify-evidence-continuity.sh"
          append_gate "${{ steps.filter.outputs.skill }}" "skill" "Verify skillgen roundtrip gate" "scripts/test-verify-skill-roundtrip.sh" "scripts/verify-skill-roundtrip.sh"
          append_gate "${{ steps.filter.outputs.telemetry }}" "telemetry" "Verify telemetry coverage gate" "scripts/test-verify-telemetry-coverage.sh" "scripts/verify-telemetry-coverage.sh"
          append_gate "${{ steps.filter.outputs.dashboard }}" "dashboard" "Verify generate-operator-dashboard gate" "scripts/test-generate-operator-dashboard.sh" "scripts/generate-operator-dashboard.sh && git diff --exit-code -- docs/public/observability/dashboards/eshu-operator-overview.json"
          append_gate "${{ steps.filter.outputs.envdoc }}" "envdoc" "Verify environment registry reference gate" "scripts/test-generate-env-registry-doc.sh" "scripts/verify-env-registry-doc.sh"
          append_gate "${{ steps.filter.outputs.contract }}" "contract" "Verify contract source-of-truth gate" "scripts/test-verify-contracttest.sh && scripts/test-verify-fact-kind-registry.sh" "scripts/generate-contracttest.sh && scripts/generate-fact-kind-registry.sh && git diff --exit-code -- go/internal/collector/contracttest/contract_data.go go/internal/facts/fact_kind_registry.generated.go go/internal/facts/FACT_KIND_REGISTRIES.md"
          append_gate "${{ steps.filter.outputs.ifa }}" "ifa" "Verify Ifa contract-layer gate" "cd go && go test ./internal/ifa ./cmd/ifa -count=1" "cd go && go test ./internal/ifa ./cmd/ifa -count=1"
          append_gate "${{ steps.filter.outputs.ifaload }}" "ifaload" "Verify Ifa P5 load/saturation gate" "cd go && go test ./internal/ifa/saturation/ ./internal/ifa/throughput/ -race -count=1" "cd go && go test ./internal/ifa/saturation/ ./internal/ifa/throughput/ -race -count=1"
          append_gate "${{ steps.filter.outputs.ifareplaydrive }}" "ifareplaydrive" "Verify Ifa replay-drive mirror gate" "bash scripts/test-verify-ifa-replay-drive.sh" "bash scripts/test-verify-ifa-replay-drive.sh"
          append_gate "${{ steps.filter.outputs.heredoc }}" "heredoc" "Verify heredoc budget gate" "cd go && go test ./cmd/heredoc-budget -count=1" "cd go && go run ./cmd/heredoc-budget -baseline ../scripts/heredoc-budget-baseline.txt"
          append_gate "${{ steps.filter.outputs.docsrefs }}" "docsrefs" "Verify docs-refs gate" "bash scripts/test-verify-docs-refs.sh" "bash scripts/verify-docs-refs.sh"
          append_gate "${{ steps.filter.outputs.doccitations }}" "doccitations" "Verify doc-citations gate" "bash scripts/test-verify-doc-citations.sh" "bash scripts/verify-doc-citations.sh"
          append_gate "${{ steps.filter.outputs.remotevalidation }}" "remotevalidation" "Verify remote-validation-artifacts gate" "bash scripts/test-verify-remote-validation-artifacts.sh" "bash scripts/verify-remote-validation-artifacts.sh"
          append_gate "${{ steps.filter.outputs.maturitydrift }}" "maturitydrift" "Verify maturity-drift-guard gate" "bash scripts/test-verify-maturity-drift-guard.sh" "bash scripts/verify-maturity-drift-guard.sh"

          printf 'matrix={"include":[%s]}\n' "${matrix_items}" >>"${GITHUB_OUTPUT}"
          printf 'any=%s\n' "${any}" >>"${GITHUB_OUTPUT}"

  gate:
    name: ${{ matrix.display }}
    needs: changes
    if: ${{ needs.changes.outputs.any == 'true' }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - name: Install ripgrep and jq
        run: scripts/ci/install-apt-packages.sh ripgrep jq
      - name: Run test mirror (${{ matrix.key }})
        run: ${{ matrix.test }}
      - name: Run gate (${{ matrix.key }})
        run: ${{ matrix.gate }}
