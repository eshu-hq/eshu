name: Build Test

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Verify CodeQL setup model
        run: |
          scripts/test-verify-codeql-setup.sh
          scripts/verify-codeql-setup.sh

      - name: Verify hot-path evidence
        run: |
          scripts/test-verify-performance-evidence.sh
          scripts/verify-performance-evidence.sh

      - name: Verify query-plan regression gate
        run: |
          scripts/test-verify-query-plan-regression.sh
          scripts/verify-query-plan-regression.sh

      - name: Verify scale corpus suite
        run: |
          scripts/test-verify-scale-corpus-suite.sh
          scripts/verify-scale-corpus-suite.sh

      - name: Verify scale benchmark artifact
        run: |
          scripts/test-verify-scale-benchmark-artifact.sh
          scripts/verify-scale-benchmark-artifact.sh

      - name: Verify package docs
        run: |
          scripts/test-verify-package-docs.sh
          scripts/verify-package-docs.sh

      - name: Verify generated collector entrypoints
        run: |
          scripts/test-verify-collector-entrypoints-generated.sh
          scripts/verify-collector-entrypoints-generated.sh

      - name: Verify skillgen roundtrip
        run: |
          scripts/test-verify-skill-roundtrip.sh
          scripts/verify-skill-roundtrip.sh

      - name: Verify vulnerability parity fixtures
        run: scripts/verify_vulnerability_parity_fixtures.sh

      - name: Verify accuracy golden gate
        run: scripts/verify_accuracy_golden_gate.sh

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: Lint Go
        working-directory: go
        run: golangci-lint run ./...

      - name: Build all Go binaries
        working-directory: go
        run: go build ./...

      - name: Clear non-race Go cache
        working-directory: go
        run: go clean -cache -testcache

      - name: Run Go tests with race detector
        working-directory: go
        run: go test ./... -count=1 -race -timeout 300s -p 2

      - name: Lint Helm chart
        run: helm lint deploy/helm/eshu

      - name: Verify docs build
        run: |
          pip install mkdocs mkdocs-material pymdown-extensions
          mkdocs build --strict --clean --config-file docs/mkdocs.yml

      - name: Check whitespace hygiene
        run: git show --check --format= HEAD
