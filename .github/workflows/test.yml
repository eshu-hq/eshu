name: Build Test

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Decide whether this event changed any non-docs path. A docs-only PR (docs
  # tree, root markdown, mkdocs config) skips the heavy Go lanes below; the
  # always-on docs-helm-hygiene job still builds the docs. Non-PR events (push
  # to main, nightly schedule, manual dispatch) always run the heavy lanes — the
  # per-job `if` short-circuits on `github.event_name != 'pull_request'` — so a
  # docs commit that lands on main is never left unverified.
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # `code` is true when ANY changed file is outside the docs set. The
          # negations only strip the docs tree, root-level markdown, mkdocs
          # config, and workflow markdown — so a package doc under go/**/*.md
          # still counts as code (it lives with the code and is tied to it).
          filters: |
            code:
              - '**'
              - '!docs/**'
              - '!*.md'
              - '!mkdocs.yml'
              - '!.github/**/*.md'

  verify-contracts:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install ripgrep
        run: scripts/ci/install-apt-packages.sh ripgrep

      - name: Verify CodeQL setup model
        run: |
          scripts/test-verify-codeql-setup.sh
          scripts/verify-codeql-setup.sh

      - name: Verify hot-path evidence
        run: |
          scripts/test-verify-performance-evidence.sh
          scripts/verify-performance-evidence.sh

      - name: Verify query-plan regression gate
        run: |
          scripts/test-verify-query-plan-regression.sh
          scripts/verify-query-plan-regression.sh

      - name: Verify scale corpus suite
        run: |
          scripts/test-verify-scale-corpus-suite.sh
          scripts/verify-scale-corpus-suite.sh

      - name: Verify scale benchmark artifact
        run: |
          scripts/test-verify-scale-benchmark-artifact.sh
          scripts/verify-scale-benchmark-artifact.sh

      - name: Verify capability budget proof
        run: |
          scripts/test-verify-capability-budget-proof.sh
          scripts/verify-capability-budget-proof.sh

      - name: Verify package docs
        run: |
          scripts/test-verify-package-docs.sh
          scripts/verify-package-docs.sh

      - name: Verify Go license headers
        run: |
          scripts/test-verify-license-header.sh
          scripts/verify-license-header.sh

      - name: Verify generated collector entrypoints
        run: |
          scripts/test-verify-collector-entrypoints-generated.sh
          scripts/verify-collector-entrypoints-generated.sh

      - name: Verify skillgen roundtrip
        run: |
          scripts/test-verify-skill-roundtrip.sh
          scripts/verify-skill-roundtrip.sh

      - name: Verify vulnerability parity fixtures
        run: scripts/verify_vulnerability_parity_fixtures.sh

      - name: Verify accuracy golden gate
        run: scripts/verify_accuracy_golden_gate.sh

      - name: Verify parser relationship and language ledger
        run: |
          scripts/test-verify-parser-relationship-kit.sh
          scripts/verify-parser-relationship-kit.sh

  go-core:
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install ripgrep
        run: scripts/ci/install-apt-packages.sh ripgrep

      - name: Install golangci-lint
        if: ${{ !cancelled() }}
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Build golangci-lint filelength plugin
        if: ${{ !cancelled() }}
        working-directory: tools/golangci-lint-filelength
        run: make build

      - name: Lint Go
        if: ${{ !cancelled() }}
        working-directory: go
        run: golangci-lint run ./...

      - name: Check gofumpt formatting
        if: ${{ !cancelled() }}
        # gofumpt is configured under `formatters` in v2, so it is
        # NOT enforced by `golangci-lint run`. Run the formatter
        # check separately so a non-gofumpt-clean tree fails CI
        # (codex P2 review on PR #3847).
        working-directory: go
        run: golangci-lint fmt --diff

      - name: Build all Go binaries
        if: ${{ !cancelled() }}
        working-directory: go
        run: go build ./...

  go-race:
    # Sharded authoritative race gate. Each shard runs `go test -race` on a
    # disjoint slice of `go list ./...`; the union across shards is every
    # package, so coverage is identical to the old single `go test ./... -race`.
    #
    # Why sharding does NOT weaken race coverage: `go test -race` instruments the
    # ENTIRE dependency closure of each test binary. A race in package A that is
    # triggered by package B's test is caught when B runs, because A is compiled
    # with -race as B's dependency. Sharding by TEST package only changes which
    # runner runs which test binary — every test binary still instruments its
    # full closure — so no race that was detectable before becomes undetectable.
    #
    # N is `strategy.job-total` (the matrix length), so the round-robin partition
    # `NR % N == matrix.shard % N` self-adjusts when shards are added/removed.
    # The matrix values MUST stay contiguous 1..N or a package slice is dropped.
    needs: changes
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.code == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Set up Helm for race tests
        uses: azure/setup-helm@v5.0.0

      - name: Run Go tests with race detector (shard ${{ matrix.shard }}/${{ strategy.job-total }})
        working-directory: go
        env:
          SHARD_INDEX: ${{ matrix.shard }}
          SHARD_TOTAL: ${{ strategy.job-total }}
        run: |
          set -euo pipefail
          pkgs="$(go list ./... | awk -v n="${SHARD_TOTAL}" -v k="${SHARD_INDEX}" 'NR % n == (k % n)')"
          if [ -z "${pkgs}" ]; then
            echo "shard ${SHARD_INDEX}/${SHARD_TOTAL}: no packages selected — nothing to test"
            exit 0
          fi
          count="$(printf '%s\n' "${pkgs}" | wc -l | tr -d ' ')"
          echo "shard ${SHARD_INDEX}/${SHARD_TOTAL}: ${count} package(s)"
          printf '%s\n' "${pkgs}" | xargs go test -count=1 -race -timeout 300s -p 2

  go-race-complete:
    # Umbrella gate: a single stable status name that is green only when EVERY
    # go-race shard passed. `needs.go-race.result` aggregates the matrix — it is
    # `success` only if all shards succeeded. Point any future required-status-
    # check config at THIS job, not the per-shard legs (whose names carry the
    # shard index and change when N changes).
    #
    # `skipped` is also a pass: on a docs-only PR the `changes` gate skips the
    # go-race matrix, so `needs.go-race.result` is `skipped`. Treating that as
    # green keeps this a single always-reported check whose name is safe to mark
    # required later — it never strands a docs-only PR. Only `failure`/`cancelled`
    # (a shard that actually ran and did not pass) fails the gate.
    needs: go-race
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Assert all race shards passed
        run: |
          result="${{ needs.go-race.result }}"
          echo "aggregated go-race result: ${result}"
          if [ "${result}" != "success" ] && [ "${result}" != "skipped" ]; then
            echo "::error::one or more go-race shards did not succeed (result=${result})"
            exit 1
          fi

  docs-helm-hygiene:
    # Always runs (no changes gate) — this is the docs build that a docs-only PR
    # needs, and it hosts the static guard that the docs-only carve-out wiring
    # above stays intact even on the docs-only PRs it governs.
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Install ripgrep
        run: scripts/ci/install-apt-packages.sh ripgrep

      - name: Verify docs-only CI carve-out wiring
        run: scripts/verify-docs-only-ci-skip.sh

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Lint Helm chart
        run: helm lint deploy/helm/eshu

      - name: Verify docs build
        run: |
          pip install mkdocs mkdocs-material pymdown-extensions
          mkdocs build --strict --clean --config-file docs/mkdocs.yml

      - name: Check whitespace hygiene
        run: git show --check --format= HEAD
