name: Verify CI Gate Registry

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test-verify:
    name: Verify ci-gate registry test mirror
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install ripgrep
        run: scripts/ci/install-apt-packages.sh ripgrep

      - name: Run test mirror
        run: |
          scripts/test-verify-ci-gates-registry.sh
          scripts/test-pre-pr-whole-module-gates.sh

  verify:
    name: Verify ci-gate registry + drift
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: test-verify
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Install ripgrep
        run: scripts/ci/install-apt-packages.sh ripgrep

      - name: Verify ci-gate registry integrity and hook/workflow drift
        run: scripts/verify-ci-gates-registry.sh --drift
