name: Verify Edge Source-Tool Coverage

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test-verify:
    name: Verify edge source-tool coverage test mirror
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run test mirror
        run: bash scripts/test-verify-edge-source-tool-coverage.sh

  verify:
    name: Verify edge source-tool coverage gate
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: test-verify
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Verify edge source-tool coverage gate
        shell: bash
        run: |
          set -o pipefail
          scripts/verify-edge-source-tool-coverage.sh 2>&1 | tee /tmp/edge-source-tool-coverage.log

      - name: Upload drift report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: edge-source-tool-coverage-drift-report
          path: /tmp/edge-source-tool-coverage.log
          if-no-files-found: warn
