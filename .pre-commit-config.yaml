# Local pre-commit hooks that mirror the CI gates which have repeatedly blocked
# PRs, so they fail fast at commit time instead of on GitHub. Setup:
#
#   pip install pre-commit   # or: brew install pre-commit
#   pre-commit install --install-hooks
#   pre-commit install --hook-type pre-push
#
# The Go hooks bootstrap golangci-lint / gosec at the CI-pinned versions using
# the local `go` toolchain on first run (cached under .git/eshu-precommit), so
# they match CI exactly. See scripts/dev/precommit-go.sh.
minimum_pre_commit_version: "3.5.0"
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Exclude the intentionally-crafted fixture/golden corpora: these files
      # carry deliberate trailing whitespace / EOF bytes that the parser and
      # golden tests assert on. Auto-fixing them mangled ~57 fixtures, which
      # pushed contributors to `git commit --no-verify` and so silently skipped
      # the go-lint/go-fmt gates below. Excluding them keeps commits hook-clean.
      - id: trailing-whitespace
        stages: [pre-commit]
        exclude: '^tests/fixtures/|/testdata/|^testdata/'
      - id: end-of-file-fixer
        stages: [pre-commit]
        exclude: '^tests/fixtures/|/testdata/|^testdata/'
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
        args: ["--allow-multiple-documents"]
        # Exclude the fixture/golden corpora: Helm chart templates/*.yaml carry
        # Go-template syntax ({{ .Values.x }}) that is not valid YAML by design
        # (the parser scans them as templates, not via a YAML decode), so a strict
        # YAML check rejects them. Mirrors the trailing-whitespace/EOF excludes
        # above so contributors are not pushed to `git commit --no-verify`.
        #
        # docs/mkdocs.yml is also excluded: MkDocs Material configures emoji via
        # `!!python/name:material.extensions.emoji.twemoji` custom tags, which the
        # generic check-yaml SafeLoader cannot construct. The authoritative gate
        # for that file is `mkdocs build --strict`, which loads the custom tags
        # correctly; a plain YAML decode would reject a valid config and force
        # `--no-verify` on any nav edit.
        #
        # docker-compose.demo.*.yaml and docker-compose.e2e.yaml are excluded
        # for the same reason: they use the Compose Spec `!override` merge tag
        # (to replace the base stack's published-port/volume list with the
        # override stack's non-colliding values rather than append to it),
        # which the generic SafeLoader cannot construct. The authoritative
        # gate is `docker compose -f <file> config` — verify-demo-compose-
        # answers.sh runs it for the demo stack before every proof, and the
        # e2e stack's own local proof (issue #4971) runs it the same way; a
        # plain YAML decode would reject a valid Compose file.
        exclude: '^tests/fixtures/|/testdata/|^testdata/|^docs/mkdocs\.yml$|^deploy/helm/eshu/templates/|^docker-compose\.demo\.|^docker-compose\.e2e\.yaml$'
      - id: check-added-large-files
        stages: [pre-commit]
        # Catches an accidentally-committed Go build artifact (e.g. a bare
        # `go build ./cmd/...` dropping a ~28MB binary).
        args: ["--maxkb=1024"]

  - repo: local
    hooks:
      # Agent-hygiene gates (mirrors verify-agent-hygiene.yml). Fast, non-Go,
      # so they run at commit time. CI re-checks them (the non-bypassable gate).
      - id: agent-canon
        name: shared agent canon and skill contract
        entry: scripts/verify-agent-canon.sh
        language: script
        files: '^((AGENTS|CLAUDE)\.md|\.agents/.*|\.claude/skills/.*|\.codex/skills/.*|\.opencode/agent/.*|scripts/verify-agent-canon\.sh|scripts/test-verify-agent-hygiene\.sh)$'
        pass_filenames: false

      - id: no-ai-attribution-content
        name: no AI attribution (staged content)
        entry: scripts/verify-no-ai-attribution.sh --staged
        language: script
        always_run: true
        pass_filenames: false

      - id: no-ai-attribution-message
        name: no AI attribution (commit message)
        entry: scripts/verify-no-ai-attribution.sh --message
        language: script
        stages: [commit-msg]

      - id: go-fmt
        name: gofumpt formatting (golangci-lint fmt)
        entry: scripts/dev/precommit-go.sh fmt
        language: script
        types: [go]
        pass_filenames: true
        require_serial: true

      - id: go-lint
        name: golangci-lint (changed packages)
        entry: scripts/dev/precommit-go.sh lint
        language: script
        types: [go]
        pass_filenames: true
        require_serial: true

      - id: go-file-cap
        name: 500-line Go file cap
        entry: scripts/dev/precommit-go.sh filecap
        language: script
        types: [go]
        pass_filenames: true

      - id: go-package-docs
        name: Go package docs (doc.go/README.md/AGENTS.md)
        entry: scripts/verify-package-docs.sh
        language: script
        files: '^go/(internal|cmd)/'
        pass_filenames: false

      - id: capability-surface-inventory
        name: capability surface-inventory drift
        entry: scripts/dev/precommit-go.sh surface
        language: script
        files: '^(go/internal/capabilitycatalog/|go/cmd/|specs/surface-inventory)'
        pass_filenames: false
        require_serial: true

      # Gate-registry drift (mirrors verify-ci-gate-registry.yml): when the gate
      # registry, its loader/CLI, this hook config, pre-pr, or any workflow
      # changes, verify the pre-commit hooks and .github/workflows/ stay in
      # lockstep with specs/ci-gates.v1.yaml. Credential-free, Docker-free.
      # (pre-pr step reconciliation lands in #4214 via the registry-driven
      # selector; pre-pr.sh is a trigger here so this re-runs when it changes.)
      - id: gate-registry-drift
        name: ci-gate registry + hook/workflow drift
        entry: scripts/verify-ci-gates-registry.sh --drift
        language: script
        files: '^(specs/ci-gates\.v1\.yaml|go/internal/cigates/|go/cmd/ci-gates/|\.pre-commit-config\.yaml|scripts/dev/pre-pr\.sh|\.github/workflows/.*\.ya?ml)$'
        pass_filenames: false
        require_serial: true

      # pre-pr stamp gate: refuse to push a commit that `make pre-pr` has not
      # validated on this exact SHA. pre-pr.sh writes a per-SHA stamp on success;
      # a rebase or amend afterward goes stale and blocks the push until pre-pr
      # is re-run. This makes a green local gate a hard push-time requirement
      # rather than relying on CI to first catch a failure. Bypass (accepting CI
      # as the first gate) with ESHU_ALLOW_UNSTAMPED_PUSH=1.
      - id: prepr-stamp-verify
        name: pre-pr stamp (validate before push)
        entry: scripts/dev/prepr-stamp-verify.sh
        language: script
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      # gosec is slow on Go 1.26 (per-package SSA); run it at push time, not on
      # every commit.
      - id: go-gosec
        name: gosec (changed packages)
        entry: scripts/dev/precommit-go.sh gosec
        language: script
        types: [go]
        pass_filenames: true
        require_serial: true
        stages: [pre-push]

      # Hot-path performance-evidence gate (test.yml "Verify hot-path evidence"):
      # a change touching storage/cypher, storage/postgres, collector, reducer,
      # query, runtime, workers, or queues needs a tracked No-Regression /
      # No-Observability (or Performance/Benchmark) marker in an evidence file.
      # Diffs the branch against origin/main, so it runs at push time.
      - id: go-perf-evidence
        name: hot-path performance evidence
        entry: scripts/dev/precommit-go.sh perf-evidence
        language: script
        always_run: true
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

      # Telemetry-coverage gate (verify-telemetry-coverage.yml): a new metric or
      # pipeline stage must be reflected in the X1 coverage doc, and the doc must
      # not drift from instruments.go. Diffs the branch against origin/main, so it
      # runs at push time.
      - id: go-telemetry-coverage
        name: telemetry coverage drift
        entry: scripts/dev/precommit-go.sh telemetry
        language: script
        always_run: true
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

      # Frontend changed-file Prettier gate (frontend.yml "Prettier format check"):
      # at commit time, inspect the git index and check only staged frontend
      # JS/TS files so contributors get the same focused format feedback before
      # they create the commit. This intentionally avoids repo-wide
      # `npm run format:check` because existing unrelated drift is noisy.
      - id: frontend-format-staged
        name: frontend prettier staged files
        entry: scripts/verify-frontend-format-changed.sh --staged
        language: script
        files: '^(src|apps/console/src)/.*\.(ts|tsx|js|jsx|mjs|cjs)$'
        pass_filenames: false
        require_serial: true
        stages: [pre-commit]

      # Keep the verifier and hook wiring self-tested at commit time when either
      # the CI mirror, hook config, or verifier scripts change.
      - id: frontend-format-verifier-tests
        name: frontend prettier verifier tests
        entry: scripts/test-verify-frontend-format-changed.sh
        language: script
        files: '^(\.pre-commit-config\.yaml|\.github/workflows/frontend\.yml|scripts/(verify-frontend-format-changed|test-verify-frontend-format-changed)\.sh)$'
        pass_filenames: false
        require_serial: true
        stages: [pre-commit]

      # Docs-build changed-file gate: at commit time, inspect the git index and
      # run mkdocs build --strict on staged docs/navigation/project-guidance files
      # only, so contributors catch mkdocs build errors before pushing. This avoids
      # running mkdocs on every commit when only source code changed.
      - id: docs-build-staged
        name: docs build (staged files)
        entry: scripts/verify-docs-build-changed.sh --staged
        language: script
        files: '^(docs/|README\.md|AGENTS\.md|CLAUDE\.md|\.opencode/agent/.*\.md|\.agents/skills/.*\.md|scripts/verify-docs-build-changed\.sh|scripts/test-verify-docs-build-changed\.sh)'
        pass_filenames: false
        require_serial: true
        stages: [pre-commit]

      # Keep the docs-build verifier and hook wiring self-tested at commit time
      # when either the hook config or verifier scripts change.
      - id: docs-build-verifier-tests
        name: docs build verifier tests
        entry: scripts/test-verify-docs-build-changed.sh
        language: script
        files: '^(\.pre-commit-config\.yaml|scripts/(verify-docs-build-changed|test-verify-docs-build-changed)\.sh)$'
        pass_filenames: false
        require_serial: true
        stages: [pre-commit]

      # Keep the console pre-push helper self-tested when its branch-diff
      # routing or hook wiring changes. The helper must skip cleanly before
      # requiring node_modules when a branch has no apps/console changes.
      - id: console-e2e-verifier-tests
        name: console e2e pre-push verifier tests
        entry: scripts/test-precommit-console.sh
        language: script
        files: '^(\.pre-commit-config\.yaml|scripts/(dev/precommit-console|test-precommit-console)\.sh)$'
        pass_filenames: false
        require_serial: true
        stages: [pre-commit]

      # Frontend changed-file Prettier gate (frontend.yml "Prettier format check"):
      # diffs the branch against origin/main and checks only changed JS/TS files,
      # so local pushes fail on the same format drift surfaced in CI without
      # blocking on unrelated repo-wide Prettier drift.
      - id: frontend-format-changed
        name: frontend prettier changed files
        entry: scripts/verify-frontend-format-changed.sh
        language: script
        always_run: true
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

      # Docs-build changed-file gate (mirrors CI docs build in test.yml): diffs
      # the branch against origin/main and checks only changed docs/navigation/
      # project-guidance files, so local pushes fail on the same mkdocs build
      # errors surfaced in CI without blocking on unrelated changes.
      - id: docs-build-changed
        name: docs build (changed files)
        entry: scripts/verify-docs-build-changed.sh
        language: script
        always_run: true
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

      # Console per-page e2e gate (frontend.yml "Console (apps/console)" job):
      # exercises real route rendering in headless Chromium across all 84 pages.
      # The unit suite (console:test) cannot catch a route that renders blank or
      # a stale e2e selector that no longer matches the DOM — only this gate can.
      # It boots a Vite dev server + Chromium, so it is slow; run it at push time
      # when any console file changed, not on every commit.
      - id: console-e2e
        name: console per-page e2e (apps/console)
        entry: scripts/dev/precommit-console.sh e2e
        language: script
        always_run: true
        pass_filenames: false
        require_serial: true
        stages: [pre-push]
