version: v2

# proto/eshu/data_plane is not the collector<->reducer fact IDL source of
# truth. See docs/internal/design/4574-fact-idl-decision.md: the normative
# fact IDL is specs/fact-kind-registry.v1.yaml plus sdk/go/factschema, with
# JSON Schemas generated from those Go types. This file configures generation
# for the unwired proto/eshu/data_plane tree, tracked for removal in #4599.
managed:
  enabled: true

plugins:
  - remote: buf.build/protocolbuffers/go
    out: go/gen/proto
