apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eshu
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/eshu-hq/eshu.git
    targetRevision: main
    path: deploy/helm/eshu
    helm:
      releaseName: eshu
      valueFiles:
        - deploy/argocd/base/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: eshu
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
