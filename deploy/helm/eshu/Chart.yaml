apiVersion: v2
name: eshu
description: Eshu API and repository ingester workloads with MCP, indexing, and repo sync.
type: application
version: 0.0.3-pre-release-18
appVersion: "v0.0.3-pre-release-4"
# Helm 3.3.2+ disallows extra top-level Chart.yaml fields; the official
# extension point is `annotations:`. Artifact Hub reads the chart license
# from the `artifacthub.io/license` annotation (must be a valid SPDX
# identifier), so this is the canonical place to surface MIT to chart
# registries. See https://helm.sh/docs/topics/charts/#the-chartyaml-file
# and https://artifacthub.io/docs/topics/annotations/helm/.
annotations:
  artifacthub.io/license: MIT
