{{- if .Values.azureCloudCollector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eshu.azureCloudCollectorFullname" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: azure-cloud-collector
spec:
  replicas: {{ .Values.azureCloudCollector.replicas }}
  revisionHistoryLimit: {{ .Values.azureCloudCollector.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "eshu.azureCloudCollectorSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eshu.azureCloudCollectorSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "eshu.azureCloudCollectorServiceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: azure-cloud-collector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/eshu-collector-azure-cloud"]
          args:
            - "-mode"
            - "claimed-live"
            - "-redaction-key-file"
            - {{ printf "%s/%s" .Values.azureCloudCollector.redaction.mountPath .Values.azureCloudCollector.redaction.keyKey | quote }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: ESHU_HOME
              value: /tmp/.eshu
            - name: HOME
              value: /tmp
            {{- include "eshu.renderContentStoreEnv" . | nindent 12 }}
            {{- include "eshu.renderConnectionTuningEnv" .Values.azureCloudCollector.connectionTuning | nindent 12 }}
            {{- include "eshu.renderAzureCloudCollectorEnv" . | nindent 12 }}
            {{- include "eshu.renderOtelEnv" (dict "Values" .Values "component" "azure-cloud-collector") | nindent 12 }}
            {{- include "eshu.renderPrometheusEnv" . | nindent 12 }}
            {{- include "eshu.renderEnvMap" .Values.env | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
            {{- if .Values.observability.prometheus.enabled }}
            - name: metrics
              containerPort: {{ .Values.observability.prometheus.port }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.azureCloudCollector.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: azure-redaction
              mountPath: {{ .Values.azureCloudCollector.redaction.mountPath | quote }}
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: azure-redaction
          secret:
            secretName: {{ .Values.azureCloudCollector.redaction.secretName }}
            items:
              - key: {{ .Values.azureCloudCollector.redaction.keyKey }}
                path: {{ .Values.azureCloudCollector.redaction.keyKey }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
