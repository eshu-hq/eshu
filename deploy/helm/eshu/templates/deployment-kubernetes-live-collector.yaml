{{- if .Values.kubernetesLiveCollector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eshu.kubernetesLiveCollectorFullname" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: kubernetes-live-collector
spec:
  replicas: {{ .Values.kubernetesLiveCollector.replicas }}
  revisionHistoryLimit: {{ .Values.kubernetesLiveCollector.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "eshu.kubernetesLiveCollectorSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eshu.kubernetesLiveCollectorSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "eshu.kubernetesLiveCollectorServiceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: kubernetes-live-collector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/eshu-collector-kubernetes-live"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: ESHU_HOME
              value: /tmp/.eshu
            - name: HOME
              value: /tmp
            {{- include "eshu.renderContentStoreEnv" . | nindent 12 }}
            {{- include "eshu.renderConnectionTuningEnv" .Values.kubernetesLiveCollector.connectionTuning | nindent 12 }}
            {{- include "eshu.renderKubernetesLiveCollectorEnv" . | nindent 12 }}
            {{- include "eshu.renderOtelEnv" (dict "Values" .Values "component" "kubernetes-live-collector") | nindent 12 }}
            {{- include "eshu.renderPrometheusEnv" . | nindent 12 }}
            {{- include "eshu.renderEnvMap" .Values.env | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
            {{- if .Values.observability.prometheus.enabled }}
            - name: metrics
              containerPort: {{ .Values.observability.prometheus.port }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.kubernetesLiveCollector.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.kubernetesLiveCollector.kubeconfig.secretName }}
            - name: kubeconfig
              mountPath: {{ .Values.kubernetesLiveCollector.kubeconfig.mountPath | quote }}
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.kubernetesLiveCollector.kubeconfig.secretName }}
        - name: kubeconfig
          secret:
            secretName: {{ .Values.kubernetesLiveCollector.kubeconfig.secretName }}
            defaultMode: 0400
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
