{{- if .Values.mcpServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eshu.mcpServerFullname" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  replicas: {{ .Values.mcpServer.replicas }}
  revisionHistoryLimit: {{ .Values.mcpServer.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "eshu.mcpServerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eshu.mcpServerSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "eshu.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mcp-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["eshu", "mcp", "start", "--transport", "http"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: ESHU_HOME
              value: /tmp/.eshu
            - name: HOME
              value: /tmp
            - name: ESHU_MCP_TRANSPORT
              value: http
            # Defense in depth (#5168): the mcp-server container runs
            # `eshu mcp start --transport http`, the same CLI subcommand that
            # defaults the unauth escape hatch on for a loopback bind. This pod
            # binds 0.0.0.0 (non-loopback), so the CLI already withholds the
            # default; setting it false explicitly guarantees the no-silent-open
            # startup gate governs even if that host logic ever changes. The
            # gate is satisfied by the ESHU_API_KEY secret below; if that secret
            # ever resolves empty, the pod fails closed rather than serving an
            # unauthenticated MCP transport.
            - name: ESHU_MCP_ALLOW_UNAUTHENTICATED
              value: "false"
            - name: NEO4J_URI
              value: {{ .Values.neo4j.uri | quote }}
            {{- include "eshu.renderContentStoreEnv" . | nindent 12 }}
            {{- include "eshu.renderConnectionTuningEnv" .Values.mcpServer.connectionTuning | nindent 12 }}
            {{- include "eshu.renderOtelEnv" (dict "Values" .Values "component" "mcp-server") | nindent 12 }}
            {{- include "eshu.renderPrometheusEnv" . | nindent 12 }}
            {{- include "eshu.renderNeo4jAuthEnv" . | nindent 12 }}
            - name: ESHU_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiAuth.secretName }}
                  key: {{ .Values.apiAuth.key }}
            {{- include "eshu.renderEnvMaps" (list .Values.env .Values.mcpServer.env) | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # Liveness uses the cheap, dependency-free /healthz probe so a
          # transient Postgres or graph outage never restarts an otherwise
          # healthy process.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          # Readiness uses /readyz, which verifies Postgres and graph backend
          # connectivity. failureThreshold debounces transient blips: the pod is
          # only pulled from Service endpoints after 3 consecutive failures
          # (~45s), preventing flapping on a brief dependency hiccup.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          resources:
            {{- toYaml .Values.mcpServer.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- with .Values.mcpServer.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- with .Values.mcpServer.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
