{{- if .Values.mcpServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eshu.mcpServerFullname" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  replicas: {{ .Values.mcpServer.replicas }}
  revisionHistoryLimit: {{ .Values.mcpServer.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "eshu.mcpServerSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eshu.mcpServerSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "eshu.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "eshu.renderDataPlaneBootstrapInitContainer" . | nindent 8 }}
      containers:
        - name: mcp-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["eshu", "mcp", "start"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: ESHU_HOME
              value: /tmp/.eshu
            - name: HOME
              value: /tmp
            - name: ESHU_MCP_TRANSPORT
              value: http
            - name: NEO4J_URI
              value: {{ .Values.neo4j.uri | quote }}
            {{- include "eshu.renderContentStoreEnv" . | nindent 12 }}
            {{- include "eshu.renderConnectionTuningEnv" .Values.mcpServer.connectionTuning | nindent 12 }}
            {{- include "eshu.renderOtelEnv" (dict "Values" .Values "component" "mcp-server") | nindent 12 }}
            {{- include "eshu.renderPrometheusEnv" . | nindent 12 }}
            {{- include "eshu.renderNeo4jAuthEnv" . | nindent 12 }}
            - name: ESHU_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiAuth.secretName }}
                  key: {{ .Values.apiAuth.key }}
            {{- include "eshu.renderEnvMap" .Values.env | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if .Values.observability.prometheus.enabled }}
            - name: metrics
              containerPort: {{ .Values.observability.prometheus.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.mcpServer.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
