{{- if .Values.ociRegistryCollector.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eshu.ociRegistryCollectorFullname" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: oci-registry-collector
spec:
  replicas: {{ .Values.ociRegistryCollector.replicas }}
  revisionHistoryLimit: {{ .Values.ociRegistryCollector.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "eshu.ociRegistryCollectorSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eshu.ociRegistryCollectorSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "eshu.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        {{- include "eshu.renderDataPlaneBootstrapInitContainer" . | nindent 8 }}
      containers:
        - name: oci-registry-collector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/eshu-collector-oci-registry"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: ESHU_HOME
              value: /tmp/.eshu
            - name: HOME
              value: /tmp
            {{- include "eshu.renderContentStoreEnv" . | nindent 12 }}
            {{- include "eshu.renderConnectionTuningEnv" .Values.ociRegistryCollector.connectionTuning | nindent 12 }}
            {{- include "eshu.renderOCIRegistryCollectorEnv" . | nindent 12 }}
            {{- include "eshu.renderOtelEnv" (dict "Values" .Values "component" "oci-registry-collector") | nindent 12 }}
            {{- include "eshu.renderPrometheusEnv" . | nindent 12 }}
            {{- include "eshu.renderEnvMap" .Values.env | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
            {{- if .Values.observability.prometheus.enabled }}
            - name: metrics
              containerPort: {{ .Values.observability.prometheus.port }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.ociRegistryCollector.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
