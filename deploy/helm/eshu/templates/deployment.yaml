apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eshu.apiFullname" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  revisionHistoryLimit: {{ .Values.api.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "eshu.apiSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eshu.apiSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "eshu.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: eshu
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["eshu", "api", "start", "--host", {{ .Values.api.bindAddress | default "127.0.0.1" | quote }}, "--port", {{ .Values.service.port | quote }}]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: ESHU_HOME
              value: /tmp/.eshu
            - name: HOME
              value: /tmp
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: NEO4J_URI
              value: {{ .Values.neo4j.uri | quote }}
            {{- include "eshu.renderContentStoreEnv" . | nindent 12 }}
            {{- include "eshu.renderConnectionTuningEnv" .Values.api.connectionTuning | nindent 12 }}
            {{- include "eshu.renderOtelEnv" (dict "Values" .Values "component" "api") | nindent 12 }}
            {{- include "eshu.renderPrometheusEnv" . | nindent 12 }}
            {{- include "eshu.renderPrometheusMimirTimeSeriesEnv" . | nindent 12 }}
            {{- include "eshu.renderNeo4jAuthEnv" . | nindent 12 }}
            - name: ESHU_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiAuth.secretName }}
                  key: {{ .Values.apiAuth.key }}
            {{- include "eshu.renderEnvMaps" (list .Values.env .Values.api.env) | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          # Liveness uses the cheap, dependency-free /healthz probe so a
          # transient Postgres or graph outage never restarts an otherwise
          # healthy process.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          # Readiness uses /readyz, which verifies Postgres and graph backend
          # connectivity. failureThreshold debounces transient blips: the pod is
          # only pulled from Service endpoints after 3 consecutive failures
          # (~45s), preventing flapping on a brief dependency hiccup.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- with .Values.api.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- with .Values.api.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
