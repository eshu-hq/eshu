{{- if .Values.pagerDutyCollector.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "eshu.pagerDutyCollectorFullname" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: pagerduty-collector
spec:
  podSelector:
    matchLabels:
      {{- include "eshu.pagerDutyCollectorSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
        {{- if .Values.observability.prometheus.enabled }}
        - protocol: TCP
          port: {{ .Values.observability.prometheus.port }}
        {{- end }}
  egress:
    - {}
{{- end }}
