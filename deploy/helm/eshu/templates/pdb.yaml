apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "eshu.fullname" . }}-api
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "eshu.apiSelectorLabels" . | nindent 6 }}
---
{{- if .Values.mcpServer.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "eshu.mcpServerFullname" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "eshu.mcpServerSelectorLabels" . | nindent 6 }}
---
{{- end }}
