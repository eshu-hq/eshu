{{- if .Values.observability.prometheus.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eshu.apiMetricsServiceName" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "eshu.apiSelectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.observability.prometheus.port }}
      targetPort: metrics
      protocol: TCP
{{- end }}
