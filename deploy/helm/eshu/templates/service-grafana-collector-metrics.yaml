{{- if and .Values.grafanaCollector.enabled .Values.observability.prometheus.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eshu.grafanaCollectorMetricsServiceName" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana-collector
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "eshu.grafanaCollectorSelectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.observability.prometheus.port }}
      targetPort: metrics
      protocol: TCP
{{- end }}
