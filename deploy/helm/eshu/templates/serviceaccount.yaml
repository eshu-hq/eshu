{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eshu.serviceAccountName" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- $awsCloudCollectorServiceAccount := default dict .Values.awsCloudCollector.serviceAccount }}
{{- if and .Values.awsCloudCollector.enabled $awsCloudCollectorServiceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eshu.awsCloudCollectorServiceAccountName" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: aws-cloud-collector
  {{- with $awsCloudCollectorServiceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- $gcpCloudCollectorServiceAccount := default dict .Values.gcpCloudCollector.serviceAccount }}
{{- if and .Values.gcpCloudCollector.enabled $gcpCloudCollectorServiceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eshu.gcpCloudCollectorServiceAccountName" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: gcp-cloud-collector
  {{- with $gcpCloudCollectorServiceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- $kubernetesLiveCollectorServiceAccount := default dict .Values.kubernetesLiveCollector.serviceAccount }}
{{- if and .Values.kubernetesLiveCollector.enabled $kubernetesLiveCollectorServiceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eshu.kubernetesLiveCollectorServiceAccountName" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: kubernetes-live-collector
  {{- with $kubernetesLiveCollectorServiceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- $vaultLiveCollectorServiceAccount := default dict .Values.vaultLiveCollector.serviceAccount }}
{{- if and .Values.vaultLiveCollector.enabled $vaultLiveCollectorServiceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eshu.vaultLiveCollectorServiceAccountName" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: vault-live-collector
  {{- with $vaultLiveCollectorServiceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
