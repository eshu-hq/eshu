{{- if and .Values.observability.prometheus.enabled .Values.observability.prometheus.serviceMonitor.enabled .Values.gcpCloudCollector.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "eshu.gcpCloudCollectorMetricsServiceName" . }}
  labels:
    {{- include "eshu.labels" . | nindent 4 }}
    app.kubernetes.io/component: gcp-cloud-collector
    {{- with .Values.observability.prometheus.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "eshu.labels" . | nindent 6 }}
      app.kubernetes.io/component: gcp-cloud-collector
  endpoints:
    - port: metrics
      path: {{ .Values.observability.prometheus.path | quote }}
      interval: {{ .Values.observability.prometheus.serviceMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.observability.prometheus.serviceMonitor.scrapeTimeout | quote }}
{{- end }}
