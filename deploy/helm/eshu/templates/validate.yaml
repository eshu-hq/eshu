{{- end -}}
{{- if .Values.webhookListener.enabled -}}
{{- if and (not .Values.webhookListener.github.enabled) (not .Values.webhookListener.gitlab.enabled) (not .Values.webhookListener.bitbucket.enabled) (not .Values.webhookListener.awsFreshness.enabled) (not .Values.webhookListener.pagerDuty.enabled) (not .Values.webhookListener.jira.enabled) -}}
{{- fail "webhookListener requires at least one enabled provider" -}}
{{- end -}}
{{- if and .Values.webhookListener.github.enabled (not .Values.webhookListener.github.secretName) -}}
{{- fail "webhookListener.github.secretName is required when webhookListener.github.enabled=true" -}}
{{- end -}}
{{- if and .Values.webhookListener.gitlab.enabled (not .Values.webhookListener.gitlab.secretName) -}}
{{- fail "webhookListener.gitlab.secretName is required when webhookListener.gitlab.enabled=true" -}}
{{- end -}}
{{- if and .Values.webhookListener.bitbucket.enabled (not .Values.webhookListener.bitbucket.secretName) -}}
{{- fail "webhookListener.bitbucket.secretName is required when webhookListener.bitbucket.enabled=true" -}}
{{- end -}}
{{- if and .Values.webhookListener.awsFreshness.enabled (not .Values.webhookListener.awsFreshness.secretName) -}}
{{- fail "webhookListener.awsFreshness.secretName is required when webhookListener.awsFreshness.enabled=true" -}}
{{- end -}}
{{- if and .Values.webhookListener.pagerDuty.enabled (not .Values.webhookListener.pagerDuty.secretName) -}}
{{- fail "webhookListener.pagerDuty.secretName is required when webhookListener.pagerDuty.enabled=true" -}}
{{- end -}}
{{- if and .Values.webhookListener.pagerDuty.enabled (not .Values.webhookListener.pagerDuty.scopeId) -}}
{{- fail "webhookListener.pagerDuty.scopeId is required when webhookListener.pagerDuty.enabled=true" -}}
{{- end -}}
{{- if and .Values.webhookListener.jira.enabled (not .Values.webhookListener.jira.secretName) -}}
{{- fail "webhookListener.jira.secretName is required when webhookListener.jira.enabled=true" -}}
{{- end -}}
{{- if and .Values.webhookListener.jira.enabled (not .Values.webhookListener.jira.scopeId) -}}
{{- fail "webhookListener.jira.scopeId is required when webhookListener.jira.enabled=true" -}}
{{- end -}}
{{- end -}}
{{- if .Values.confluenceCollector.enabled -}}
{{- if not .Values.confluenceCollector.baseUrl -}}
{{- fail "confluenceCollector.baseUrl is required when confluenceCollector.enabled=true" -}}
{{- end -}}
{{- if and (not .Values.confluenceCollector.spaceId) (not .Values.confluenceCollector.spaceIds) (not .Values.confluenceCollector.rootPageId) -}}
{{- fail "confluenceCollector requires exactly one of confluenceCollector.spaceId, confluenceCollector.spaceIds, or confluenceCollector.rootPageId" -}}
{{- end -}}
{{- if and .Values.confluenceCollector.spaceId .Values.confluenceCollector.rootPageId -}}
{{- fail "confluenceCollector requires exactly one of confluenceCollector.spaceId, confluenceCollector.spaceIds, or confluenceCollector.rootPageId, not more than one" -}}
{{- end -}}
{{- if and .Values.confluenceCollector.spaceId .Values.confluenceCollector.spaceIds -}}
{{- fail "confluenceCollector requires exactly one of confluenceCollector.spaceId, confluenceCollector.spaceIds, or confluenceCollector.rootPageId, not more than one" -}}
{{- end -}}
{{- if and .Values.confluenceCollector.spaceIds .Values.confluenceCollector.rootPageId -}}
{{- fail "confluenceCollector requires exactly one of confluenceCollector.spaceId, confluenceCollector.spaceIds, or confluenceCollector.rootPageId, not more than one" -}}
{{- end -}}
{{- if not .Values.confluenceCollector.credentials.secretName -}}
{{- fail "confluenceCollector.credentials.secretName is required when confluenceCollector.enabled=true" -}}
{{- end -}}
{{- if and (not .Values.confluenceCollector.credentials.bearerTokenKey) (or (not .Values.confluenceCollector.credentials.emailKey) (not .Values.confluenceCollector.credentials.apiTokenKey)) -}}
{{- fail "confluenceCollector credentials require bearerTokenKey or both emailKey and apiTokenKey" -}}
{{- end -}}
{{- end -}}
