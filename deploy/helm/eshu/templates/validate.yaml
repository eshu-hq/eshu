{{- range .Values.workflowCoordinator.collectorInstances -}}
{{- if and (eq (default "" .collector_kind) "pagerduty") (default false .claims_enabled) (default false .enabled) -}}
{{- $pagerDutyCoordinatorMatch = true -}}
{{- end -}}
{{- end -}}
{{- if not $pagerDutyCoordinatorMatch -}}
{{- fail "workflowCoordinator.collectorInstances must contain an enabled claim-driven pagerduty instance when pagerDutyCollector.enabled=true" -}}
{{- end -}}
{{- end -}}
{{- if .Values.grafanaCollector.enabled -}}
{{- $grafanaCoordinatorMatch := false -}}
{{- range .Values.workflowCoordinator.collectorInstances -}}
{{- if and (eq (default "" .collector_kind) "grafana") (default false .claims_enabled) (default false .enabled) -}}
{{- $grafanaCoordinatorMatch = true -}}
{{- end -}}
{{- end -}}
{{- if not $grafanaCoordinatorMatch -}}
{{- fail "workflowCoordinator.collectorInstances must contain an enabled claim-driven grafana instance when grafanaCollector.enabled=true" -}}
{{- end -}}
{{- end -}}
