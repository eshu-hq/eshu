{{- if and .Values.exposure.ingress.enabled .Values.exposure.gateway.enabled -}}
{{- fail "exposure.ingress.enabled and exposure.gateway.enabled cannot both be true" -}}
{{- end -}}
{{- if and (eq .Values.repoSync.auth.method "ssh") (eq .Values.repoSync.source.mode "githubOrg") -}}
{{- fail "repoSync.auth.method=ssh requires repoSync.source.mode=explicit or filesystem" -}}
{{- end -}}
{{- if and (eq .Values.exposure.ingress.backend "mcp") (not .Values.mcpServer.enabled) -}}
{{- fail "exposure.ingress.backend=mcp requires mcpServer.enabled=true" -}}
{{- end -}}
{{- if and (eq .Values.exposure.gateway.backend "mcp") (not .Values.mcpServer.enabled) -}}
{{- fail "exposure.gateway.backend=mcp requires mcpServer.enabled=true" -}}
{{- end -}}
{{- if and .Values.ociRegistryCollector.enabled (not .Values.ociRegistryCollector.targets) -}}
{{- fail "ociRegistryCollector.targets must contain at least one target when ociRegistryCollector.enabled=true" -}}
{{- end -}}
{{- if .Values.terraformStateCollector.enabled -}}
{{- if not .Values.terraformStateCollector.instanceId -}}
{{- fail "terraformStateCollector.instanceId is required when terraformStateCollector.enabled=true" -}}
{{- end -}}
{{- if not .Values.terraformStateCollector.collectorInstances -}}
{{- fail "terraformStateCollector.collectorInstances must contain at least one instance when terraformStateCollector.enabled=true" -}}
{{- end -}}
{{- if not .Values.terraformStateCollector.redaction.secretName -}}
{{- fail "terraformStateCollector.redaction.secretName is required when terraformStateCollector.enabled=true" -}}
{{- end -}}
{{- if not .Values.terraformStateCollector.redaction.keyKey -}}
{{- fail "terraformStateCollector.redaction.keyKey is required when terraformStateCollector.enabled=true" -}}
{{- end -}}
{{- if not .Values.terraformStateCollector.redaction.rulesetVersion -}}
{{- fail "terraformStateCollector.redaction.rulesetVersion is required when terraformStateCollector.enabled=true" -}}
{{- end -}}
{{- end -}}
{{- if .Values.awsCloudCollector.enabled -}}
{{- if not .Values.awsCloudCollector.instanceId -}}
{{- fail "awsCloudCollector.instanceId is required when awsCloudCollector.enabled=true" -}}
{{- end -}}
{{- if not .Values.awsCloudCollector.collectorInstances -}}
{{- fail "awsCloudCollector.collectorInstances must contain at least one instance when awsCloudCollector.enabled=true" -}}
{{- end -}}
{{- end -}}
{{- if .Values.packageRegistryCollector.enabled -}}
{{- if not .Values.packageRegistryCollector.instanceId -}}
{{- fail "packageRegistryCollector.instanceId is required when packageRegistryCollector.enabled=true" -}}
{{- end -}}
{{- if not .Values.packageRegistryCollector.collectorInstances -}}
{{- fail "packageRegistryCollector.collectorInstances must contain at least one instance when packageRegistryCollector.enabled=true" -}}
{{- end -}}
{{- end -}}
{{- if and .Values.workflowCoordinator.enabled (ne .Values.workflowCoordinator.deploymentMode "dark") -}}
{{- fail "workflowCoordinator.deploymentMode must remain dark in this chart until coordinator-owned claims finish proof validation" -}}
{{- end -}}
{{- if and .Values.workflowCoordinator.enabled .Values.workflowCoordinator.claimsEnabled -}}
{{- fail "workflowCoordinator.claimsEnabled must remain false in this chart; use the documented Compose proof path for active claim validation" -}}
{{- end -}}
{{- if .Values.webhookListener.enabled -}}
{{- if and (not .Values.webhookListener.github.enabled) (not .Values.webhookListener.gitlab.enabled) (not .Values.webhookListener.bitbucket.enabled) (not .Values.webhookListener.awsFreshness.enabled) -}}
{{- fail "webhookListener requires at least one enabled provider" -}}
{{- end -}}
{{- if and .Values.webhookListener.github.enabled (not .Values.webhookListener.github.secretName) -}}
{{- fail "webhookListener.github.secretName is required when webhookListener.github.enabled=true" -}}
{{- end -}}
{{- if and .Values.webhookListener.gitlab.enabled (not .Values.webhookListener.gitlab.secretName) -}}
{{- fail "webhookListener.gitlab.secretName is required when webhookListener.gitlab.enabled=true" -}}
{{- end -}}
{{- if and .Values.webhookListener.bitbucket.enabled (not .Values.webhookListener.bitbucket.secretName) -}}
{{- fail "webhookListener.bitbucket.secretName is required when webhookListener.bitbucket.enabled=true" -}}
{{- end -}}
{{- if and .Values.webhookListener.awsFreshness.enabled (not .Values.webhookListener.awsFreshness.secretName) -}}
{{- fail "webhookListener.awsFreshness.secretName is required when webhookListener.awsFreshness.enabled=true" -}}
{{- end -}}
{{- end -}}
{{- if .Values.confluenceCollector.enabled -}}
{{- if not .Values.confluenceCollector.baseUrl -}}
{{- fail "confluenceCollector.baseUrl is required when confluenceCollector.enabled=true" -}}
{{- end -}}
{{- if and (not .Values.confluenceCollector.spaceId) (not .Values.confluenceCollector.rootPageId) -}}
{{- fail "confluenceCollector requires exactly one of confluenceCollector.spaceId or confluenceCollector.rootPageId" -}}
{{- end -}}
{{- if and .Values.confluenceCollector.spaceId .Values.confluenceCollector.rootPageId -}}
{{- fail "confluenceCollector requires exactly one of confluenceCollector.spaceId or confluenceCollector.rootPageId, not both" -}}
{{- end -}}
{{- if not .Values.confluenceCollector.credentials.secretName -}}
{{- fail "confluenceCollector.credentials.secretName is required when confluenceCollector.enabled=true" -}}
{{- end -}}
{{- if and (not .Values.confluenceCollector.credentials.bearerTokenKey) (or (not .Values.confluenceCollector.credentials.emailKey) (not .Values.confluenceCollector.credentials.apiTokenKey)) -}}
{{- fail "confluenceCollector credentials require bearerTokenKey or both emailKey and apiTokenKey" -}}
{{- end -}}
{{- end -}}
