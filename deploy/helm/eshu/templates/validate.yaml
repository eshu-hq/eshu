{{- range .Values.workflowCoordinator.collectorInstances -}}
{{- if and (eq (default "" .collector_kind) "prometheus_mimir") (default false .claims_enabled) (default false .enabled) -}}
{{- $metricCoordinatorMatch = true -}}
{{- end -}}
{{- end -}}
{{- if not $metricCoordinatorMatch -}}
{{- fail "workflowCoordinator.collectorInstances must contain an enabled claim-driven prometheus_mimir instance when prometheusMimirCollector.enabled=true" -}}
{{- end -}}
{{- end -}}
