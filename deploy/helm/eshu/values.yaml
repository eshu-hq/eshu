image:
  repository: ghcr.io/eshu-hq/eshu
  tag: "v0.0.2"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

initContainerSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

schemaBootstrap:
  enabled: true
  useHelmHooks: true
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 86400
  serviceAccountName: ""
  annotations: {}
  podAnnotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1Gi

service:
  type: ClusterIP
  port: 8080
  annotations: {}

networkPolicy:
  enabled: true
  egress:
    # broad preserves existing chart compatibility. The Kubernetes pod network
    # namespace isolates pods by IP; binding restricts to the pod IP (0.0.0.0
    # from the pod's perspective). Use NetworkPolicy mode=restricted for
    # egress hardening and Service type=ClusterIP for ingress isolation.
    # Set to restricted when every required datastore.to, classes[].to,
    # and graph destination is populated.
    mode: broad
    dns:
      enabled: true
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    datastores:
      enabled: true
      to: []
      ports:
        - protocol: TCP
          port: 5432
    graph:
      enabled: true
      to: []
      ports:
        - protocol: TCP
          port: 7687
    internalServices:
      enabled: true
      to: []
      ports:
        - protocol: TCP
          port: 8080
    classes:
      api:
        enabled: true
        to: []
        ports:
          - protocol: TCP
            port: 443
      mcp:
        enabled: true
        to: []
        ports:
          - protocol: TCP
            port: 443
      repoSync:
        enabled: true
        to: []
        ports:
          - protocol: TCP
            port: 443
      collectorProviders:
        enabled: true
        to: []
        ports:
          - protocol: TCP
            port: 443
      semanticProviders:
        enabled: true
        to: []
        ports:
          - protocol: TCP
            port: 443
      extensions:
        enabled: true
        to: []
        ports:
          - protocol: TCP
            port: 443

apiAuth:
  secretName: eshu-api-auth
  key: api-key

api:
  replicas: 1
  revisionHistoryLimit: 3
  bindAddress: 0.0.0.0
  env: {}
  # extraVolumes / extraVolumeMounts let an operator mount additional read-only
  # material (for example an ESHU_SCOPED_TOKENS_FILE registry Secret) into the
  # API container without forking the chart. Pair them with api.env to point
  # ESHU_SCOPED_TOKENS_FILE at the mounted path.
  extraVolumes: []
  extraVolumeMounts: []
  connectionTuning:
    postgres:
      maxOpenConns: ""
      maxIdleConns: ""
      connMaxLifetime: ""
      connMaxIdleTime: ""
      pingTimeout: ""
    neo4j:
      maxConnectionPoolSize: ""
      maxConnectionLifetime: ""
      connectionAcquisitionTimeout: ""
      socketConnectTimeout: ""
      verifyTimeout: ""
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 8Gi

