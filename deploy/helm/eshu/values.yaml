  environment: ""
  otel:
    enabled: false
    endpoint: ""
    protocol: grpc
    insecure: true
    headers: {}
    tracesExporter: otlp
    metricsExporter: otlp
    logsExporter: none
    resourceAttributes: {}
    excludedUrls:
      - /health
      - /api/v0/health
      - /api/v0/docs
      - /api/v0/openapi.json
      - /api/v0/redoc
    metricExportIntervalSeconds: 30
  prometheus:
    enabled: false
    host: 0.0.0.0
    port: 9464
    path: /metrics
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      labels: {}

neo4j:
  uri: bolt://neo4j:7687
  auth:
    secretName: eshu-neo4j
    username: neo4j
    password: ""
    usernameKey: username
    passwordKey: password

nornicdb:
  enabled: false
  image:
    repository: timothyswt/nornicdb-cpu-bge
    tag: "v1.1.9@sha256:9a5126d306a48c01869809da47a869a4521b9328a7ab1c855327f5fd7541e4cd"
    pullPolicy: IfNotPresent
  ports:
    http: 7474
    bolt: 7687
  bindAddress: 0.0.0.0
  env:
    NORNICDB_NO_AUTH: "true"
    NORNICDB_DATA_DIR: /data
    NORNICDB_ASYNC_WRITES_ENABLED: "false"
    NORNICDB_HEIMDALL_ENABLED: "false"
    NORNICDB_QDRANT_GRPC_ENABLED: "false"
    NORNICDB_EMBEDDING_ENABLED: "false"
    NORNICDB_SEARCH_BM25_ENABLED: "false"
    NORNICDB_SEARCH_VECTOR_ENABLED: "false"
    NORNICDB_SEARCH_BM25_WARMING: lazy
    NORNICDB_SEARCH_VECTOR_WARMING: lazy
    NORNICDB_PERSIST_SEARCH_INDEXES: "false"
    GOMEMLIMIT: "48GiB"
  resources:
    requests:
      cpu: 2000m
      memory: 16Gi
    limits:
      cpu: 8000m
      memory: 64Gi
  persistence:
    enabled: true
    storageClass: ""
    size: 500Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

repoSync:
  enabled: true
  bootstrap: true
  initialDelaySeconds: 0
  intervalSeconds: 900
  source:
    mode: githubOrg
    githubOrg: eshu-hq
    repositories: []
    rules: []
    filesystemRoot: /fixtures
    cloneDepth: 1
    limit: 4000
  auth:
    method: githubApp
    githubApp:
      secretName: github-app-credentials
      appIdKey: app-id
      installationIdKey: installation-id
      privateKeyKey: private-key
    token:
      secretName: github-token
      tokenKey: token
    ssh:
      secretName: github-ssh
      privateKeyKey: id_rsa
      knownHostsKey: known_hosts

