apiVersion: v1
kind: ConfigMap
metadata:
  name: eshu-config
  namespace: eshu
data:
  ESHU_HOME: /data/.eshu
  PYTHONUNBUFFERED: "1"
  DEFAULT_DATABASE: neo4j
  NEO4J_URI: bolt://external-neo4j:7687
  ESHU_CONTENT_STORE_DSN: postgresql://eshu:replace-me@external-postgres:5432/eshu
  ESHU_POSTGRES_DSN: postgresql://eshu:replace-me@external-postgres:5432/eshu
  ESHU_POSTGRES_MAX_OPEN_CONNS: "20"
  ESHU_POSTGRES_MAX_IDLE_CONNS: "5"
  ESHU_POSTGRES_CONN_MAX_LIFETIME: 30m
  ESHU_POSTGRES_CONN_MAX_IDLE_TIME: 10m
  ESHU_POSTGRES_PING_TIMEOUT: 10s
  ESHU_NEO4J_MAX_CONNECTION_POOL_SIZE: "100"
  ESHU_NEO4J_MAX_CONNECTION_LIFETIME: 1h
  ESHU_NEO4J_CONNECTION_ACQUISITION_TIMEOUT: 1m
  ESHU_NEO4J_SOCKET_CONNECT_TIMEOUT: 5s
  ESHU_NEO4J_VERIFY_TIMEOUT: 10s
  ESHU_REPOSITORY_RULES_JSON: "[]"
