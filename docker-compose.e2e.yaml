# Minimal fresh-stack service set for the browser-based SSO auth E2E suite
# (issue #4971, epic #4962 closer). Postgres + graph + one-shot schema/
# workspace setup + the eshu API + a synthetic mock OIDC IdP — no ingester, no
# resolution-engine/reducer, no projector, no collectors. This suite proves
# the SSO login flow against a fresh, zero-corpus stack; it needs no repo
# content.
#
# Zero seeded local identities: ESHU_ADMIN_USERNAME/PASSWORD are never set
# here, matching the base stack (docker-compose.yaml). With the base eshu
# service's inherited default ESHU_AUTH_BOOTSTRAP_MODE=generated, the API
# boots with GET /api/v0/auth/setup-state reporting needs_setup: true until an
# operator (or a later-phase test) claims the sealed one-time bootstrap
# credential — see docs/public/run-locally/docker-compose.md#bootstrap-admin-credential.
#
# Phase 1 (issue #4971) builds only this compose plumbing and the mock IdP
# binary (go/cmd/mock-oidc-idp): a health-gated stack that reaches a ready API
# and a ready mock IdP over HTTP. It does NOT configure a DB-backed OIDC
# provider config pointing Eshu at the mock IdP, drive a browser through the
# login flow, or add a CI job — those are later phases.
#
# Reused base services (nornicdb, postgres, db-migrate, workspace-setup, eshu)
# are pulled in via `extends`, mirroring docker-compose.demo.corpus.yaml /
# docker-compose.demo.runtime.yaml. `extends` merges `environment` per key
# (overrides here win) and fully replaces `ports`/`volumes` when redeclared;
# `docker compose -f docker-compose.e2e.yaml config` is the way to check the
# rendered result after editing this file.

name: ${ESHU_E2E_PROJECT_NAME:-eshu-e2e}

x-e2e-runtime-env: &e2e_runtime_env
  ESHU_CONTENT_STORE_DSN: postgresql://eshu:${ESHU_E2E_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
  ESHU_POSTGRES_DSN: postgresql://eshu:${ESHU_E2E_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
  ESHU_DEPLOYMENT_ENVIRONMENT: local-compose-e2e

services:
  nornicdb:
    extends:
      file: docker-compose.yaml
      service: nornicdb
    ports: !override
      - "${ESHU_E2E_NORNICDB_HTTP_PORT:-27474}:7474"
      - "${ESHU_E2E_NORNICDB_BOLT_PORT:-27687}:7687"

  postgres:
    extends:
      file: docker-compose.yaml
      service: postgres
    ports: !override
      - "${ESHU_E2E_POSTGRES_PORT:-28432}:5432"
    environment:
      POSTGRES_PASSWORD: ${ESHU_E2E_POSTGRES_PASSWORD:-change-me}

  db-migrate:
    extends:
      file: docker-compose.yaml
      service: db-migrate
    build:
      args:
        SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-0}
    environment:
      <<: *e2e_runtime_env
      # This auth-only topology intentionally has no bootstrap-index finalizer.
      ESHU_DEFER_CONTENT_SEARCH_INDEXES: "false"

  workspace-setup:
    extends:
      file: docker-compose.yaml
      service: workspace-setup
    build:
      args:
        SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-0}
    volumes:
      - type: volume
        source: eshu_e2e_data
        target: /data
        volume:
          nocopy: true
      - ${ESHU_ESHUIGNORE_PATH:-/dev/null}:/tmp/eshuignore-source:ro

  # HTTP API runtime. No ESHU_ADMIN_USERNAME/PASSWORD, no bootstrap-index, no
  # ingester: this service starts with an empty graph/Postgres and zero local
  # identities, gated only on schema migration and workspace setup (the same
  # depends_on the base eshu service declares; `extends` merges it in).
  eshu:
    extends:
      file: docker-compose.yaml
      service: eshu
    build:
      args:
        SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-0}
    environment:
      <<: *e2e_runtime_env
      # Phase 3 (issue #4971, epic #4962): a file-backed OIDC provider whose
      # sole purpose is satisfying the require_sso guardrail's SECOND
      # precondition — "an admin has completed one SSO sign-in"
      # (identity_sign_in_policies.sso_admin_verified_at, set only from
      # CreateBrowserSession when the resulting session is BOTH AllScopes AND
      # externally authenticated — see go/cmd/api/browser_sessions.go's
      # recordSSOAdminVerificationBestEffort). A DB-backed provider config
      # (identity_provider_configs, created via the admin UI's Add-provider
      # flow, #4966/#4967) can NEVER produce an AllScopes=true session no
      # matter which role an IdP group is mapped to:
      # postgresOIDCStoreAdapter.ResolveGroupGrants (go/cmd/api/oidc_login.go)
      # always returns PermissionCatalogEnforced=true with AllScopes left at
      # its zero value — a deliberate design boundary documented at that call
      # site ("Database-resolved OIDC roles are always scoped (non-admin)").
      # AllScopes can only come from this env/file-backed
      # StaticGrantResolver's RoleGrant.AllScopes (go/internal/oidclogin/
      # static_grants.go), which fallbackOIDCGrantResolver only consults when
      # the DB-backed group-mapping lookup finds no match for the login's
      # provider_config_id — true here because no identity_provider_group_role_mappings
      # row is ever created for pc_e2e_admin_static.
      #
      # This env-config provider is authoritative for LOGIN (issuer, client
      # secret, redirect URL, and the group->role->all_scopes grant), but the
      # provider is only exposed on GET /api/v0/auth/providers, and only
      # loginable at all, once an ACTIVE identity_provider_configs row shares
      # its exact provider_config_id (authProviderListStore.ListLoginProviders
      # / query.OIDCLoginHandler.provider() — env wins for auth material, but
      # the DB row still gates whether the provider is "on"). The e2e runner
      # creates+tests+enables that DB row directly via the admin API (not
      # through the Add-provider UI, which item 3 already exercises against
      # the OTHER, member-mapped provider) before driving this SSO login.
      #
      # tenant_id/workspace_id are the fixed ("default","default") bootstrap
      # slot (pgstatus.BootstrapAdminTenantID/WorkspaceID) — this stack is
      # single-tenant, so there is nothing else they could be. redirect_url is
      # the fixed Vite dev-server port (authE2EDevServer.ts's devServerPort,
      # 5185) the browser-auth runner always uses, prefixed with the
      # /eshu-api proxy path so the mock IdP's post-authorize redirect is a
      # same-origin top-level navigation the host browser can load directly
      # with no CORS involved (see runAuthE2E.ts's apiBaseUrl comment).
      ESHU_AUTH_OIDC_ENABLED: "true"
      ESHU_AUTH_OIDC_CONFIG_FILE: /e2e/oidc-static-config.json
    # Bind to loopback by default. This stack keeps normal (non-open) read
    # auth, unlike docker-compose.demo.yaml, but there is still no reason to
    # publish it beyond the host that started it.
    ports: !override
      - "${ESHU_E2E_BIND_ADDR:-127.0.0.1}:${ESHU_E2E_API_PORT:-28080}:8080"
    volumes:
      - type: volume
        source: eshu_e2e_data
        target: /data
        volume:
          nocopy: true
      - ./apps/console/e2e/fixtures/oidc-static-config.json:/e2e/oidc-static-config.json:ro
      - ./apps/console/e2e/fixtures/oidc-static-client-secret:/e2e/oidc-static-client-secret:ro

  # Synthetic OIDC Authorization Code IdP (go/cmd/mock-oidc-idp). Serves
  # discovery/authorize/token/jwks over the compose network at
  # MOCK_OIDC_ISSUER_URL so Eshu's server-side OIDC connector
  # (go/internal/oidclogin) can reach it once a later phase wires a DB-backed
  # provider config pointing at it. The identity it hands back on every
  # /authorize call is a non-admin, member-mapped-group synthetic user by
  # default; override the MOCK_OIDC_* variables to test a different mapping.
  #
  # Built from the dedicated `mock-oidc-idp` Dockerfile stage, never the
  # product image: a no-auth, any-caller token-minting IdP must not ship
  # inside the released Eshu image (see the Dockerfile comment above that
  # stage). The stage's own CMD runs the binary, so no `command:` override is
  # needed here.
  #
  # ESHU_E2E_MOCK_OIDC_ISSUER_URL intentionally defaults to the in-network
  # service hostname, which is what Eshu (also on this network) resolves.
  #
  # Phase 3 (issue #4971) reachability decision: the issuer stays the
  # in-network hostname (never host.docker.internal, never a host-published
  # address) for BOTH the eshu API container's server-side discovery/token
  # exchange AND the host browser's /authorize navigation. The eshu container
  # already resolves "mock-oidc-idp" natively via Compose's embedded DNS,
  # zero config. For the host-side Playwright browser, runAuthE2E.ts launches
  # Chromium with --host-resolver-rules="MAP mock-oidc-idp 127.0.0.1:<this
  # service's host-published port>" (and the same for mock-oidc-idp-admin
  # below) — a per-process DNS override scoped to that one Chromium instance,
  # not a host OS /etc/hosts edit. This was chosen over (a) host.docker.internal
  # as the issuer, which does NOT resolve on the host machine's own resolver by
  # default on Docker Desktop or native Linux (verified: `ping
  # host.docker.internal` fails from the host shell) and would require an
  # invasive, undocumented host /etc/hosts mutation to fix, and (b) running the
  # browser inside the Compose network, which would additionally require
  # containerizing the Vite dev server and the `eshu` CLI credential retrieval
  # (authE2ECredential.ts) for no behavioral gain over the Chromium flag. The
  # chosen approach needs no host network/DNS mutation, and the
  # --host-resolver-rules flag is identically available to Playwright on any
  # Linux CI runner, so the same code path is what Phase 4's CI job will use.
  mock-oidc-idp:
    build:
      context: .
      dockerfile: Dockerfile
      target: mock-oidc-idp
      args:
        SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-0}
    ports:
      - "${ESHU_E2E_BIND_ADDR:-127.0.0.1}:${ESHU_E2E_MOCK_OIDC_PORT:-28090}:8080"
    environment:
      MOCK_OIDC_ISSUER_URL: ${ESHU_E2E_MOCK_OIDC_ISSUER_URL:-http://mock-oidc-idp:8080}
      MOCK_OIDC_SUBJECT: ${ESHU_E2E_MOCK_OIDC_SUBJECT:-member-user-1}
      MOCK_OIDC_EMAIL: ${ESHU_E2E_MOCK_OIDC_EMAIL:-member.user@example.test}
      MOCK_OIDC_GROUPS: ${ESHU_E2E_MOCK_OIDC_GROUPS:-member}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/.well-known/openid-configuration"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  # Second synthetic IdP instance (issue #4971 phase 3), issuing tokens for a
  # distinct "admin-e2e"-grouped synthetic identity. Its sole purpose is
  # satisfying the require_sso guardrail's "an admin has completed one SSO
  # sign-in" precondition — see the ESHU_AUTH_OIDC_CONFIG_FILE comment on the
  # `eshu` service above for why a second, file-backed provider (rather than a
  # DB-backed group mapping on the first mock IdP) is the only way to produce
  # an AllScopes=true SSO session. Same image/target as mock-oidc-idp, a
  # different host port and identity only.
  mock-oidc-idp-admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: mock-oidc-idp
      args:
        SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-0}
    ports:
      - "${ESHU_E2E_BIND_ADDR:-127.0.0.1}:${ESHU_E2E_MOCK_OIDC_ADMIN_PORT:-28091}:8080"
    environment:
      MOCK_OIDC_ISSUER_URL: ${ESHU_E2E_MOCK_OIDC_ADMIN_ISSUER_URL:-http://mock-oidc-idp-admin:8080}
      MOCK_OIDC_SUBJECT: ${ESHU_E2E_MOCK_OIDC_ADMIN_SUBJECT:-admin-user-1}
      MOCK_OIDC_EMAIL: ${ESHU_E2E_MOCK_OIDC_ADMIN_EMAIL:-admin.user@example.test}
      MOCK_OIDC_GROUPS: ${ESHU_E2E_MOCK_OIDC_ADMIN_GROUPS:-admin-e2e}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/.well-known/openid-configuration"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  # HTTP MCP transport (F-9, issue #5170). Additive to this stack: the #4971
  # browser-auth suite never starts this service (its runner only starts what
  # it lists — `docker compose ... up` with no service args starts every
  # service, but scripts/run-auth-e2e.sh's readiness probe and browser gate
  # never depend on it, so adding it here does not change that suite's
  # behavior or timing).
  #
  # No shared ESHU_API_KEY, and ESHU_AUTO_GENERATE_API_KEY disabled: this
  # suite's whole point is proving the identity story (personal tokens, OIDC
  # bearer, GitHub-mapped grants) end to end, so a static shared key must not
  # be a working credential path here.
  #
  # ESHU_AUTH_RESOURCE_URI is the host-reachable loopback address (not the
  # in-network "mcp-server" hostname): the RFC 9728 protected-resource
  # metadata document echoes this value verbatim as "resource", and both the
  # scripted OAuth client (apps/console/e2e/authMcpE2EOauthClient.ts, running
  # on the host) and a real MCP client resolve it directly with no
  # --host-resolver-rules mapping involved, unlike the mock IdP's in-network
  # issuer URL below.
  mcp-server:
    extends:
      file: docker-compose.yaml
      service: mcp-server
    build:
      args:
        SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-0}
    environment:
      <<: *e2e_runtime_env
      ESHU_MCP_TRANSPORT: http
      ESHU_API_KEY: ""
      ESHU_AUTO_GENERATE_API_KEY: "false"
      ESHU_AUTH_RESOURCE_URI: http://127.0.0.1:${ESHU_E2E_MCP_PORT:-29081}
    ports: !override
      - "${ESHU_E2E_BIND_ADDR:-127.0.0.1}:${ESHU_E2E_MCP_PORT:-29081}:8080"
    volumes:
      - type: volume
        source: eshu_e2e_data
        target: /data
        volume:
          nocopy: true
      - ${ESHU_ESHUIGNORE_PATH:-/dev/null}:/tmp/eshuignore-source:ro

  # Synthetic GitHub OAuth2/REST counterparty (go/cmd/mock-github, F-9 issue
  # #5170). Serves the exact endpoint set go/internal/githublogin/connector.go
  # calls, over the compose network at whatever base_url/api_base_url an
  # admin-created provider config points at — this stack does not create that
  # provider config itself; the E2E runner's shape-C module does, via the
  # admin drawer UI, exactly like the mock OIDC IdP's provider config.
  #
  # Built from the dedicated `mock-github` Dockerfile stage, never the
  # product image, mirroring mock-oidc-idp: a no-auth, any-caller identity
  # stand-in must not ship inside the released Eshu image. The stage's own
  # CMD runs the binary, so no `command:` override is needed here.
  #
  # Reachability mirrors mock-oidc-idp exactly (see that service's comment
  # above for the full host.docker.internal / --host-resolver-rules
  # reasoning): the eshu/mcp-server containers reach it at the in-network
  # "mock-github" hostname (set as base_url/api_base_url on the provider
  # config), and the host browser reaches it via a Chromium
  # --host-resolver-rules="MAP mock-github 127.0.0.1:<this service's
  # host-published port>" flag, extending the same table
  # apps/console/e2e/authE2EOidcFlow.ts's chromiumLaunchArgs already builds.
  mock-github:
    build:
      context: .
      dockerfile: Dockerfile
      target: mock-github
      args:
        SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH:-0}
    ports:
      - "${ESHU_E2E_BIND_ADDR:-127.0.0.1}:${ESHU_E2E_MOCK_GITHUB_PORT:-29092}:8080"
    environment:
      MOCK_GITHUB_LOGIN: ${ESHU_E2E_MOCK_GITHUB_LOGIN:-e2e-github-user}
      MOCK_GITHUB_USER_ID: ${ESHU_E2E_MOCK_GITHUB_USER_ID:-1001}
      MOCK_GITHUB_EMAIL: ${ESHU_E2E_MOCK_GITHUB_EMAIL:-e2e-github-user@example.test}
      MOCK_GITHUB_ORG: ${ESHU_E2E_MOCK_GITHUB_ORG:-eshu-e2e-org}
      MOCK_GITHUB_TEAMS: ${ESHU_E2E_MOCK_GITHUB_TEAMS:-eshu-e2e-org/platform-team}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  nornicdb_data:
  postgres_data:
  eshu_e2e_data:
