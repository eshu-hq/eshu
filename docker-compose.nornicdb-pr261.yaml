services:
  # Temporary exact-source override for orneryd/NornicDB#261. The full commit
  # SHA keeps local and remote proof runs on identical source while the
  # upstream PR awaits review and release. Build this service once before `up`;
  # pull_policy=never prevents the local proof tag from resolving to a registry
  # image with different contents.
  nornicdb:
    image: eshu-nornicdb-pr261:149245885258
    pull_policy: never
    build:
      context: https://github.com/orneryd/NornicDB.git#1492458852588c884c32f70d27ea2ee07086769c
      dockerfile: docker/Dockerfile.cpu-bge
      labels:
        org.opencontainers.image.revision: 1492458852588c884c32f70d27ea2ee07086769c
        org.opencontainers.image.source: https://github.com/orneryd/NornicDB
