# Remote E2E foundational services, preflights, shared projectors, and volumes.
# Use docker-compose.remote-e2e.yaml as the operator entrypoint.

x-runtime-env: &remote_e2e_runtime_env
  ESHU_GRAPH_BACKEND: nornicdb
  DEFAULT_DATABASE: nornic
  ESHU_NEO4J_DATABASE: nornic
  NEO4J_DATABASE: nornic
  NEO4J_URI: bolt://nornicdb:7687
  NEO4J_USERNAME: neo4j
  NEO4J_PASSWORD: ${ESHU_NEO4J_PASSWORD:-change-me}
  ESHU_CONTENT_STORE_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
  ESHU_POSTGRES_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
  ESHU_HOME: /tmp/.eshu
  HOME: /tmp
  ESHU_DEPLOYMENT_ENVIRONMENT: remote-e2e-compose
  ESHU_PROMETHEUS_METRICS_ENABLED: "true"
  ESHU_PROMETHEUS_METRICS_PORT: "9464"
  ESHU_CANONICAL_WRITE_TIMEOUT: ${ESHU_CANONICAL_WRITE_TIMEOUT:-120s}
  ESHU_CODE_CALL_PROJECTION_PARTITION_COUNT: ${ESHU_CODE_CALL_PROJECTION_PARTITION_COUNT:-4}
  ESHU_CODE_CALL_PROJECTION_WORKERS: ${ESHU_CODE_CALL_PROJECTION_WORKERS:-2}
  ESHU_REPO_DEPENDENCY_PROJECTION_WORKERS: ${ESHU_REPO_DEPENDENCY_PROJECTION_WORKERS:-4}

services:
  nornicdb:
    extends:
      file: docker-compose.yaml
      service: nornicdb

  postgres:
    extends:
      file: docker-compose.yaml
      service: postgres

  remote-e2e-corpus-preflight:
    image: alpine:3.21
    environment:
      ESHU_REMOTE_E2E_CORPUS_MODE: ${ESHU_REMOTE_E2E_CORPUS_MODE:-smoke}
      ESHU_REMOTE_E2E_MIN_REPOSITORY_COUNT: ${ESHU_REMOTE_E2E_MIN_REPOSITORY_COUNT:-0}
      ESHU_REMOTE_E2E_MAX_REPOSITORY_COUNT: ${ESHU_REMOTE_E2E_MAX_REPOSITORY_COUNT:-}
      ESHU_REMOTE_E2E_EXPECTED_REPOSITORY_COUNT: ${ESHU_REMOTE_E2E_EXPECTED_REPOSITORY_COUNT:-}
      ESHU_FILESYSTEM_HOST_ROOT: ${ESHU_FILESYSTEM_HOST_ROOT:-./tests/fixtures/ecosystems}
    volumes:
      - ${ESHU_FILESYSTEM_HOST_ROOT:-./tests/fixtures/ecosystems}:/fixtures:ro
      - ./scripts/remote-e2e-corpus-preflight.sh:/usr/local/bin/remote-e2e-corpus-preflight.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - /bin/sh /usr/local/bin/remote-e2e-corpus-preflight.sh

  remote-e2e-scanner-sbom-preflight:
    image: alpine:3.21
    environment:
      ESHU_SCANNER_WORKER_SBOM_HOST_ROOT: ${ESHU_SCANNER_WORKER_SBOM_HOST_ROOT:-./tests/fixtures/ecosystems}
      ESHU_SCANNER_WORKER_SBOM_MOUNTED_ROOT: /scanner-fixtures
      ESHU_SCANNER_WORKER_SBOM_MIN_CANDIDATES: ${ESHU_SCANNER_WORKER_SBOM_MIN_CANDIDATES:-1}
    volumes:
      - ${ESHU_SCANNER_WORKER_SBOM_HOST_ROOT:-./tests/fixtures/ecosystems}:/scanner-fixtures:ro
      - ./scripts/remote-e2e-scanner-sbom-preflight.sh:/usr/local/bin/remote-e2e-scanner-sbom-preflight.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - /bin/sh /usr/local/bin/remote-e2e-scanner-sbom-preflight.sh

  sbom-attestation-fixture:
    image: python:3.13-alpine
    restart: on-failure
    volumes:
      - ./go/internal/collector/sbomdocument/testdata:/fixtures:ro
    command: ["python", "-m", "http.server", "8080", "--directory", "/fixtures"]
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/cyclonedx_image_subject.json', timeout=5).read(1)"
      interval: 15s
      timeout: 5s
      retries: 10

  db-migrate:
    extends:
      file: docker-compose.yaml
      service: db-migrate
    restart: on-failure

  workspace-setup:
    extends:
      file: docker-compose.yaml
      service: workspace-setup

  projector:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    command: ["/usr/local/bin/eshu-projector"]
    ports:
      - "${ESHU_PROJECTOR_HTTP_PORT:-18084}:8080"
      - "${ESHU_PROJECTOR_METRICS_PORT:-19475}:9464"
    environment:
      <<: *remote_e2e_runtime_env
      ESHU_PROJECTOR_WORKERS: ${ESHU_PROJECTOR_WORKERS:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      bootstrap-index:
        condition: service_completed_successfully

  resolution-engine:
    extends:
      file: docker-compose.yaml
      service: resolution-engine
    restart: on-failure
    environment:
      <<: *remote_e2e_runtime_env

  webhook-listener:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    command: ["/usr/local/bin/eshu-webhook-listener"]
    ports:
      - "${ESHU_WEBHOOK_LISTENER_HTTP_PORT:-18083}:8080"
    environment:
      <<: *remote_e2e_runtime_env
      ESHU_AWS_FRESHNESS_TOKEN: ${ESHU_AWS_FRESHNESS_TOKEN:?set ESHU_AWS_FRESHNESS_TOKEN}
      ESHU_AWS_FRESHNESS_PATH: /webhooks/aws/eventbridge
      ESHU_WEBHOOK_MAX_BODY_BYTES: ${ESHU_WEBHOOK_MAX_BODY_BYTES:-1048576}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      db-migrate:
        condition: service_completed_successfully


volumes:
  nornicdb_data:
  postgres_data:
  eshu_data:
