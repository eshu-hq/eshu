# Opt-in worker pprof overlay for the remote collector E2E stack.
#
# Use with docker-compose.remote-e2e.yaml only on private test hosts. Each
# runtime binds pprof inside the container and publishes it on the host
# loopback interface so operators can reach it through SSH tunnels without
# exposing profiling endpoints on the network.

services:
  bootstrap-index:
    environment:
      ESHU_PPROF_ADDR: 0.0.0.0:6060
    ports:
      - "127.0.0.1:19660:6060"

  ingester:
    environment:
      ESHU_PPROF_ADDR: 0.0.0.0:6060
    ports:
      - "127.0.0.1:19661:6060"

  projector:
