# Remote collector end-to-end proof stack.
#
# This file is intentionally separate from the default Compose and Tier-2
# overlays. Use it on a test EC2 instance that can reach the target AWS account,
# S3 Terraform state object, and private ECR registry.

name: ${ESHU_REMOTE_E2E_PROJECT_NAME:-eshu-remote-e2e}

x-collector-env: &remote_e2e_collector_env
  ESHU_COLLECTOR_INSTANCES_JSON: |
    [
      {
        "instance_id": "remote-e2e-git",
        "collector_kind": "git",
        "mode": "continuous",
        "enabled": true,
        "bootstrap": true,
        "claims_enabled": true,
        "configuration": {
          "source": "remote-e2e-compose",
          "fairness_weight": 1
        }
      },
      {
        "instance_id": "remote-e2e-terraform-state",
        "collector_kind": "terraform_state",
        "mode": "continuous",
        "enabled": true,
        "claims_enabled": true,
        "configuration": {
          "target_scopes": [
            {
              "target_scope_id": "aws-e2e",
              "provider": "aws",
              "deployment_mode": "account_local",
              "credential_mode": "local_workload_identity",
              "allowed_regions": ["${ESHU_TFSTATE_S3_REGION:?set ESHU_TFSTATE_S3_REGION}"],
              "allowed_backends": ["s3"],
              "redaction_policy_ref": "remote-e2e"
            }
          ],
          "discovery": {
            "graph": true,
            "seeds": [
              {
                "kind": "s3",
                "target_scope_id": "aws-e2e",
                "bucket": "${ESHU_TFSTATE_S3_BUCKET:?set ESHU_TFSTATE_S3_BUCKET}",
                "key": "${ESHU_TFSTATE_S3_KEY:?set ESHU_TFSTATE_S3_KEY}",
                "region": "${ESHU_TFSTATE_S3_REGION:?set ESHU_TFSTATE_S3_REGION}"
              }
            ],
            "backend_filters": [
              {
                "target_scope_id": "aws-e2e",
                "backend_kind": "s3",
                "bucket": "${ESHU_TFSTATE_S3_BUCKET:?set ESHU_TFSTATE_S3_BUCKET}",
                "key": "${ESHU_TFSTATE_S3_KEY:?set ESHU_TFSTATE_S3_KEY}",
                "region": "${ESHU_TFSTATE_S3_REGION:?set ESHU_TFSTATE_S3_REGION}"
              }
            ]
          }
        }
      },
      {
        "instance_id": "remote-e2e-aws-cloud",
        "collector_kind": "aws",
        "mode": "continuous",
        "enabled": true,
        "claims_enabled": true,
        "configuration": {
          "scheduled_scan_enabled": true,
          "target_scopes": [
            {
              "account_id": "${ESHU_AWS_E2E_ACCOUNT_ID:?set ESHU_AWS_E2E_ACCOUNT_ID}",
              "allowed_regions": ["${ESHU_AWS_E2E_REGION:?set ESHU_AWS_E2E_REGION}", "aws-global"],
              "allowed_services": [
                "iam",
                "ecr",
                "ecs",
                "ec2",
                "elbv2",
                "lambda",
                "eks",
                "route53",
                "sqs",
                "sns",
                "eventbridge",
                "s3",
                "rds",
                "dynamodb",
                "cloudwatchlogs",
                "cloudfront",
                "apigateway",
                "secretsmanager",
                "ssm"
              ],
              "max_concurrent_claims": 1,
              "credentials": {
                "mode": "local_workload_identity"
              }
            }
          ]
        }
      },
      {
        "instance_id": "remote-e2e-oci-registry",
        "collector_kind": "oci_registry",
        "mode": "continuous",
        "enabled": true,
        "claims_enabled": true,
        "configuration": {
          "targets": [
            {
              "provider": "ecr",
              "registry_id": "${ESHU_ECR_OCI_REGISTRY_ID:?set ESHU_ECR_OCI_REGISTRY_ID}",
              "region": "${ESHU_ECR_OCI_REGION:?set ESHU_ECR_OCI_REGION}",
              "repository": "${ESHU_ECR_OCI_REPOSITORY:?set ESHU_ECR_OCI_REPOSITORY}",
              "tag_limit": 25,
              "visibility": "private",
              "auth_mode": "credentialed"
            }
          ]
        }
      },
      {
        "instance_id": "remote-e2e-package-registry",
        "collector_kind": "package_registry",
        "mode": "continuous",
        "enabled": true,
        "claims_enabled": true,
        "configuration": {
          "derive_from_owned_packages": {
            "enabled": true,
            "ecosystems": ["npm"],
            "planning_mode": "single_pass",
            "target_limit": ${ESHU_REMOTE_E2E_DERIVED_TARGET_LIMIT:-100},
            "package_limit": 1,
            "version_limit": 1
          },
          "targets": [
            {
              "provider": "npm",
              "ecosystem": "npm",
              "registry": "https://registry.npmjs.org",
              "scope_id": "package-registry://npm/npm/lodash",
              "packages": ["lodash"],
              "package_limit": 1,
              "version_limit": 200,
              "visibility": "public",
              "metadata_url": "https://registry.npmjs.org/lodash",
              "document_format": "native"
            },
            {
              "provider": "maven-central",
              "ecosystem": "maven",
              "registry": "https://repo.maven.apache.org/maven2",
              "scope_id": "package-registry://maven/maven-central/org.apache.logging.log4j:log4j-core",
              "namespace": "org.apache.logging.log4j",
              "packages": ["log4j-core"],
              "package_limit": 1,
              "version_limit": 1,
              "visibility": "public",
              "metadata_url": "https://repo.maven.apache.org/maven2/org/apache/logging/log4j/log4j-core/2.14.1/log4j-core-2.14.1.pom",
              "document_format": "native"
            }
          ]
        }
      },
      {
        "instance_id": "remote-e2e-vulnerability-intelligence",
        "collector_kind": "vulnerability_intelligence",
        "mode": "continuous",
        "enabled": true,
        "claims_enabled": true,
        "configuration": {
          "derive_from_owned_packages": {
            "enabled": true,
            "sources": ["osv"],
            "ecosystems": ["npm"],
            "planning_mode": "single_pass",
            "target_limit": ${ESHU_REMOTE_E2E_DERIVED_TARGET_LIMIT:-100}
          },
          "targets": [
            {
              "source": "first_epss",
              "scope_id": "vuln-intel://first/epss",
              "cve_ids": ["${ESHU_VULNERABILITY_E2E_CVE_ID:-CVE-2021-44228}"]
            },
            {
              "source": "cisa_kev",
              "scope_id": "vuln-intel://cisa/kev"
            },
            {
              "source": "osv",
              "scope_id": "vuln-intel://osv/maven/log4j-core",
              "ecosystem": "maven",
              "queries": [
                {
                  "package": {
                    "name": "org.apache.logging.log4j:log4j-core",
                    "ecosystem": "Maven"
                  },
                  "version": "2.14.1"
                }
              ]
            },
            {
              "source": "nvd",
              "scope_id": "vuln-intel://nvd/cve",
              "cve_ids": ["${ESHU_VULNERABILITY_E2E_CVE_ID:-CVE-2021-44228}"],
              "results_per_page": 100,
              "api_key_env": "NVD_API_KEY"
            }
          ]
        }
      },
      {
        "instance_id": "remote-e2e-sbom-attestation",
        "collector_kind": "sbom_attestation",
        "mode": "continuous",
        "enabled": true,
        "claims_enabled": true,
        "configuration": {
          "targets": [
            {
              "scope_id": "sbom://remote-e2e/team-api",
              "source_type": "configured_source",
              "artifact_kind": "sbom",
              "document_format": "cyclonedx",
              "document_url": "${ESHU_SBOM_ATTESTATION_DOCUMENT_URL:-http://sbom-attestation-fixture:8080/cyclonedx_image_subject.json}",
              "subject_digest": "${ESHU_SBOM_ATTESTATION_E2E_SUBJECT_DIGEST:-sha256:1111111111111111111111111111111111111111111111111111111111111111}"
            }
          ]
        }
      },
      {
        "instance_id": "remote-e2e-security-alert",
        "collector_kind": "security_alert",
        "mode": "continuous",
        "enabled": true,
        "claims_enabled": true,
        "configuration": {
          "targets": [
            {
              "provider": "github_dependabot",
              "scope_id": "security-alert:github:${ESHU_SECURITY_ALERT_REPOSITORY:?set ESHU_SECURITY_ALERT_REPOSITORY}",
              "repository": "${ESHU_SECURITY_ALERT_REPOSITORY:?set ESHU_SECURITY_ALERT_REPOSITORY}",
              "token_env": "GITHUB_TOKEN",
              "allowed_repositories": ["${ESHU_SECURITY_ALERT_REPOSITORY:?set ESHU_SECURITY_ALERT_REPOSITORY}"],
              "repository_alert_limit": 25,
              "max_pages": 2,
              "source_uri": "https://github.com/${ESHU_SECURITY_ALERT_REPOSITORY:?set ESHU_SECURITY_ALERT_REPOSITORY}/security/dependabot"
            }
          ]
        }
      },
      {
        "instance_id": "remote-e2e-pagerduty",
        "collector_kind": "pagerduty",
        "mode": "continuous",
        "enabled": ${ESHU_REMOTE_E2E_PAGERDUTY_ENABLED:-false},
        "claims_enabled": true,
        "configuration": {
          "targets": [
            {
              "provider": "pagerduty",
              "scope_id": "pagerduty://remote-e2e",
              "account_id": "${ESHU_PAGERDUTY_ACCOUNT_ID:-}",
              "token_env": "PAGERDUTY_API_TOKEN",
              "api_base_url": "${ESHU_PAGERDUTY_API_BASE_URL:-}",
              "source_uri": "${ESHU_PAGERDUTY_SOURCE_URI:-}",
              "incident_limit": ${ESHU_PAGERDUTY_INCIDENT_LIMIT:-1},
              "incident_lookback": "${ESHU_PAGERDUTY_INCIDENT_LOOKBACK:-24h}",
              "log_entry_limit": ${ESHU_PAGERDUTY_LOG_ENTRY_LIMIT:-1},
              "change_event_limit": ${ESHU_PAGERDUTY_CHANGE_EVENT_LIMIT:-1},
              "config_validation_enabled": ${ESHU_PAGERDUTY_CONFIG_VALIDATION_ENABLED:-true},
              "config_resource_limit": ${ESHU_PAGERDUTY_CONFIG_RESOURCE_LIMIT:-2}
            }
          ]
        }
      },
      {
        "instance_id": "remote-e2e-jira",
        "collector_kind": "jira",
        "mode": "continuous",
        "enabled": ${ESHU_REMOTE_E2E_JIRA_ENABLED:-false},
        "claims_enabled": true,
        "configuration": {
          "targets": [
            {
              "provider": "jira_cloud",
              "scope_id": "jira://remote-e2e",
              "site_id": "${ESHU_JIRA_SITE_ID:-}",
              "base_url": "${ESHU_JIRA_BASE_URL:-}",
              "email_env": "JIRA_EMAIL",
              "token_env": "JIRA_API_TOKEN",
              "jql_env": "ESHU_JIRA_JQL",
              "issue_limit": ${ESHU_JIRA_ISSUE_LIMIT:-1},
              "updated_lookback": "${ESHU_JIRA_UPDATED_LOOKBACK:-168h}",
              "changelog_limit": ${ESHU_JIRA_CHANGELOG_LIMIT:-25},
              "remote_link_limit": ${ESHU_JIRA_REMOTE_LINK_LIMIT:-25},
              "metadata_limit": ${ESHU_JIRA_METADATA_LIMIT:-25}
            }
          ]
        }
      },
      {
        "instance_id": "remote-e2e-scanner-worker-source",
        "collector_kind": "scanner_worker",
        "mode": "continuous",
        "enabled": true,
        "claims_enabled": true,
        "configuration": {
          "analyzer": "sbom_generation",
          "sbom_targets": [
            {
              "scope_id": "scanner-worker://repository/remote-e2e-sbom-fixture",
              "root_path": "/scanner-fixtures",
              "subject_digest": "${ESHU_SCANNER_WORKER_SBOM_SUBJECT_DIGEST:-sha256:1111111111111111111111111111111111111111111111111111111111111111}"
            }
          ]
        }
      }
    ]

x-runtime-env: &remote_e2e_runtime_env
  ESHU_GRAPH_BACKEND: nornicdb
  DEFAULT_DATABASE: nornic
  ESHU_NEO4J_DATABASE: nornic
  NEO4J_DATABASE: nornic
  NEO4J_URI: bolt://nornicdb:7687
  NEO4J_USERNAME: neo4j
  NEO4J_PASSWORD: ${ESHU_NEO4J_PASSWORD:-change-me}
  ESHU_CONTENT_STORE_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
  ESHU_POSTGRES_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
  ESHU_HOME: /tmp/.eshu
  HOME: /tmp
  ESHU_DEPLOYMENT_ENVIRONMENT: remote-e2e-compose
  ESHU_PROMETHEUS_METRICS_ENABLED: "true"
  ESHU_PROMETHEUS_METRICS_PORT: "9464"
  ESHU_CANONICAL_WRITE_TIMEOUT: ${ESHU_CANONICAL_WRITE_TIMEOUT:-120s}

x-aws-env: &remote_e2e_aws_env
  AWS_REGION: ${ESHU_AWS_E2E_REGION:?set ESHU_AWS_E2E_REGION}
  AWS_DEFAULT_REGION: ${ESHU_AWS_E2E_REGION:?set ESHU_AWS_E2E_REGION}
  AWS_EC2_METADATA_DISABLED: ${AWS_EC2_METADATA_DISABLED:-false}
  NO_PROXY: 169.254.169.254,localhost,127.0.0.1,nornicdb,postgres,webhook-listener
  no_proxy: 169.254.169.254,localhost,127.0.0.1,nornicdb,postgres,webhook-listener

services:
  nornicdb:
    extends:
      file: docker-compose.yaml
      service: nornicdb

  postgres:
    extends:
      file: docker-compose.yaml
      service: postgres

  remote-e2e-corpus-preflight:
    image: alpine:3.21
    environment:
      ESHU_REMOTE_E2E_CORPUS_MODE: ${ESHU_REMOTE_E2E_CORPUS_MODE:-smoke}
      ESHU_REMOTE_E2E_MIN_REPOSITORY_COUNT: ${ESHU_REMOTE_E2E_MIN_REPOSITORY_COUNT:-0}
      ESHU_REMOTE_E2E_MAX_REPOSITORY_COUNT: ${ESHU_REMOTE_E2E_MAX_REPOSITORY_COUNT:-}
      ESHU_REMOTE_E2E_EXPECTED_REPOSITORY_COUNT: ${ESHU_REMOTE_E2E_EXPECTED_REPOSITORY_COUNT:-}
      ESHU_FILESYSTEM_HOST_ROOT: ${ESHU_FILESYSTEM_HOST_ROOT:-./tests/fixtures/ecosystems}
    volumes:
      - ${ESHU_FILESYSTEM_HOST_ROOT:-./tests/fixtures/ecosystems}:/fixtures:ro
      - ./scripts/remote-e2e-corpus-preflight.sh:/usr/local/bin/remote-e2e-corpus-preflight.sh:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - /bin/sh /usr/local/bin/remote-e2e-corpus-preflight.sh

  sbom-attestation-fixture:
    image: python:3.13-alpine
    restart: on-failure
    volumes:
      - ./go/internal/collector/sbomdocument/testdata:/fixtures:ro
    command: ["python", "-m", "http.server", "8080", "--directory", "/fixtures"]
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/cyclonedx_image_subject.json', timeout=5).read(1)"
      interval: 15s
      timeout: 5s
      retries: 10

  db-migrate:
    extends:
      file: docker-compose.yaml
      service: db-migrate
    restart: on-failure

  workspace-setup:
    extends:
      file: docker-compose.yaml
      service: workspace-setup

  bootstrap-index:
    extends:
      file: docker-compose.yaml
      service: bootstrap-index
    restart: on-failure
    environment:
      <<: [*remote_e2e_runtime_env, *remote_e2e_collector_env]
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      workspace-setup:
        condition: service_completed_successfully
      remote-e2e-corpus-preflight:
        condition: service_completed_successfully
  eshu:
    extends:
      file: docker-compose.yaml
      service: eshu
    restart: on-failure
    environment:
      <<: [*remote_e2e_runtime_env, *remote_e2e_collector_env]
      ESHU_HOME: /data/.eshu
      ESHU_API_KEY: ${ESHU_API_KEY:-}
      ESHU_AUTO_GENERATE_API_KEY: "true"

  mcp-server:
    extends:
      file: docker-compose.yaml
      service: mcp-server
    restart: on-failure
    environment:
      <<: [*remote_e2e_runtime_env, *remote_e2e_collector_env]
      ESHU_HOME: /data/.eshu
      ESHU_API_KEY: ${ESHU_API_KEY:-}
      ESHU_AUTO_GENERATE_API_KEY: "true"

  ingester:
    extends:
      file: docker-compose.yaml
      service: ingester
    restart: on-failure
    environment:
      <<: [*remote_e2e_runtime_env, *remote_e2e_collector_env]

  projector:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    command: ["/usr/local/bin/eshu-projector"]
    ports:
      - "${ESHU_PROJECTOR_HTTP_PORT:-18084}:8080"
      - "${ESHU_PROJECTOR_METRICS_PORT:-19475}:9464"
    environment:
      <<: *remote_e2e_runtime_env
      ESHU_PROJECTOR_WORKERS: ${ESHU_PROJECTOR_WORKERS:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      bootstrap-index:
        condition: service_completed_successfully

  resolution-engine:
    extends:
      file: docker-compose.yaml
      service: resolution-engine
    restart: on-failure
    environment:
      <<: *remote_e2e_runtime_env

  collector-security-alerts-preflight:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    command:
      - "/usr/local/bin/eshu-collector-security-alerts"
      - "--preflight-provider-access"
    environment:
      <<: *remote_e2e_collector_env
      ESHU_SECURITY_ALERT_COLLECTOR_INSTANCE_ID: remote-e2e-security-alert
      GITHUB_TOKEN: ${ESHU_SECURITY_ALERT_GITHUB_TOKEN:?set ESHU_SECURITY_ALERT_GITHUB_TOKEN}

  workflow-coordinator:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    command: ["/usr/local/bin/eshu-workflow-coordinator"]
    ports:
      - "${ESHU_WORKFLOW_COORDINATOR_HTTP_PORT:-18082}:8080"
      - "${ESHU_WORKFLOW_COORDINATOR_METRICS_PORT:-19469}:9464"
    environment:
      <<: [*remote_e2e_runtime_env, *remote_e2e_collector_env]
      ESHU_WORKFLOW_COORDINATOR_DEPLOYMENT_MODE: active
      ESHU_WORKFLOW_COORDINATOR_CLAIMS_ENABLED: "true"
      ESHU_WORKFLOW_COORDINATOR_RECONCILE_INTERVAL: ${ESHU_WORKFLOW_COORDINATOR_RECONCILE_INTERVAL:-30s}
      ESHU_WORKFLOW_COORDINATOR_RUN_RECONCILE_INTERVAL: ${ESHU_WORKFLOW_COORDINATOR_RUN_RECONCILE_INTERVAL:-30s}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      remote-e2e-corpus-preflight:
        condition: service_completed_successfully
      collector-security-alerts-preflight:
        condition: service_completed_successfully
      db-migrate:
        condition: service_completed_successfully
      bootstrap-index:
        condition: service_completed_successfully

  webhook-listener:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    command: ["/usr/local/bin/eshu-webhook-listener"]
    ports:
      - "${ESHU_WEBHOOK_LISTENER_HTTP_PORT:-18083}:8080"
    environment:
      <<: *remote_e2e_runtime_env
      ESHU_AWS_FRESHNESS_TOKEN: ${ESHU_AWS_FRESHNESS_TOKEN:?set ESHU_AWS_FRESHNESS_TOKEN}
      ESHU_AWS_FRESHNESS_PATH: /webhooks/aws/eventbridge
      ESHU_WEBHOOK_MAX_BODY_BYTES: ${ESHU_WEBHOOK_MAX_BODY_BYTES:-1048576}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  seed-aws-freshness:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - seed
    environment:
      ESHU_AWS_E2E_ACCOUNT_ID: ${ESHU_AWS_E2E_ACCOUNT_ID:?set ESHU_AWS_E2E_ACCOUNT_ID}
      ESHU_AWS_E2E_REGION: ${ESHU_AWS_E2E_REGION:?set ESHU_AWS_E2E_REGION}
      ESHU_AWS_E2E_SERVICES: ${ESHU_AWS_E2E_SERVICES:-iam,ecr,ecs,ec2,elbv2,lambda,eks,route53,sqs,sns,eventbridge,s3,rds,dynamodb,cloudwatchlogs,cloudfront,apigateway,secretsmanager,ssm}
      ESHU_AWS_FRESHNESS_TOKEN: ${ESHU_AWS_FRESHNESS_TOKEN:?set ESHU_AWS_FRESHNESS_TOKEN}
      ESHU_ECR_OCI_REPOSITORY: ${ESHU_ECR_OCI_REPOSITORY:?set ESHU_ECR_OCI_REPOSITORY}
      ESHU_TFSTATE_S3_BUCKET: ${ESHU_TFSTATE_S3_BUCKET:?set ESHU_TFSTATE_S3_BUCKET}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        observed_at=$$(date -u +%Y-%m-%dT%H:%M:%SZ)
        services=$$(printf '%s' "$${ESHU_AWS_E2E_SERVICES}" | tr ',' ' ')
        for service in $${services}; do
          region="$${ESHU_AWS_E2E_REGION}"
          case "$${service}" in
            iam) resource_type="AWS::IAM::Role"; region="aws-global"; resource_id="remote-e2e-role" ;;
            ecr) resource_type="AWS::ECR::Repository"; resource_id="$${ESHU_ECR_OCI_REPOSITORY:-remote-e2e-repository}" ;;
            ecs) resource_type="AWS::ECS::Cluster"; resource_id="remote-e2e-cluster" ;;
            ec2) resource_type="AWS::EC2::VPC"; resource_id="remote-e2e-vpc" ;;
            elbv2) resource_type="AWS::ElasticLoadBalancingV2::LoadBalancer"; resource_id="remote-e2e-load-balancer" ;;
            lambda) resource_type="AWS::Lambda::Function"; resource_id="remote-e2e-function" ;;
            eks) resource_type="AWS::EKS::Cluster"; resource_id="remote-e2e-eks" ;;
            route53) resource_type="AWS::Route53::HostedZone"; region="aws-global"; resource_id="remote-e2e-zone" ;;
            sqs) resource_type="AWS::SQS::Queue"; resource_id="remote-e2e-queue" ;;
            sns) resource_type="AWS::SNS::Topic"; resource_id="remote-e2e-topic" ;;
            eventbridge) resource_type="AWS::Events::Rule"; resource_id="remote-e2e-rule" ;;
            s3) resource_type="AWS::S3::Bucket"; resource_id="$${ESHU_TFSTATE_S3_BUCKET:-remote-e2e-bucket}" ;;
            rds) resource_type="AWS::RDS::DBInstance"; resource_id="remote-e2e-db" ;;
            dynamodb) resource_type="AWS::DynamoDB::Table"; resource_id="remote-e2e-table" ;;
            cloudwatchlogs) resource_type="AWS::Logs::LogGroup"; resource_id="remote-e2e-log-group" ;;
            cloudfront) resource_type="AWS::CloudFront::Distribution"; region="aws-global"; resource_id="remote-e2e-distribution" ;;
            apigateway) resource_type="AWS::ApiGateway::RestApi"; resource_id="remote-e2e-api" ;;
            secretsmanager) resource_type="AWS::SecretsManager::Secret"; resource_id="remote-e2e-secret" ;;
            ssm) resource_type="AWS::SSM::Parameter"; resource_id="remote-e2e-parameter" ;;
            *) echo "unsupported service: $${service}" >&2; exit 1 ;;
          esac
          event_id="remote-e2e-$${service}-$${observed_at}"
          payload=$$(cat <<JSON
        {
          "id": "$${event_id}",
          "account": "$${ESHU_AWS_E2E_ACCOUNT_ID}",
          "region": "$${region}",
          "time": "$${observed_at}",
          "detail-type": "Config Configuration Item Change",
          "detail": {
            "configurationItem": {
              "resourceType": "$${resource_type}",
              "resourceId": "$${resource_id}",
              "awsAccountId": "$${ESHU_AWS_E2E_ACCOUNT_ID}",
              "awsRegion": "$${region}",
              "configurationItemCaptureTime": "$${observed_at}"
            }
          }
        }
        JSON
        )
          curl -fsS -X POST http://webhook-listener:8080/webhooks/aws/eventbridge \
            -H "X-Eshu-AWS-Freshness-Token: $${ESHU_AWS_FRESHNESS_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$${payload}" >/dev/null
          echo "seeded AWS freshness trigger for $${service}"
        done
    depends_on:
      webhook-listener:
        condition: service_healthy

