services:
  nornicdb:
    # NOTE: the default is a pinned multi-arch manifest. Leave
    # NORNICDB_PLATFORM unset so Docker selects linux/arm64 on Apple Silicon
    # and linux/amd64 on x86 hosts. Set NORNICDB_IMAGE and NORNICDB_PLATFORM
    # together only when testing a specific local NornicDB build.
    image: ${NORNICDB_IMAGE:-timothyswt/nornicdb-cpu-bge:v1.1.9@sha256:9a5126d306a48c01869809da47a869a4521b9328a7ab1c855327f5fd7541e4cd}
    platform: ${NORNICDB_PLATFORM:-}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NORNICDB_NO_AUTH: "true"
      NORNICDB_DATA_DIR: /data
      NORNICDB_HTTP_PORT: "7474"
      NORNICDB_BOLT_PORT: "7687"
      NORNICDB_ASYNC_WRITES_ENABLED: "false"
      NORNICDB_HEIMDALL_ENABLED: "false"
      NORNICDB_QDRANT_GRPC_ENABLED: "false"
      NORNICDB_EMBEDDING_ENABLED: "false"
      NORNICDB_EMBEDDING_PROVIDER: local
      NORNICDB_SEARCH_BM25_ENABLED: "false"
      NORNICDB_SEARCH_VECTOR_ENABLED: "false"
      NORNICDB_SEARCH_BM25_WARMING: lazy
      NORNICDB_SEARCH_VECTOR_WARMING: lazy
      NORNICDB_PERSIST_SEARCH_INDEXES: "false"
    volumes:
      - nornicdb_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7474/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  postgres:
    image: postgres:18-alpine
    ports:
      - "${ESHU_POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: eshu
      POSTGRES_USER: eshu
      POSTGRES_PASSWORD: ${ESHU_POSTGRES_PASSWORD:-change-me}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=${ESHU_PG_SHARED_BUFFERS:-4GB}"
      - "-c"
      - "work_mem=${ESHU_PG_WORK_MEM:-16MB}"
      - "-c"
      - "maintenance_work_mem=${ESHU_PG_MAINTENANCE_WORK_MEM:-512MB}"
      - "-c"
      - "max_wal_size=${ESHU_PG_MAX_WAL_SIZE:-8GB}"
      - "-c"
      - "wal_buffers=${ESHU_PG_WAL_BUFFERS:-64MB}"
      - "-c"
      - "effective_cache_size=${ESHU_PG_EFFECTIVE_CACHE_SIZE:-32GB}"
      - "-c"
      - "synchronous_commit=${ESHU_PG_SYNCHRONOUS_COMMIT:-off}"
      - "-c"
      - "default_toast_compression=${ESHU_PG_TOAST_COMPRESSION:-lz4}"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "random_page_cost=1.1"
      # Sized to cover the whole-stack connection budget: every runtime that opens
      # a Postgres pool (any of ESHU_FACT_STORE_DSN / ESHU_CONTENT_STORE_DSN /
      # ESHU_POSTGRES_DSN) is bounded to ESHU_POSTGRES_MAX_OPEN_CONNS (default 30).
      # The ceiling covers the LARGEST stack that shares this postgres: the
      # remote-e2e stack extends it and adds the full collector fleet (19
      # pool-holding services = 570 worst-case). 640 covers that plus reserve for
      # superuser_reserved_connections, an operator psql, the admin-status probe,
      # and transient tools. The base local stack (10 pool holders) sits far under
      # this; the slots are cheap when idle. Enforced for the base, neo4j, AND
      # merged remote-e2e stacks by TestComposePostgresMaxConnectionsCoversPoolBudget.
      - "-c"
      - "max_connections=${ESHU_PG_MAX_CONNECTIONS:-640}"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eshu -d eshu"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/eshu-bootstrap-data-plane"]
    healthcheck:
      disable: true
    environment:
      ESHU_GRAPH_BACKEND: nornicdb
      DEFAULT_DATABASE: nornic
      ESHU_NEO4J_DATABASE: nornic
      NEO4J_DATABASE: nornic
      NEO4J_URI: bolt://nornicdb:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${ESHU_NEO4J_PASSWORD:-change-me}
      ESHU_POSTGRES_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
    depends_on:
      nornicdb:
        condition: service_healthy
      postgres:
        condition: service_healthy

  workspace-setup:
    build:
      context: .
      dockerfile: Dockerfile
    user: "0:0"
    healthcheck:
      disable: true
    environment:
      ESHU_HOME: /data/.eshu
      ESHU_REPOS_DIR: /data/repos
    volumes:
      - type: volume
        source: eshu_data
        target: /data
        volume:
          nocopy: true
      - ${ESHU_ESHUIGNORE_PATH:-/dev/null}:/tmp/eshuignore-source:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mkdir -p /data/.eshu /data/repos
        if [ -s /tmp/eshuignore-source ]; then cp /tmp/eshuignore-source /data/repos/.eshuignore; fi
        chown -R 10001:10001 /data

  bootstrap-index:
    build:
      context: .
      dockerfile: Dockerfile
    healthcheck:
      disable: true
    ports:
      - "${ESHU_BOOTSTRAP_METRICS_PORT:-19467}:9464"
    environment:
      ESHU_GRAPH_BACKEND: nornicdb
      DEFAULT_DATABASE: nornic
      ESHU_NEO4J_DATABASE: nornic
      NEO4J_DATABASE: nornic
      NEO4J_URI: bolt://nornicdb:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${ESHU_NEO4J_PASSWORD:-change-me}
      ESHU_CONTENT_STORE_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_POSTGRES_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_HOME: /data/.eshu
      ESHU_REPOS_DIR: /data/repos
      ESHU_REPO_SOURCE_MODE: ${ESHU_REPO_SOURCE_MODE:-filesystem}
      ESHU_FILESYSTEM_ROOT: ${ESHU_FILESYSTEM_ROOT:-/fixtures}
      ESHU_FILESYSTEM_DIRECT: ${ESHU_FILESYSTEM_DIRECT:-}
      ESHU_GIT_AUTH_METHOD: none
      ESHU_REPOSITORY_RULES_JSON: ${ESHU_REPOSITORY_RULES_JSON:-[]}
      ESHU_DEPLOYMENT_ENVIRONMENT: local-compose
      ESHU_PROJECTION_WORKERS: ${ESHU_PROJECTION_WORKERS:-}
      ESHU_SNAPSHOT_WORKERS: ${ESHU_SNAPSHOT_WORKERS:-}
      ESHU_PARSE_WORKERS: ${ESHU_PARSE_WORKERS:-}
      ESHU_CANONICAL_WRITE_TIMEOUT: ${ESHU_CANONICAL_WRITE_TIMEOUT:-}
      # Bound concurrent graph writes to NornicDB's zero-timeout plateau so a
      # bootstrap+reducer write storm cannot push past the throughput knee and
      # cascade into 30s canonical-write timeouts (issue #4456 / #3624). Set 0
      # for legacy unbounded (passthrough) behavior; raise on a backend with
      # more write headroom. See docs/public/reference/nornicdb-tuning.md.
      ESHU_GRAPH_WRITE_MAX_IN_FLIGHT: ${ESHU_GRAPH_WRITE_MAX_IN_FLIGHT:-8}
      ESHU_LARGE_REPO_FILE_THRESHOLD: ${ESHU_LARGE_REPO_FILE_THRESHOLD:-}
      ESHU_LARGE_REPO_MAX_CONCURRENT: ${ESHU_LARGE_REPO_MAX_CONCURRENT:-2}
      GOMEMLIMIT: ${GOMEMLIMIT:-}
    volumes:
      - type: volume
        source: eshu_data
        target: /data
        volume:
          nocopy: true
      - ./:/app-src
      - ${ESHU_FILESYSTEM_HOST_ROOT:-./tests/fixtures/ecosystems}:/fixtures:ro
      - ${ESHU_ESHUIGNORE_PATH:-/dev/null}:/tmp/eshuignore-source:ro
    command: ["/usr/local/bin/eshu-bootstrap-index"]
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      workspace-setup:
        condition: service_completed_successfully

  eshu:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/eshu-api"]
    ports:
      - "${ESHU_HTTP_PORT:-8080}:8080"
      # API mounts /metrics on the main HTTP listener.
      - "${ESHU_API_METRICS_PORT:-19464}:8080"
    environment:
      ESHU_GRAPH_BACKEND: nornicdb
      DEFAULT_DATABASE: nornic
      ESHU_NEO4J_DATABASE: nornic
      NEO4J_DATABASE: nornic
      NEO4J_URI: bolt://nornicdb:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${ESHU_NEO4J_PASSWORD:-change-me}
      ESHU_CONTENT_STORE_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_POSTGRES_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_HOME: /data/.eshu
      ESHU_REPOS_DIR: /data/repos
      ESHU_REPO_SOURCE_MODE: ${ESHU_REPO_SOURCE_MODE:-filesystem}
      ESHU_FILESYSTEM_ROOT: ${ESHU_FILESYSTEM_ROOT:-/fixtures}
      ESHU_GIT_AUTH_METHOD: none
      ESHU_REPOSITORY_RULES_JSON: ${ESHU_REPOSITORY_RULES_JSON:-[]}
      ESHU_API_KEY: ${ESHU_API_KEY:-}
      ESHU_AUTO_GENERATE_API_KEY: "true"
      ESHU_DEPLOYMENT_ENVIRONMENT: local-compose
      ESHU_SEMANTIC_PROVIDER_PROFILES_JSON: ${ESHU_SEMANTIC_PROVIDER_PROFILES_JSON:-}
      ESHU_SEMANTIC_EXTRACTION_POLICY_JSON: ${ESHU_SEMANTIC_EXTRACTION_POLICY_JSON:-}
      ESHU_SEMANTIC_SEARCH_LOCAL_EMBEDDER: ${ESHU_SEMANTIC_SEARCH_LOCAL_EMBEDDER:-auto_hash}
      ESHU_SEMANTIC_SEARCH_PROVIDER_PROFILE_ID: ${ESHU_SEMANTIC_SEARCH_PROVIDER_PROFILE_ID:-}
      # Optional Ask Eshu passthrough. Unset by default; ask endpoint returns
      # 503 until ESHU_ASK_ENABLED=true and a valid agent_reasoning provider
      # profile is configured. See docs/public/run-locally/docker-compose.md
      # (Ask Eshu section) for setup instructions.
      ESHU_ASK_ENABLED: ${ESHU_ASK_ENABLED:-}
      ESHU_ASK_NARRATION_ENABLED: ${ESHU_ASK_NARRATION_ENABLED:-}
      ESHU_ASK_MAX_ITERATIONS: ${ESHU_ASK_MAX_ITERATIONS:-}
      ESHU_ASK_MAX_TOOL_CALLS_PER_TURN: ${ESHU_ASK_MAX_TOOL_CALLS_PER_TURN:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ESHU_PROMETHEUS_METRICS_ENABLED: "true"
      ESHU_PROMETHEUS_METRICS_PORT: "9464"
    volumes:
      - type: volume
        source: eshu_data
        target: /data
        volume:
          nocopy: true
      - ./:/app-src
      - ${ESHU_FILESYSTEM_HOST_ROOT:-./tests/fixtures/ecosystems}:/fixtures:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      workspace-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/eshu-mcp-server"]
    ports:
      - "${ESHU_MCP_PORT:-8081}:8080"
      # MCP mounts /metrics on the main HTTP listener.
      - "${ESHU_MCP_METRICS_PORT:-19468}:8080"
    environment:
      ESHU_GRAPH_BACKEND: nornicdb
      DEFAULT_DATABASE: nornic
      ESHU_NEO4J_DATABASE: nornic
      NEO4J_DATABASE: nornic
      NEO4J_URI: bolt://nornicdb:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${ESHU_NEO4J_PASSWORD:-change-me}
      ESHU_CONTENT_STORE_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_POSTGRES_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_HOME: /data/.eshu
      ESHU_REPOS_DIR: /data/repos
      ESHU_REPO_SOURCE_MODE: ${ESHU_REPO_SOURCE_MODE:-filesystem}
      ESHU_FILESYSTEM_ROOT: ${ESHU_FILESYSTEM_ROOT:-/fixtures}
      ESHU_GIT_AUTH_METHOD: none
      ESHU_REPOSITORY_RULES_JSON: ${ESHU_REPOSITORY_RULES_JSON:-[]}
      ESHU_MCP_TRANSPORT: http
      ESHU_MCP_ADDR: ":8080"
      ESHU_API_KEY: ${ESHU_API_KEY:-}
      ESHU_AUTO_GENERATE_API_KEY: "true"
      ESHU_DEPLOYMENT_ENVIRONMENT: local-compose
      ESHU_SEMANTIC_PROVIDER_PROFILES_JSON: ${ESHU_SEMANTIC_PROVIDER_PROFILES_JSON:-}
      ESHU_SEMANTIC_EXTRACTION_POLICY_JSON: ${ESHU_SEMANTIC_EXTRACTION_POLICY_JSON:-}
      ESHU_SEMANTIC_SEARCH_LOCAL_EMBEDDER: ${ESHU_SEMANTIC_SEARCH_LOCAL_EMBEDDER:-auto_hash}
      ESHU_SEMANTIC_SEARCH_PROVIDER_PROFILE_ID: ${ESHU_SEMANTIC_SEARCH_PROVIDER_PROFILE_ID:-}
      # Optional Ask Eshu passthrough. Unset by default; ask tool returns
      # 503 until ESHU_ASK_ENABLED=true and a valid agent_reasoning provider
      # profile is configured. See docs/public/run-locally/docker-compose.md
      # (Ask Eshu section) for setup instructions.
      ESHU_ASK_ENABLED: ${ESHU_ASK_ENABLED:-}
      ESHU_ASK_NARRATION_ENABLED: ${ESHU_ASK_NARRATION_ENABLED:-}
      ESHU_ASK_MAX_ITERATIONS: ${ESHU_ASK_MAX_ITERATIONS:-}
      ESHU_ASK_MAX_TOOL_CALLS_PER_TURN: ${ESHU_ASK_MAX_TOOL_CALLS_PER_TURN:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ESHU_PROMETHEUS_METRICS_ENABLED: "true"
      ESHU_PROMETHEUS_METRICS_PORT: "9464"
    volumes:
      - type: volume
        source: eshu_data
        target: /data
        volume:
          nocopy: true
      - ./:/app-src
      - ${ESHU_FILESYSTEM_HOST_ROOT:-./tests/fixtures/ecosystems}:/fixtures:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      workspace-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10

  ingester:
    build:
      context: .
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    ports:
      - "${ESHU_INGESTER_METRICS_PORT:-19465}:9464"
    environment:
      ESHU_GRAPH_BACKEND: nornicdb
      DEFAULT_DATABASE: nornic
      ESHU_NEO4J_DATABASE: nornic
      NEO4J_DATABASE: nornic
      NEO4J_URI: bolt://nornicdb:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${ESHU_NEO4J_PASSWORD:-change-me}
      ESHU_CONTENT_STORE_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_POSTGRES_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_HOME: /data/.eshu
      ESHU_REPOS_DIR: /data/repos
      ESHU_REPO_SOURCE_MODE: ${ESHU_REPO_SOURCE_MODE:-filesystem}
      ESHU_FILESYSTEM_ROOT: ${ESHU_FILESYSTEM_ROOT:-/fixtures}
      ESHU_FILESYSTEM_DIRECT: ${ESHU_FILESYSTEM_DIRECT:-}
      ESHU_GIT_AUTH_METHOD: none
      ESHU_REPOSITORY_RULES_JSON: ${ESHU_REPOSITORY_RULES_JSON:-[]}
      ESHU_DEPLOYMENT_ENVIRONMENT: local-compose
      ESHU_PROMETHEUS_METRICS_ENABLED: "true"
      ESHU_PROMETHEUS_METRICS_PORT: "9464"
      ESHU_SNAPSHOT_WORKERS: ${ESHU_SNAPSHOT_WORKERS:-}
      ESHU_PROJECTOR_WORKERS: ${ESHU_PROJECTOR_WORKERS:-}
      ESHU_PARSE_WORKERS: ${ESHU_PARSE_WORKERS:-}
      ESHU_CANONICAL_WRITE_TIMEOUT: ${ESHU_CANONICAL_WRITE_TIMEOUT:-}
      # Bound the ingester's concurrent canonical graph writes to NornicDB's
      # throughput plateau (issue #4729 / #4456), matching bootstrap-index and
      # resolution-engine — the ingester canonical writer is now wrapped in the
      # graphbackpressure gate (openIngesterCanonicalWriter). Set 0 for legacy
      # unbounded (passthrough). See docs/public/reference/nornicdb-tuning.md.
      ESHU_GRAPH_WRITE_MAX_IN_FLIGHT: ${ESHU_GRAPH_WRITE_MAX_IN_FLIGHT:-8}
      ESHU_LARGE_REPO_FILE_THRESHOLD: ${ESHU_LARGE_REPO_FILE_THRESHOLD:-}
      ESHU_LARGE_REPO_MAX_CONCURRENT: ${ESHU_LARGE_REPO_MAX_CONCURRENT:-2}
      ESHU_WEBHOOK_TRIGGER_HANDOFF_ENABLED: ${ESHU_WEBHOOK_TRIGGER_HANDOFF_ENABLED:-false}
      ESHU_WEBHOOK_TRIGGER_HANDOFF_OWNER: ${ESHU_WEBHOOK_TRIGGER_HANDOFF_OWNER:-ingester}
      ESHU_WEBHOOK_TRIGGER_CLAIM_LIMIT: ${ESHU_WEBHOOK_TRIGGER_CLAIM_LIMIT:-100}
      ESHU_REPO_SCHEDULED_SYNC_ENABLED: ${ESHU_REPO_SCHEDULED_SYNC_ENABLED:-true}
      GOMEMLIMIT: ${GOMEMLIMIT:-}
    volumes:
      - type: volume
        source: eshu_data
        target: /data
        volume:
          nocopy: true
      - ./:/app-src
      - ${ESHU_FILESYSTEM_HOST_ROOT:-./tests/fixtures/ecosystems}:/fixtures:ro
      - ${ESHU_ESHUIGNORE_PATH:-/dev/null}:/tmp/eshuignore-source:ro
    command: ["/usr/local/bin/eshu-ingester"]
    depends_on:
      bootstrap-index:
        condition: service_completed_successfully
      workspace-setup:
        condition: service_completed_successfully

  workflow-coordinator:
    profiles:
      - workflow-coordinator
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/eshu-workflow-coordinator"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    ports:
      - "${ESHU_WORKFLOW_COORDINATOR_HTTP_PORT:-18082}:8080"
      - "${ESHU_WORKFLOW_COORDINATOR_METRICS_PORT:-19469}:9464"
    environment:
      ESHU_CONTENT_STORE_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_POSTGRES_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_HOME: /tmp/.eshu
      HOME: /tmp
      ESHU_DEPLOYMENT_ENVIRONMENT: local-compose
      ESHU_PROMETHEUS_METRICS_ENABLED: "true"
      ESHU_PROMETHEUS_METRICS_PORT: "9464"
      ESHU_COMPONENT_HOME: /data/.eshu/components
      ESHU_COMPONENT_TRUST_MODE: ${ESHU_COMPONENT_TRUST_MODE:-disabled}
      ESHU_COMPONENT_ALLOW_IDS: ${ESHU_COMPONENT_ALLOW_IDS:-}
      ESHU_COMPONENT_ALLOW_PUBLISHERS: ${ESHU_COMPONENT_ALLOW_PUBLISHERS:-}
      ESHU_COMPONENT_REVOKE_IDS: ${ESHU_COMPONENT_REVOKE_IDS:-}
      ESHU_COMPONENT_REVOKE_PUBLISHERS: ${ESHU_COMPONENT_REVOKE_PUBLISHERS:-}
      ESHU_COMPONENT_CORE_VERSION: ${ESHU_COMPONENT_CORE_VERSION:-}
      ESHU_COLLECTOR_INSTANCES_JSON: '${ESHU_COLLECTOR_INSTANCES_JSON:-[{"instance_id":"collector-git-default","collector_kind":"git","mode":"continuous","enabled":true,"bootstrap":true,"configuration":{"source":"local-compose"}}]}'
      ESHU_WORKFLOW_COORDINATOR_DEPLOYMENT_MODE: ${ESHU_WORKFLOW_COORDINATOR_DEPLOYMENT_MODE:-dark}
      ESHU_WORKFLOW_COORDINATOR_CLAIMS_ENABLED: "${ESHU_WORKFLOW_COORDINATOR_CLAIMS_ENABLED:-false}"
    volumes:
      - type: volume
        source: eshu_data
        target: /data
        volume:
          nocopy: true
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  component-extension-collector:
    profiles:
      - component-extension-collector
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/eshu-collector-component-extension"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    ports:
      - "${ESHU_COMPONENT_EXTENSION_COLLECTOR_HTTP_PORT:-18084}:8080"
      - "${ESHU_COMPONENT_EXTENSION_COLLECTOR_METRICS_PORT:-19470}:9464"
    environment:
      ESHU_CONTENT_STORE_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_POSTGRES_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_HOME: /tmp/.eshu
      HOME: /tmp
      ESHU_DEPLOYMENT_ENVIRONMENT: local-compose
      ESHU_PROMETHEUS_METRICS_ENABLED: "true"
      ESHU_PROMETHEUS_METRICS_PORT: "9464"
      ESHU_COMPONENT_HOME: /data/.eshu/components
      ESHU_COMPONENT_TRUST_MODE: ${ESHU_COMPONENT_TRUST_MODE:-disabled}
      ESHU_COMPONENT_ALLOW_IDS: ${ESHU_COMPONENT_ALLOW_IDS:-}
      ESHU_COMPONENT_ALLOW_PUBLISHERS: ${ESHU_COMPONENT_ALLOW_PUBLISHERS:-}
      ESHU_COMPONENT_REVOKE_IDS: ${ESHU_COMPONENT_REVOKE_IDS:-}
      ESHU_COMPONENT_REVOKE_PUBLISHERS: ${ESHU_COMPONENT_REVOKE_PUBLISHERS:-}
      ESHU_COMPONENT_CORE_VERSION: ${ESHU_COMPONENT_CORE_VERSION:-}
      ESHU_COMPONENT_COLLECTOR_INSTANCE_ID: ${ESHU_COMPONENT_COLLECTOR_INSTANCE_ID:-}
      ESHU_COMPONENT_COLLECTOR_OWNER_ID: ${ESHU_COMPONENT_COLLECTOR_OWNER_ID:-}
      ESHU_COMPONENT_COLLECTOR_POLL_INTERVAL: ${ESHU_COMPONENT_COLLECTOR_POLL_INTERVAL:-1s}
      ESHU_COMPONENT_COLLECTOR_CLAIM_LEASE_TTL: ${ESHU_COMPONENT_COLLECTOR_CLAIM_LEASE_TTL:-}
      ESHU_COMPONENT_COLLECTOR_HEARTBEAT_INTERVAL: ${ESHU_COMPONENT_COLLECTOR_HEARTBEAT_INTERVAL:-}
      ESHU_COMPONENT_COLLECTOR_SCOPE_KIND: ${ESHU_COMPONENT_COLLECTOR_SCOPE_KIND:-component}
    volumes:
      - type: volume
        source: eshu_data
        target: /data
        volume:
          nocopy: true
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  # Production (8+ vCPU): ESHU_REDUCER_WORKERS=8, ESHU_SHARED_PROJECTION_WORKERS=4,
  # ESHU_SHARED_PROJECTION_PARTITION_COUNT=8, ESHU_REDUCER_BATCH_CLAIM_SIZE=64
  resolution-engine:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/eshu-reducer"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    ports:
      - "${ESHU_RESOLUTION_ENGINE_METRICS_PORT:-19466}:9464"
    environment:
      ESHU_GRAPH_BACKEND: nornicdb
      DEFAULT_DATABASE: nornic
      ESHU_NEO4J_DATABASE: nornic
      NEO4J_DATABASE: nornic
      NEO4J_URI: bolt://nornicdb:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${ESHU_NEO4J_PASSWORD:-change-me}
      ESHU_CONTENT_STORE_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_POSTGRES_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_HOME: /tmp/.eshu
      HOME: /tmp
      ESHU_REPOS_DIR: /data/repos
      ESHU_REPO_SOURCE_MODE: filesystem
      ESHU_FILESYSTEM_ROOT: ${ESHU_FILESYSTEM_ROOT:-/fixtures}
      ESHU_GIT_AUTH_METHOD: none
      ESHU_REPOSITORY_RULES_JSON: ${ESHU_REPOSITORY_RULES_JSON:-[]}
      ESHU_DEPLOYMENT_ENVIRONMENT: local-compose
      ESHU_PROMETHEUS_METRICS_ENABLED: "true"
      ESHU_PROMETHEUS_METRICS_PORT: "9464"
      ESHU_REDUCER_WORKERS: ${ESHU_REDUCER_WORKERS:-4}
      ESHU_SHARED_PROJECTION_WORKERS: ${ESHU_SHARED_PROJECTION_WORKERS:-4}
      ESHU_SHARED_PROJECTION_PARTITION_COUNT: ${ESHU_SHARED_PROJECTION_PARTITION_COUNT:-8}
      ESHU_SHARED_PROJECTION_BATCH_LIMIT: ${ESHU_SHARED_PROJECTION_BATCH_LIMIT:-200}
      ESHU_SHARED_PROJECTION_POLL_INTERVAL: ${ESHU_SHARED_PROJECTION_POLL_INTERVAL:-500ms}
      ESHU_SHARED_PROJECTION_LEASE_TTL: ${ESHU_SHARED_PROJECTION_LEASE_TTL:-}
      ESHU_REDUCER_BATCH_CLAIM_SIZE: ${ESHU_REDUCER_BATCH_CLAIM_SIZE:-}
      ESHU_CANONICAL_WRITE_TIMEOUT: ${ESHU_CANONICAL_WRITE_TIMEOUT:-}
      # Bound concurrent graph writes to NornicDB's zero-timeout plateau so a
      # bootstrap+reducer write storm cannot push past the throughput knee and
      # cascade into 30s canonical-write timeouts (issue #4456 / #3624). Set 0
      # for legacy unbounded (passthrough) behavior; raise on a backend with
      # more write headroom. See docs/public/reference/nornicdb-tuning.md.
      ESHU_GRAPH_WRITE_MAX_IN_FLIGHT: ${ESHU_GRAPH_WRITE_MAX_IN_FLIGHT:-8}
      ESHU_SEMANTIC_PROVIDER_PROFILES_JSON: ${ESHU_SEMANTIC_PROVIDER_PROFILES_JSON:-}
      ESHU_SEMANTIC_EXTRACTION_POLICY_JSON: ${ESHU_SEMANTIC_EXTRACTION_POLICY_JSON:-}
      ESHU_SEMANTIC_SEARCH_LOCAL_EMBEDDER: ${ESHU_SEMANTIC_SEARCH_LOCAL_EMBEDDER:-auto_hash}
      ESHU_SEMANTIC_SEARCH_PROVIDER_PROFILE_ID: ${ESHU_SEMANTIC_SEARCH_PROVIDER_PROFILE_ID:-}
    volumes:
      - type: volume
        source: eshu_data
        target: /data
        volume:
          nocopy: true
      - ./:/app-src
      - ${ESHU_FILESYSTEM_HOST_ROOT:-./tests/fixtures/ecosystems}:/fixtures:ro
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      workspace-setup:
        condition: service_completed_successfully

  # Always-on source-local projector (#4727). bootstrap-index projects via the
  # durable Postgres projector queue and, on a retryable canonical-write failure,
  # leaves the work item in 'retrying' and exits rc=1. The continuous ingester is
  # the only other source-local claimer and is gated on bootstrap-index success,
  # so after a bootstrap failure the stranded retrying item had NO claimer and
  # its generation stayed 'pending' forever, wedging cross-scope readiness
  # (inheritance/sql intents that need the failed scope's canonical nodes). This
  # standalone projector is gated ONLY on db-migrate + workspace-setup (NOT
  # bootstrap-index), matching the Helm ungated-ingester StatefulSet and the
  # remote-e2e foundation topology, so a stranded retrying item is always claimed,
  # re-projected end-to-end, and its generation activated. Its graph-write budget
  # is bounded lower than the primary writers because it is a tertiary canonical
  # writer that co-claims with the ingester; keep the combined in-flight total
  # near the NornicDB throughput knee (#4728).
  projector:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    command: ["/usr/local/bin/eshu-projector"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    ports:
      - "${ESHU_PROJECTOR_METRICS_PORT:-19471}:9464"
    environment:
      ESHU_GRAPH_BACKEND: nornicdb
      DEFAULT_DATABASE: nornic
      ESHU_NEO4J_DATABASE: nornic
      NEO4J_DATABASE: nornic
      NEO4J_URI: bolt://nornicdb:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${ESHU_NEO4J_PASSWORD:-change-me}
      ESHU_CONTENT_STORE_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_POSTGRES_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_HOME: /tmp/.eshu
      HOME: /tmp
      ESHU_DEPLOYMENT_ENVIRONMENT: local-compose
      ESHU_PROMETHEUS_METRICS_ENABLED: "true"
      ESHU_PROMETHEUS_METRICS_PORT: "9464"
      # Low worker count: the projector is a safety-net claimer that re-drives
      # stranded source-local items after a bootstrap failure. Its meaningful
      # write pressure is AFTER bootstrap-index has exited (rc=1) — bootstrap is
      # then gone, so the canonical writers are only projector + reducer.
      ESHU_PROJECTOR_WORKERS: ${ESHU_PROJECTOR_WORKERS:-2}
      ESHU_CANONICAL_WRITE_TIMEOUT: ${ESHU_CANONICAL_WRITE_TIMEOUT:-}
      # Bounded small (2, vs bootstrap/reducer :-8): the projector is a tertiary
      # canonical writer. Its only concurrent window with a primary writer is a
      # healthy bootstrap still draining (bootstrap 8 + projector 2 = 10 in the
      # projector/bootstrap subtotal; the reducer at :-8 can also co-write, so
      # see the cmd/projector evidence for the full multi-writer accounting,
      # cleared empirically by a 0-timeout 25-repo run). In the recovery scenario
      # this service exists for — a FAILED bootstrap — the ingester stays gated
      # off (depends_on bootstrap success) and bootstrap has exited, so the
      # projector drains the stranded item as the sole source-local writer. Set 0
      # for legacy unbounded (passthrough).
      ESHU_GRAPH_WRITE_MAX_IN_FLIGHT: ${ESHU_GRAPH_WRITE_MAX_IN_FLIGHT:-2}
    volumes:
      - type: volume
        source: eshu_data
        target: /data
        volume:
          nocopy: true
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      workspace-setup:
        condition: service_completed_successfully

  webhook-listener:
    profiles:
      - webhook-listener
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/eshu-webhook-listener"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    ports:
      - "${ESHU_WEBHOOK_LISTENER_HTTP_PORT:-18083}:8080"
    environment:
      ESHU_CONTENT_STORE_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_POSTGRES_DSN: postgresql://eshu:${ESHU_POSTGRES_PASSWORD:-change-me}@postgres:5432/eshu
      ESHU_HOME: /tmp/.eshu
      HOME: /tmp
      ESHU_DEPLOYMENT_ENVIRONMENT: local-compose
      ESHU_PROMETHEUS_METRICS_ENABLED: "true"
      ESHU_WEBHOOK_GITHUB_SECRET: ${ESHU_WEBHOOK_GITHUB_SECRET:-}
      ESHU_WEBHOOK_GITLAB_TOKEN: ${ESHU_WEBHOOK_GITLAB_TOKEN:-}
      ESHU_WEBHOOK_BITBUCKET_SECRET: ${ESHU_WEBHOOK_BITBUCKET_SECRET:-}
      ESHU_AWS_FRESHNESS_TOKEN: ${ESHU_AWS_FRESHNESS_TOKEN:-}
      ESHU_WEBHOOK_PAGERDUTY_SECRET: ${ESHU_WEBHOOK_PAGERDUTY_SECRET:-}
      ESHU_WEBHOOK_JIRA_SECRET: ${ESHU_WEBHOOK_JIRA_SECRET:-}
      ESHU_WEBHOOK_GITHUB_PATH: ${ESHU_WEBHOOK_GITHUB_PATH:-/webhooks/github}
      ESHU_WEBHOOK_GITLAB_PATH: ${ESHU_WEBHOOK_GITLAB_PATH:-/webhooks/gitlab}
      ESHU_WEBHOOK_BITBUCKET_PATH: ${ESHU_WEBHOOK_BITBUCKET_PATH:-/webhooks/bitbucket}
      ESHU_AWS_FRESHNESS_PATH: ${ESHU_AWS_FRESHNESS_PATH:-/webhooks/aws/eventbridge}
      ESHU_WEBHOOK_PAGERDUTY_PATH: ${ESHU_WEBHOOK_PAGERDUTY_PATH:-/webhooks/pagerduty}
      ESHU_WEBHOOK_JIRA_PATH: ${ESHU_WEBHOOK_JIRA_PATH:-/webhooks/jira}
      ESHU_WEBHOOK_PAGERDUTY_SCOPE_ID: ${ESHU_WEBHOOK_PAGERDUTY_SCOPE_ID:-}
      ESHU_WEBHOOK_JIRA_SCOPE_ID: ${ESHU_WEBHOOK_JIRA_SCOPE_ID:-}
      ESHU_WEBHOOK_DEFAULT_BRANCH: ${ESHU_WEBHOOK_DEFAULT_BRANCH:-main}
      ESHU_WEBHOOK_MAX_BODY_BYTES: ${ESHU_WEBHOOK_MAX_BODY_BYTES:-1048576}
    depends_on:
      db-migrate:
        condition: service_completed_successfully

volumes:
  nornicdb_data:
  postgres_data:
  eshu_data:
