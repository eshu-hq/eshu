# Overlay that turns the base docker-compose.yaml into a two-team hosted
# governance cross-scope denial proof harness (#1910).
#
# It mounts an operator-managed scoped-token registry into both the API and the
# MCP server and points each at it through ESHU_SCOPED_TOKENS_FILE. With the
# registry present, query.AuthMiddlewareWithScopedTokensAndGovernanceAudit
# resolves a presented bearer token to a tenant-scoped AuthContext whose grant
# set bounds every scoped-read route (repository_authz.go graphCondition), so a
# token granted team-A's repository cannot read team-B's repository-scoped data
# and vice versa.
#
# The registry file is generated by scripts/run-two-team-governance-proof.sh at
# run time: it stands up the stack with NO registry, reads back both ingested
# repository ids through an admin (all-scopes) token, writes a registry that
# grants team-A one repository and team-B the other, then restarts the API and
# MCP server with the registry mounted and asserts the live cross-scope denial.
#
# Usage (from repo root): see scripts/run-two-team-governance-proof.sh, which
# drives the whole flow under a unique compose project name so it never collides
# with other local stacks.
#
# The registry stores only SHA-256 token hashes and low-cardinality tenant
# labels, never raw bearer tokens, raw identities, provider data, or private
# URLs. The captured proof artifacts are counts and HTTP states only.

services:
  eshu:
    environment:
      # When the file exists the API fails closed on a malformed registry and
      # enforces per-tenant grants on every scoped-read route. When it is the
      # empty placeholder (registry absent) the API keeps shared-token behavior
      # so the admin readback phase can enumerate every ingested repository.
      ESHU_SCOPED_TOKENS_FILE: ${ESHU_SCOPED_TOKENS_FILE:-}
    volumes:
      # Mount the operator-managed scoped-token registry read-only. The host
      # path defaults to /dev/null so the service starts cleanly before the
      # driver has generated the registry; the driver remounts the real file by
      # exporting GOV_PROOF_TOKENS_HOST_PATH and recreating the service.
      - ${GOV_PROOF_TOKENS_HOST_PATH:-/dev/null}:/run/secrets/scoped-tokens.json:ro

  mcp-server:
    environment:
      ESHU_SCOPED_TOKENS_FILE: ${ESHU_SCOPED_TOKENS_FILE:-}
    volumes:
      - ${GOV_PROOF_TOKENS_HOST_PATH:-/dev/null}:/run/secrets/scoped-tokens.json:ro
