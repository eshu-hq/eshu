# OCI-adapter variant of the reference Scorecard component package
# (#1980/#1923). Identical declared facts and trust identity as manifest.yaml,
# but spec.runtime.adapter is `oci`: the component-extension worker launches the
# digest-pinned artifact below with `docker run` under container isolation
# instead of execing a local process. The artifact image is the only place the
# worker reads the image from, so it MUST be digest-pinned.
#
# The committed digest is an all-`a` placeholder that points at the canonical
# published location. The remote Compose proof harness
# (scripts/run-remote-e2e-component-extension-oci.sh) builds the artifact from
# examples/collector-extensions/scorecard/Dockerfile.oci, pushes it to a local
# registry, and rewrites this artifact image to the real digest-pinned local ref
# in the shared component home — the real ref is never committed.
apiVersion: eshu.dev/v1alpha1
kind: ComponentPackage
metadata:
  id: dev.eshu.examples.scorecard
  name: Reference Scorecard collector
  publisher: eshu-hq
  version: 0.1.0
spec:
  compatibleCore: ">=0.0.5 <0.2.0"
  componentType: collector
  collectorKinds:
    - scorecard
  runtime:
    sdkProtocol: collector-sdk/v1alpha1
    adapter: oci
  artifacts:
    - platform: linux/amd64
      image: ghcr.io/eshu-hq/examples/scorecard-collector@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  emittedFacts:
    - kind: dev.eshu.examples.scorecard.snapshot
      schemaVersions:
        - 1.0.0
      sourceConfidence:
        - reported
    - kind: dev.eshu.examples.scorecard.check
      schemaVersions:
        - 1.0.0
      sourceConfidence:
        - reported
    - kind: dev.eshu.examples.scorecard.warning
      schemaVersions:
        - 1.0.0
      sourceConfidence:
        - reported
  consumerContracts:
    reducer:
      phases:
        - source_evidence_only:no_graph_truth
  telemetry:
    metricsPrefix: eshu_dp_example_scorecard_
