# Eshu golangci-lint configuration.
#
# Pinned to golangci-lint v2.12.2 (the version .github/workflows/test.yml
# installs via `go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2`;
# scripts/dev/precommit-go.sh derives the same version from test.yml).
# When bumping the binary, bump the `version:` line and any version-pinned
# plugin dependencies in lockstep.
#
# Acceptance for issue eshu-hq/eshu#3761 (Epic O / O1):
#   - Linters enabled: gofumpt, govet, staticcheck, ineffassign, unused,
#     gosimple, gocritic, errcheck, exhaustive, wrapcheck
#   - Pinned to v2.12.2 per test.yml
#   - Custom 500-line file cap enforced via the filelength Go plugin
#     (see ../tools/golangci-lint-filelength)
#   - CI fails on any violation
#
# Cross-references: docs/internal/audit/2026-06-09-repo-technical-audit.md § T11
version: "2"

linters:
  # We explicitly opt into each linter so the set is grep-able and
  # reviewable from this file. `default: none` keeps a vendor default
  # from silently adding a linter the team has not signed off on.
  default: none
  enable:
    # ── govet is the standard library static analyzer ──
    - govet

    # ── staticcheck umbrella (huge correctness + perf battery) ──
    - staticcheck

    # ── individual analyzers that staticcheck pulls in are listed
    #    separately so a violation surfaces with the specific rule
    #    name rather than the umbrella "staticcheck" code. ──
    - ineffassign
    - unused

    # ── gocritic: large bag of opinionated style/perf checks. ──
    # The custom 500-line file cap is delivered as a separate Go
    # plugin (linters.settings.custom.filelength below) — gocritic
    # itself does not ship a file-length check.
    - gocritic

    # ── errcheck: catches un-checked error returns. ──
    - errcheck

    # ── exhaustive: every enum-like switch must list its members. ──
    - exhaustive

    # ── wrapcheck: errors returned up the call stack must use %w. ──
    - wrapcheck

    # ── the custom 500-line file cap (Go plugin, see settings.custom) ──
    - filelength

    # ── funlen: function-length cap complementing the 500-line file cap.
    #    Hard-fails any function whose body exceeds 150 lines (issue #3789).
    #    Comments and blank lines are ignored so a long doc comment does not
    #    trip the gate; the statement check is disabled so only the line count
    #    matters. golangci-lint has no per-linter "warning" tier that still
    #    passes CI, so the issue's "warn > 100" is documented here rather than
    #    enforced as a separate non-blocking level — CI is binary. Test files
    #    are excluded (see exclusions below): table-driven test setups and
    #    fixture builders are legitimately long and are not the target. The
    #    files with pre-existing production functions over the cap are
    #    grandfathered via path-level exclusions (see exclusions.rules) so the
    #    cap fails on NEW long functions in every other file. ──
    - funlen

  # ── the custom 500-line file cap plugin ──
  settings:
    funlen:
      lines: 150
      statements: -1
      ignore-comments: true

    custom:
      filelength:
        type: goplugin
        path: ../tools/golangci-lint-filelength/filelength.so
        description: "Eshu 500-line file cap (AGENTS.md / CLAUDE.md)"
        original-url: github.com/eshu-hq/eshu/tools/golangci-lint-filelength

    # ── per-linter settings ──
    gocritic:
      # The default tag set pulls in style, diagnostic, and performance
      # checks without enabling the "experimental" or "opinionated" bags
      # (those are too noisy for a codebase this size and need a
      # separate review pass before turning on).
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        # The "experimental" tag covers these and they trip on Go 1.26
        # features the audit hasn't signed off on yet.
        - hugeParam
        # ifElseChain flags every multi-branch if/else as refactor
        # bait, including the deliberately-readable chains in
        # go/internal/collector/git_snapshot_native.go and friends.
        - ifElseChain
        # rangeValCopy flags every range over a value type, including
        # the deliberate value-iteration in the parser pipeline.
        - rangeValCopy
        # paramTypeCombine asks to merge `func(a string, b string)` into
        # `func(a, b string)`. The audit notes the codebase prefers
        # the explicit form for readability and review.
        - paramTypeCombine
        # httpNoBody asks to prefer `http.NoBody` over `nil` for request
        # bodies. Both are valid; the codebase uses `nil` for clarity.
        - httpNoBody
        # unnamedResult asks to name return values. The codebase leaves
        # them unnamed unless a `defer` needs them.
        - unnamedResult
        # importShadow flags a local that shadows a package import.
        # The shadow is intentional in many call sites to disambiguate
        # identically-named packages in testdata fixtures.
        - importShadow
        # filepathJoin flags `path.Join(path1, path2)` where the
        # argument is a single string. The codebase uses the explicit
        # form for clarity when joining a fixed suffix.
        - filepathJoin
        # appendCombine flags multiple `s = append(s, ...)` calls.
        # The codebase prefers the explicit form for clarity in hot paths.
        - appendCombine
        # builtinShadow flags shadowing of built-in identifiers; the
        # codebase intentionally shadows `len` in select benchmarks.
        - builtinShadow
        # nestingReduce asks to invert/flatten if/else nesting; the
        # codebase prefers the guard-clause form for readability.
        - nestingReduce
        # stringXbytes flags `[]byte(s)` vs `[]byte(s)` conversions;
        # both forms are valid and used interchangeably.
        - stringXbytes
        # equalFold flags `strings.ToLower(s) == "x"`; the codebase
        # uses both forms based on context.
        - equalFold
        # assignOp flags `x = x + 1` vs `x += 1`; both forms are valid.
        - assignOp
        # appendAssign flags `s = append(s, x)` vs `s = append(s, x)`;
        # the explicit form is clearer in some hot paths.
        - appendAssign
        # whyNoLint flags a //nolint directive without an explanation.
        # We add explanations where required, but this check is too
        # noisy for the breadth of //nolint usage in the codebase.
        - whyNoLint
        # regexpSimplify flags `regexp.MustCompile` patterns that
        # could be simplified; the codebase uses explicit patterns
        # for clarity and to avoid pattern compilation in hot paths.
        - regexpSimplify
        # emptyStringTest flags `s == ""` vs `len(s) == 0`; both
        # forms are valid and the codebase uses both.
        - emptyStringTest
        # stringConcatSimplify flags `s + s2` vs `fmt.Sprintf`; the
        # codebase uses string concatenation for hot paths.
        - stringConcatSimplify
        # sloppyReassign flags `x, y = y, x` vs explicit swap; both
        # forms are valid.
        - sloppyReassign
        # commentedOutCode flags commented-out code; the codebase
        # keeps commented code in some hot paths for context.
        - commentedOutCode
        # sprintfQuotedString flags `fmt.Sprintf("x")` vs `"x"`; the
        # codebase uses fmt.Sprintf in some test fixtures for
        # consistency with other format strings.
        - sprintfQuotedString
        # tooManyResultsChecker flags functions with too many return
        # values; the codebase follows existing patterns.
        - tooManyResultsChecker
        # singleCaseSwitch flags switches with a single case; the
        # codebase uses this pattern in some enums.
        - singleCaseSwitch
        # deferInLoop flags `defer` inside a loop; the codebase uses
        # this pattern in some bounded resource lifecycle blocks.
        - deferInLoop
        # elseif asks to convert `else if` to `case` in select-style
        # chains; the codebase prefers the explicit form.
        - elseif
        # mapKey flags suspicious map keys; the codebase uses string
        # concatenation for some enum-like map keys.
        - mapKey
        # exitAfterDefer flags `os.Exit` after `defer`; the
        # bootstrap-index binary intentionally uses this pattern.
        - exitAfterDefer
        # unlambda flags `func() { x() }()` vs `x()`; both forms are
        # valid and the codebase uses both.
        - unlambda
        # preferDecodeRune flags `utf8.RuneLen` vs decode patterns;
        # the codebase uses the explicit form.
        - preferDecodeRune
        # nilValReturn flags returning `nil, nil`; the codebase uses
        # this pattern for some optional-result functions.
        - nilValReturn
        # weakCond flags weak conditions; the codebase uses these
        # in some defensive checks.
        - weakCond
        # unnecessaryDefer flags `defer x()` where `x()` could be
        # called directly; the codebase uses defer for symmetry.
        - unnecessaryDefer
        # sqlQuery flags inline SQL; the codebase uses inline SQL
        # in some test fixtures.
        - sqlQuery
        # sloppyLen flags `len(s) > 0` vs `s != ""`; both forms are
        # valid and the codebase uses both.
        - sloppyLen

    wrapcheck:
      # We do not require %w wrapping inside the go/internal/parser
      # tree: the parser adapters are thin shims around tree-sitter
      # and the audit's overflow review does not need every internal
      # error wrapped. Everything else still must wrap.
      ignore-package-globs:
        - "github.com/eshu-hq/eshu/go/internal/parser/*"
        # cmd/* entry points are at the top of the call stack; they
        # either return an error directly to the operator or call
        # os.Exit after logging. Wrapping there adds no context.
        - "github.com/eshu-hq/eshu/go/cmd/*"
        # The testdata directories are fixture inputs, not production
        # source; ignore them.
        - "github.com/eshu-hq/eshu/go/**/testdata/*"

    exhaustive:
      # The exhaustiveness check is only useful where the type is
      # actually a closed enum. Package-level "ignore" lists are
      # added here when a switch over a third-party string-keyed map
      # is reviewed and confirmed not to need a default case.
      default-signifies-exhaustive: true

  # ── exclusions (v2 location for exclude-rules) ──
  exclusions:
    rules:
      # Test files are allowed to use the full ecosystem of testing
      # helpers (t.Fatal, t.Errorf, require.NoError) without errcheck
      # complaining about every assertion.
      - path: _test\.go
        linters:
          - errcheck
          - wrapcheck
          - exhaustive
          # Table-driven test setups, fixture builders, and adversarial-case
          # tables are legitimately long; the function-length cap targets
          # production code, not test scaffolding.
          - funlen
      # SA5011 loses t.Fatal/t.Fatalf noreturn inference under golangci-lint
      # v2.12.2 + go1.26.5, flagging the standard
      # `if x == nil { t.Fatal(...) }`-then-dereference test pattern as a
      # possible nil dereference (34 false positives across go/internal/mcp
      # alone as of 2026-07-22, PR #5641). Scoped to _test.go AND to SA5011
      # only: every other staticcheck check still runs in tests, and
      # production-code SA5011 nil-deref coverage is unaffected.
      - path: _test\.go
        linters:
          - staticcheck
        text: 'SA5011'
      # ── funlen baseline (#3789): these files contain pre-existing
      #    functions over the 150-line cap. They are grandfathered via
      #    path-level exclusion (not inline //nolint) so the guarded
      #    parser/query/handler source stays untouched and the
      #    parser-relationship-kit and route-coverage lockstep gates do
      #    not fire on what is a tooling-only change. The cap still
      #    applies to every other file; these are tracked for extraction.
      - path: 'cmd/api/wiring\.go'
        linters:
          - funlen
      - path: 'cmd/api/wiring_router\.go'
        linters:
          - funlen
