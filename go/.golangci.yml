      - path: 'internal/doctruth/drift\.go'
        linters:
          - exhaustive
      # Query answer_packet, investigation_packet_build, metrics,
      # serviceintel compose, and incident_context_model handle
      # a subset of FreshnessState / IncidentTruthLabel /
      # ReplatformingSourceState values; the full enum lives in
