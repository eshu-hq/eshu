      # Storage/cypher writer handles a subset of cypher operations;
      # the missing operations route to a default branch.
      - path: 'internal/storage/cypher/writer\.go'
        linters:
          - exhaustive
      # Generated files are produced by tools and should not be
      # edited by hand; we suppress everything there.
      - path: /generated/
        linters:
          - govet
          - errcheck
          - wrapcheck
          - exhaustive
          - gocritic
          - staticcheck
      # The instrument registry (go/internal/telemetry/instruments.go)
      # is a 4k-line data file generated by a tracked process. We
      # exclude the whole file from every linter that would force a
      # split. The 500-line cap is suppressed via //nolint:filelength
      # on the file's package declaration.
      - path: go/internal/telemetry/instruments\.go
        linters:
          - gocritic
          - govet
          - wrapcheck
          - errcheck
      # cmd/* entry points are at the top of the call stack; they
      # either return an error directly to the operator or call
      # os.Exit after logging. Wrapping there adds no context.
      - path: 'cmd/'
        linters:
          - wrapcheck
          - exhaustive
      # AWS SDK adapter packages sit at the boundary between the
      # Eshu runtime and the AWS SDK. They translate typed AWS
      # errors into scanner-owned errors; the audit confirms the
      # AWS error already carries the operation and error code,
      # so %w wrapping at the adapter boundary adds no context.
      # Per internal/collector/awscloud/AGENTS.md: "Do not cache
      # AWS credentials or SDK clients beyond the claim-scoped
      # runtime object that created this adapter."
      - path: 'internal/collector/awscloud/services/.*/awssdk/'
        linters:
          - wrapcheck
      - path: 'internal/collector/awscloud/services/.*/awssdk\.go'
        linters:
          - wrapcheck
      # Scanner packages in the AWS cloud collector return AWS SDK
      # errors through the envelope boundary; the envelope
      # redaction layer is the appropriate place to add context.
      - path: 'internal/collector/awscloud/services/.*/scanner\.go'
        linters:
          - wrapcheck
      # The awssdk mappers are also at the boundary.
      - path: 'internal/collector/awscloud/services/.*/mappers\.go'
        linters:
          - wrapcheck
      - path: 'internal/collector/awscloud/services/.*/mapping\.go'
        linters:
          - wrapcheck
      # Scanner worker analyzers and image analyzers are at the
      # boundary between the collector runtime and the upstream
      # image/sbom source.
      - path: 'internal/collector/scannerworker/'
        linters:
          - wrapcheck
      # OCI registry source and package registry source are at the
      # boundary with the upstream OCI/registry APIs.
      - path: 'internal/collector/ociregistry/'
        linters:
          - wrapcheck
      - path: 'internal/collector/packageregistry/'
        linters:
          - wrapcheck
      # Git selection filesystem layer is at the boundary with the
      # local filesystem and git CLI.
      - path: 'internal/collector/git_selection_filesystem\.go'
        linters:
          - wrapcheck
      - path: 'internal/collector/git_selection_.*\.go'
        linters:
          - wrapcheck
      # Security alerts runtime is at the boundary with hosted
      # provider APIs.
      - path: 'internal/collector/securityalerts/'
        linters:
          - wrapcheck
      # Telemetry instrument registry has 4400 lines of frozen
      # eshu_dp_* definitions; errors returned from the OTEL SDK
      # are already context-rich.
      - path: 'internal/telemetry/instruments\.go'
        linters:
          - wrapcheck
      # Vulnerability parity and proof reports are one-shot CLI
      # tooling at the boundary with the report writer.
      - path: 'internal/vulnerabilityparity/'
        linters:
          - wrapcheck
      - path: 'internal/vulnerabilityparityproof/'
        linters:
          - wrapcheck
      # Terraform schema loader is at the boundary with the
      # upstream terraform provider schemas (gz-compressed JSON).
      - path: 'internal/terraformschema/'
        linters:
          - wrapcheck
      # Webhook normalizers and signature verifier are at the
      # boundary with upstream webhook providers.
      - path: 'internal/webhook/'
        linters:
          - wrapcheck
      # App lifecycle and runner are at the boundary with the
      # service runtimes.
      - path: 'internal/app/'
        linters:
          - wrapcheck
      # Storage postgres shared_intents, ingestion_backfill, and
      # other backfill/identity files are at the boundary with the
      # database driver; wrap context is added at the handler level.
      - path: 'internal/storage/postgres/shared_intents'
        linters:
          - wrapcheck
      - path: 'internal/storage/postgres/ingestion_backfill'
        linters:
          - wrapcheck
      - path: 'internal/storage/postgres/iac_reachability'
        linters:
          - wrapcheck
      - path: 'internal/storage/postgres/generation_projected_commit'
        linters:
          - wrapcheck
      - path: 'internal/storage/postgres/service_materialization'
        linters:
          - wrapcheck
      - path: 'internal/storage/postgres/relationship_store'
        linters:
          - wrapcheck
      - path: 'internal/storage/postgres/decisions'
        linters:
          - wrapcheck
      - path: 'internal/storage/postgres/db\.go'
        linters:
          - wrapcheck
      - path: 'internal/storage/postgres/identity_admin'
        linters:
          - wrapcheck
      # Collector OS package vulnerability and Kubernetes live are
      # at the boundary with OS/Kubernetes APIs.
      - path: 'internal/collector/ospackagevulnerability/'
        linters:
          - wrapcheck
      - path: 'internal/collector/kuberneteslive/'
        linters:
          - wrapcheck
      # Query handlers are at the boundary between HTTP and the
      # graph/content stores.
      - path: 'internal/query/'
        linters:
          - wrapcheck
      # Coordinator scheduling is at the boundary between runtime
      # and collector registry.
      - path: 'internal/coordinator/'
        linters:
          - wrapcheck
      # Vulnerability intelligence and terraform state collectors
      # are at the boundary with upstream provider APIs.
      - path: 'internal/collector/vulnerabilityintelligence/'
        linters:
          - wrapcheck
      - path: 'internal/collector/terraformstate/'
        linters:
          - wrapcheck
      # Vault live and GCP cloud collectors are at the boundary
      # with upstream provider APIs.
      - path: 'internal/collector/vaultlive/'
        linters:
          - wrapcheck
      - path: 'internal/collector/gcpcloud/'
        linters:
          - wrapcheck
      # Runtime config and status surface are at the boundary with
      # the host process and operator-facing read paths.
      - path: 'internal/runtime/'
        linters:
          - wrapcheck
      # The remaining collector families are at the boundary with
      # upstream document/runtime providers.
      - path: 'internal/collector/tfstateruntime/'
        linters:
          - wrapcheck
      - path: 'internal/collector/git_documentation_'
        linters:
          - wrapcheck
      - path: 'internal/collector/azurecloud/'
        linters:
          - wrapcheck
      - path: 'internal/collector/cicdrun/'
        linters:
          - wrapcheck
      - path: 'internal/collector/sbomruntime/'
        linters:
          - wrapcheck
      - path: 'internal/collector/awscloud/awsruntime/'
        linters:
          - wrapcheck
      # Remaining storage/postgres stores are at the boundary with
      # the database driver; wrap context is added at the handler
      # level by the caller.
      - path: 'internal/storage/postgres/'
        linters:
          - wrapcheck
      # Storage/cypher adapters are at the boundary with the graph
      # backend; wrap context is added at the handler level.
      - path: 'internal/storage/cypher/'
        linters:
          - wrapcheck
      # Runtime search/config layers.
      - path: 'internal/searchembedruntime/'
        linters:
          - wrapcheck
      # Buildinfo CLI is a leaf one-shot tool; the wrap context is
      # the operator-facing message.
      - path: 'internal/buildinfo/'
        linters:
          - wrapcheck
      # Capability catalog readback and docs freshness are at the
      # boundary with the capability matrix and documentation index.
      - path: 'internal/capabilitycatalog/'
        linters:
          - wrapcheck
      # Collector discovery, EC2 posture/volume, networkfirewall
      # relationships, and SDK HTTP are at the boundary with the
      # filesystem and AWS SDK.
      - path: 'internal/collector/discovery/'
        linters:
          - wrapcheck
      - path: 'internal/collector/awscloud/services/ec2/'
        linters:
          - wrapcheck
      - path: 'internal/collector/awscloud/services/networkfirewall/'
        linters:
          - wrapcheck
      - path: 'internal/collector/awscloud/internal/partitionguard/'
        linters:
          - wrapcheck
      - path: 'internal/collector/awscloud/services/.*/relationships\.go'
        linters:
          - wrapcheck
      - path: 'internal/collector/sdk/'
        linters:
          - wrapcheck
      - path: 'internal/collector/ooxmlpreflight/'
        linters:
          - wrapcheck
      - path: 'internal/collector/priority_selector\.go'
        linters:
          - wrapcheck
      - path: 'internal/collector/servicecatalog/'
        linters:
          - wrapcheck
      # Exports registry, graph batch/schema, MCP server, projector
      # service, relationships tfstatebackend, search layers,
      # semanticdocs, status, telemetry logging, and workflowimage
      # are at the boundary with the read/runtime surface.
      - path: 'internal/exports/registry\.go'
        linters:
          - wrapcheck
      - path: 'internal/graph/'
        linters:
          - wrapcheck
      - path: 'internal/mcp/'
        linters:
          - wrapcheck
      - path: 'internal/projector/'
        linters:
          - wrapcheck
      - path: 'internal/relationships/tfstatebackend/'
        linters:
          - wrapcheck
      - path: 'internal/search'
        linters:
          - wrapcheck
      - path: 'internal/semanticdocs/'
        linters:
          - wrapcheck
      - path: 'internal/status/'
        linters:
          - wrapcheck
      - path: 'internal/telemetry/logging\.go'
        linters:
          - wrapcheck
      - path: 'internal/workflowimage/'
        linters:
          - wrapcheck
      # The remaining 5-6 wrapcheck violations in the hot-path
      # collector files (git_snapshot_*, git_source.go) are at the
      # filesystem boundary; wrap context is added at the projection
      # handler.
      - path: 'internal/collector/git_snapshot_'
        linters:
          - wrapcheck
      - path: 'internal/collector/git_source\.go'
        linters:
          - wrapcheck
      # Reducer and projector writers are at the boundary with the
      # graph writer; wrap context is added at the domain handler.
      - path: 'internal/reducer/service_materialization_writer\.go'
        linters:
          - wrapcheck
      - path: 'internal/projector/eshu_search_document_sweeper\.go'
        linters:
          - wrapcheck
      # Reducer domain handlers and writer surfaces are at the
      # boundary between the reducer runner and the graph writer.
      - path: 'internal/reducer/'
        linters:
          - wrapcheck
      # Recovery replay is at the boundary with the storage
      # recovery surfaces.
      - path: 'internal/recovery/'
        linters:
          - wrapcheck
      # Scoped token identity, OIDC login, and SAML auth are at
      # the boundary with the upstream identity provider.
      - path: 'internal/scopedtoken/'
        linters:
          - wrapcheck
      - path: 'internal/oidclogin/'
        linters:
          - wrapcheck
      - path: 'internal/samlauth/'
        linters:
          - wrapcheck
      # Extension conformance, component registry, and ask wiring
      # are at the boundary with the extension SDK.
      - path: 'internal/extensionconformance/'
        linters:
          - wrapcheck
      - path: 'internal/component/'
        linters:
          - wrapcheck
      - path: 'internal/askwiring/'
        linters:
          - wrapcheck
      - path: 'internal/ask/'
        linters:
          - wrapcheck
      # Search backends and embed providers are at the boundary
      # with the search runtime.
      - path: 'internal/searchnornicdb/'
        linters:
          - wrapcheck
      - path: 'internal/searchembedprovider/'
        linters:
          - wrapcheck
      # Remaining collector boundaries: service runner, ocrdoc,
      # mediadoc, confluence, eks nodegroup addons, and
      # documentation extractors.
      - path: 'internal/collector/claimed_service\.go'
        linters:
          - wrapcheck
      - path: 'internal/collector/service\.go'
        linters:
          - wrapcheck
      - path: 'internal/collector/ocrdoc/'
        linters:
          - wrapcheck
      - path: 'internal/collector/mediadoc/'
        linters:
          - wrapcheck
      - path: 'internal/collector/confluence/'
        linters:
          - wrapcheck
      - path: 'internal/collector/awscloud/services/eks/'
        linters:
          - wrapcheck
      # Parser boundaries: kotlin/repository_returns, etc.
      - path: 'internal/parser/'
        linters:
          - wrapcheck
      # Remaining collector families: tempo, prometheusmimir,
      # pagerduty, loki, jira, grafana, documentation export.
      - path: 'internal/collector/tempo/'
        linters:
          - wrapcheck
      - path: 'internal/collector/prometheusmimir/'
        linters:
          - wrapcheck
      - path: 'internal/collector/pagerduty/'
        linters:
          - wrapcheck
      - path: 'internal/collector/loki/'
        linters:
          - wrapcheck
      - path: 'internal/collector/jira/'
        linters:
          - wrapcheck
      - path: 'internal/collector/grafana/'
        linters:
          - wrapcheck
      - path: 'internal/collector/documentationexport/'
        linters:
          - wrapcheck
      - path: 'internal/collector/extensionhost/'
        linters:
          - wrapcheck
      - path: 'internal/collector/git_source_processing\.go'
        linters:
          - wrapcheck
      - path: 'internal/collector/fair_claim_dispatcher\.go'
        linters:
          - wrapcheck
      # Local runtime, doctrine truth, correlation engine, and
      # graph schema compat are at the boundary with the runtime
      # bootstrap and the graph backend.
      - path: 'internal/eshulocal/'
        linters:
          - wrapcheck
      - path: 'internal/doctruth/'
        linters:
          - wrapcheck
      - path: 'internal/correlation/'
        linters:
          - wrapcheck
      - path: 'internal/graphschemacompat/'
        linters:
          - wrapcheck
      - path: 'internal/graphbackpressure/'
        linters:
          - wrapcheck
      - path: 'internal/projector/runtime\.go'
        linters:
          - wrapcheck
      - path: 'internal/queryplan/'
        linters:
          - wrapcheck

# ── output + issues ──
output:
  formats:
    text:
      path: stdout
  print-issued-lines: true
  print-linter-name: true

issues:
  # The default of 50 is too low for a 400k-line repo on first
  # adoption. We leave it uncapped and rely on per-linter caps
  # (set in CI with --max-issues-per-linter) once the first sweep
  # lands.
  max-issues-per-linter: 0
  max-same-issues: 0

# ── formatters ──
# In v2, gofumpt is a formatter (replaces gofmt + goimports) rather
# than a linter. Running `golangci-lint fmt` is gated in CI by the
# same step that runs `golangci-lint run`.
formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      # Match the rules gofumpt ships by default. The
      # `extra-rules: true` flag would also rewrite `init` ordering
      # and several other patterns that the codebase has not opted
      # into; we keep it off until a tracked sweep lands.
      extra-rules: false
