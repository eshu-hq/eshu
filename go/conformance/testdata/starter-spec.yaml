# Starter conformance spec (#4112 / R-10).
#
# This YAML is the contributor-facing twin of the in-repo B-12 golden snapshot
# (testdata/golden/e2e-20repo-snapshot.json). It is parsed via sigs.k8s.io/yaml
# into the SAME goldengate.Snapshot struct the in-repo gate uses, so the same
# Evaluate* assertions run against it — only the corpus is smaller and the
# observed values come from an offline cassette replay instead of a live graph.
#
# Edit this file to describe what YOUR collector's facts must project. The
# fields below mirror the golden snapshot's `graph` block: per-label node count
# tolerances, per-edge count tolerances, existence-style required correlations,
# and required nodes (with an optional property floor).
#
# The starter ranges are pinned exactly (min == max) to the deterministic
# hello-eshu starter tape so a regression is obvious. For a growing corpus,
# widen the ceilings (keep the floors meaningful so a projection drop fails).
schema_version: "1"
corpus_id: starter-hello-eshu

graph:
  node_counts:
    Repository: { min: 1, max: 1, note: "exactly one repository per scope" }
    Directory: { min: 2, max: 2, note: "src, src/util" }
    File: { min: 3, max: 3, note: "README.md, src/main.go, src/util/util.go" }
    Package: { min: 1, max: 1, note: "left-pad" }
  edge_counts:
    CONTAINS: { min: 5, max: 5, note: "2 directory parents + 3 file parents" }
    DEPENDS_ON: { min: 1, max: 1, note: "hello-eshu -> left-pad" }
  required_correlations:
    - id: rc-repo-contains-dir
      description: a repository directly contains its top-level directories
      relationship: CONTAINS
      from_label: Repository
      to_label: Directory
      minimum_count: 1
    # Evidence-narrowed correlation with an edge-property assertion — the same
    # qualifier path the in-repo gate uses for tool-agnostic shared edge types
    # (DEPENDS_ON, DEPLOYS_FROM). The bare triple is not enough: the assertion
    # only counts DEPENDS_ON edges carrying the manifest-reference evidence kind,
    # and every matching edge must be stamped source_tool=starter. An unrelated
    # emitter's DEPENDS_ON edge (different evidence, or a different source_tool)
    # does not satisfy it — offline, exactly as in the live gate.
    - id: rc-repo-depends-pkg
      description: the repository declares a package dependency stamped by the starter tool
      relationship: DEPENDS_ON
      from_label: Repository
      to_label: Package
      minimum_count: 1
      evidence_kinds:
        - starter_manifest_reference
      required_edge_properties:
        - source_tool
      allowed_edge_property_values:
        source_tool:
          - starter
  required_nodes:
    - id: rn-file-language
      description: at least two files carry a detected language
      label: File
      minimum_count: 2
      required_node_properties:
        - language
  # Bounded self-loop assertion — the self-loop-axis twin of the in-repo gate's
  # required_self_loops (which pins the dart (Function {language})-[:CALLS]->
  # (self) recursion count). Unlike a correlation (a floor only), a self-loop
  # count is bounded on BOTH sides: a floor alone cannot tell "genuine recursion
  # survives" apart from "a declaration-vs-call-site bug (eshu-hq/eshu#5332)
  # reintroduced a spurious self-loop per declaration" — both inflate the SAME
  # count. Scope by a node property (here File.language, the starter schema's
  # real language-bearing property) so one language's self-loop count is not
  # conflated with another's, mirroring the live gate's language scoping. The
  # starter hello-eshu corpus emits no code-call self-loops, so the honest bound
  # is [0,0]: the offline driver computes the real observed count (0) and this
  # asserts it, and a spurious (File {language})-[:CALLS]->(self) loop would push
  # the count past the max=0 ceiling and fail the gate. A collector whose real
  # graph has genuine recursion widens the bound accordingly.
  required_self_loops:
    - id: rsl-go-no-self-call
      description: no go file has a spurious self-call self-loop in the starter corpus
      label: File
      relationship: CALLS
      node_property: language
      node_property_value: go
      minimum_count: 0
      maximum_count: 0
