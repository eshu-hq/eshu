  - id: QP-RESOURCE-INVESTIGATION-WORKLOADS
    domain: impact
    backend: nornicdb_neo4j
    query_kind: cypher
    source: {file: go/internal/query/impact_resource_investigation_reads.go, symbol: resourceInvestigationWorkloadsCypher, source_sha256: c0e2d2cc361ff17eb841261f4b482b52644355a2dab972c767877682e0626c35}
    query_fragment: 'MATCH (instance:WorkloadInstance)-[rel:USES]->(%s)'
    cypher_sha256: e100f5b99cf9be76a0bfa62a92c405f069c571cd686a999c596efd0fbc1e3a32
    required_anchors: [{label: CloudResource, property: resource_id}]
    required_schema: [cloud_resource_resource_id]
    required_limits: [$limit]
    requires_order: true
    caveats: [The NornicDB-safe query anchors on the USES relationship type and a whitelisted resource label; Neo4j may choose DirectedRelationshipTypeScan on an empty proof graph, which remains bounded by relationship type and LIMIT.]
    plan:
      operators: [DirectedRelationshipTypeScan]
      forbidden_operators: [AllNodesScan, CartesianProduct, UnboundedExpand]

  - id: QP-RESOURCE-INVESTIGATION-INSTANCE-WORKLOADS
