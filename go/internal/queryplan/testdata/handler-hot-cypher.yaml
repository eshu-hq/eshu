    plan: *indexed_plan

  - id: QP-GRAPH-ENTITY-COUNT
    domain: graph
    backend: nornicdb_neo4j
    query_kind: cypher
    source: {file: go/internal/query/graph_entity_inventory.go, symbol: graphEntityKindCountCypher, source_sha256: 4d23e6854ac1e0db31e947b55d246c30ae99aa9025fbad786182fcf703e2d9c2}
    query_fragment: 'MATCH (n:'
    cypher_sha256: 1f2e1be042ad073986974cce741a960bdb5321fd26c2d4a20823876182192a25
    caveats: [Neo4j may use the label count store; NornicDB must remain label-bounded and must not use an all-node scan.]
    plan:
      operators: [NodeCountFromCountStore]
      forbidden_operators: [AllNodesScan, CartesianProduct, UnboundedExpand]

  - id: QP-GRAPH-ENTITY-LIST
    domain: graph
    backend: nornicdb_neo4j
    query_kind: cypher
    source: {file: go/internal/query/graph_entity_inventory.go, symbol: graphEntityKindListCypher, source_sha256: d5ebe60e75c9078e0f7d4915c73edfe6ff686a81c205b374625bc953c57c921e}
    query_fragment: 'MATCH (n:'
    cypher_sha256: ed4a6cde0b451ba5ea6b1f030c64faaa2d8378e882853f604d5fcbb6f79ef891
    required_anchors: [{label: Workload, property: name}]
    required_schema: [workload_name]
    required_limits: [$limit]
    requires_order: true
    caveats: [Substring search is label-bounded; PROFILE must reject an all-node scan even when the backend cannot use the name index for CONTAINS.]
    plan:
      operators: [NodeByLabelScan]
      forbidden_operators: [AllNodesScan, CartesianProduct, UnboundedExpand]

