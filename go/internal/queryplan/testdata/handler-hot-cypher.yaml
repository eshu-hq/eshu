    source: {file: go/internal/query/impact_resource_investigation_selector.go, symbol: resourceInvestigationSelectorLabelCypher, source_sha256: 6c6553a51a109e2fb8be5d79b7f93fa97d35ef95efc4a517a222ad9eed6a9769}
    query_fragment: 'MATCH (n:%s)'
    cypher_sha256: 37986e9c5d95e6ed09806952f0f52cf683d660df41a276fea1668d246c517612
    required_anchors: [{label: CloudResource, property: resource_id}]
    required_schema: [cloud_resource_resource_id]
    required_limits: [$limit]
    requires_order: true
    caveats: [The production resolver runs one direct query per reachable label with at most four read sessions; the safe-variant family PROFILEs every reachable label, type, environment, access, and exact or fuzzy shape.]
    plan:
      operators: [NodeByLabelScan]
      forbidden_operators: [AllNodesScan, CartesianProduct, UnboundedExpand]

  - id: QP-RESOURCE-INVESTIGATION-WORKLOADS
    domain: impact
