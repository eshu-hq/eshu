    query_kind: cypher
    source: {file: go/internal/query/code_call_graph_metrics.go, symbol: recursiveFunctionsCypher, source_sha256: 8fb4d87b9ebc0549c95ba2ccafe017d28e1ee58f911f45ad6e80a659282619fe}
