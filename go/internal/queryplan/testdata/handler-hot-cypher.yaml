    domain: impact
    backend: nornicdb_neo4j
    query_kind: cypher
    source: {file: go/internal/query/impact_resource_investigation_reads.go, symbol: resourceInvestigationRepoPathsCypher, source_sha256: bbff09dc1e8ae8a6b64a4a32439f8ca746678ab84c7996d95095358f26133ead}
    query_fragment: 'MATCH path = %s'
    cypher_sha256: 4868f98cf10731ff8781ed9ba394da16d97c623c5cdd7d74217257bb5b641565
    required_anchors: [{label: CloudResource, property: resource_id}]
    required_schema: [cloud_resource_resource_id]
    required_limits: [$limit]
    requires_order: true
    caveats: [The NornicDB-safe path read starts from the resolved whitelisted resource label and has fixed max depth plus LIMIT; the retained 91k-node precedent measured the label-bounded form at 1.2ms versus 410ms unlabeled.]
    plan:
      operators: [NodeByLabelScan, VarLengthExpand]
      forbidden_operators: [AllNodesScan, CartesianProduct, UnboundedExpand]
