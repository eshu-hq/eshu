    query_fragment: 'MATCH (instance:WorkloadInstance)-[:INSTANCE_OF]->(workload:Workload)'
    cypher_sha256: 1cb55f9bca8f9fead028b9408fda479a84e189e9f7568f8701e2bee1445357a0
    required_anchors: [{label: WorkloadInstance, property: id}]
    required_schema: [workload_instance_id]
