version: 1
required_ids:
  - QP-SC-DEPS
  - QP-SC-PKGREG-DEPS
  - QP-DEPLOY-CATALOG-ENV
  - QP-DEPLOY-CATALOG-WORKLOAD-REPO
  - QP-DEPLOY-CATALOG-WORKLOAD-INSTANCE
  - QP-SVC-RESOLVE
  - QP-SVC-CONTEXT
  - QP-SVC-RUNS-ON
  - QP-SVC-CLOUD-DEPS
  - QP-CODE-REL-STORY
  - QP-CODE-REL-STORY-INCOMING
  - QP-CODE-REL-STORY-ANCHOR-COLLISION
  - QP-CODE-IMPORT-CYCLES
  - QP-CODE-REL-TRANSITIVE
  - QP-READINESS-HOSTED
  - QP-READINESS-SC-IMPACT
  - QP-IMPACT-CHANGE-SURFACE
  - QP-RELATIONSHIPS-CATALOG-COUNT
  - QP-RELATIONSHIPS-CATALOG-SOURCE-TOOL
  - QP-RELATIONSHIPS-EDGES
  - QP-INFRA-RESOURCE-SEARCH
  - QP-INFRA-RESOURCE-AGGREGATE
entries:
  - id: QP-SC-DEPS
    domain: supply_chain
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/dependencies_cypher.go
      symbol: forwardDependenciesCypher
      line_hint: 54
    cypher: |
      MATCH (src:Package {normalized_name: $package})-[:HAS_VERSION]->(v:PackageVersion)-[:DECLARES_DEPENDENCY]->(d:PackageDependency)-[:DEPENDS_ON_PACKAGE]->(target:Package)
      WHERE ($ecosystem = '' OR src.ecosystem = $ecosystem)
        AND d.uid IS NOT NULL AND d.uid <> ''
        AND target.uid IS NOT NULL AND target.uid <> ''
        AND d.dependency_normalized IS NOT NULL AND d.dependency_normalized <> ''
        AND ($after_name = '' OR d.dependency_normalized > $after_name OR (d.dependency_normalized = $after_name AND d.uid > $after_edge))
      RETURN src.uid AS anchor_package_id,
             target.uid AS related_package_id,
             d.uid AS edge_id,
             d.dependency_normalized AS cursor_name
      ORDER BY d.dependency_normalized, d.uid
      LIMIT $limit
    required_anchors:
      - label: Package
        property: normalized_name
    required_schema:
      - package_normalized_name
      - nornicdb_package_uid_lookup
      - nornicdb_package_dependency_uid_lookup
    required_limits:
      - $limit
    requires_order: true
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-SC-PKGREG-DEPS
    domain: supply_chain
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/package_registry_cypher.go
      symbol: packageRegistryDependenciesCypher
      line_hint: 54
    cypher: |
      MATCH (d:PackageDependency)
      WHERE d.version_id = $version_id
      WITH d
      MATCH (d)-[:DEPENDS_ON_PACKAGE]->(target:Package)
      WHERE d.uid IS NOT NULL AND d.uid <> ''
        AND d.package_id IS NOT NULL AND d.package_id <> ''
        AND d.version_id IS NOT NULL AND d.version_id <> ''
        AND target.uid IS NOT NULL AND target.uid <> ''
        AND ($after_version_id = '' OR d.version_id > $after_version_id OR (d.version_id = $after_version_id AND d.uid > $after_dependency_id))
      RETURN d.uid AS dependency_id,
             d.package_id AS source_package_id,
             d.version_id AS source_version_id,
             target.uid AS dependency_package_id
      ORDER BY d.version_id, d.uid
      LIMIT $limit
    required_anchors:
      - label: PackageDependency
        property: version_id
    required_schema:
      - package_dependency_version_id
      - nornicdb_package_dependency_uid_lookup
    required_limits:
      - $limit
    requires_order: true
    allow_unlabeled: true
    caveats:
      - The second MATCH continues from d after WITH d; the entry keeps unlabeled bound-variable reuse explicit instead of weakening the global scan rule.
    plan:
      operators:
        - NodeIndexSeek
        - Expand
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-DEPLOY-CATALOG-ENV
    domain: deployable
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/catalog_workload_environments.go
      symbol: catalogWorkloadEvidenceEnvironmentCypher
      line_hint: 59
    cypher: |
      MATCH (w:Workload)<-[:DEFINES]-(repo:Repository)<-[:EVIDENCES_REPOSITORY_RELATIONSHIP]-(:EvidenceArtifact)-[:TARGETS_ENVIRONMENT]->(env:Environment)
      WHERE w.id IN $ids
      RETURN w.id AS id,
             env.name AS environment
      ORDER BY id, environment
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
      - environment_name
    requires_order: true
    caveats:
      - This catalog enrichment is bounded to the limited workload id set ($ids) from the catalog base query (issue #3389) and uses a connected path to avoid a NornicDB double-MATCH re-anchor fanout.
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-DEPLOY-CATALOG-WORKLOAD-REPO
    domain: deployable
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/catalog_workload_environments.go
      symbol: catalogWorkloadRepoCypher
      line_hint: 41
    cypher: |
      MATCH (w:Workload) WHERE w.id IN $ids
      MATCH (repo:Repository)-[:DEFINES]->(w)
      RETURN w.id AS id,
             repo.id AS repo_id,
             repo.name AS repo_name
      ORDER BY id
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
    requires_order: true
    caveats:
      - Bounded to the limited workload id set ($ids) from the catalog base query so the enrichment never scans every Workload/Repository edge (issue #3389).
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-DEPLOY-CATALOG-WORKLOAD-INSTANCE
    domain: deployable
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/catalog_workload_environments.go
      symbol: catalogWorkloadInstanceEnvironmentCypher
      line_hint: 51
    cypher: |
      MATCH (w:Workload) WHERE w.id IN $ids
      MATCH (inst:WorkloadInstance)-[:INSTANCE_OF]->(w)
      RETURN w.id AS id,
             count(inst) AS instance_count,
             collect(DISTINCT inst.environment) AS environments
      ORDER BY id
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
      - workload_instance_id
    requires_order: true
    caveats:
      - Bounded to the limited workload id set ($ids) from the catalog base query so the per-workload instance aggregate never groups over every WorkloadInstance (issue #3389).
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-SVC-RESOLVE
    domain: service
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/service_workload_resolution.go
      symbol: queryServiceWorkloadCandidates
      line_hint: 219
    cypher: |
      MATCH (w:Workload)
      WHERE w.id = $workload_id
      RETURN w.id as id,
             w.name as name,
             w.kind as kind,
             w.repo_id as repo_id,
             '' as environment
      ORDER BY repo_id, id
      LIMIT 2
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
    required_limits:
      - "2"
    requires_order: true
    plan:
      operators:
        - NodeIndexSeek
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-SVC-CONTEXT
    domain: service
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/entity_workload_context.go
      symbol: fetchWorkloadContextForOperation
      line_hint: 46
    cypher: |
      MATCH (w:Workload)
      WHERE w.id = $workload_id
      RETURN w.id as id, w.name as name, w.kind as kind, w.repo_id as repo_id
      LIMIT 1
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
    required_limits:
      - "1"
    plan:
      operators:
        - NodeIndexSeek
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-SVC-RUNS-ON
    domain: service
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/entity_workload_context.go
      symbol: fetchWorkloadPlatformRows
      line_hint: 357
    cypher: |
      MATCH (i:WorkloadInstance)-[runsOn:RUNS_ON]->(p:Platform)
      WHERE i.id IN $instance_ids
      RETURN i.id as instance_id,
             p.name as platform_name
      ORDER BY instance_id, platform_name
    required_anchors:
      - label: WorkloadInstance
        property: id
    required_schema:
      - workload_instance_id
      - nornicdb_workload_instance_id_lookup
      - platform_id
    requires_order: true
    plan:
      operators:
        - NodeIndexSeek
        - Expand
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-SVC-CLOUD-DEPS
    domain: service
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/cloud_resource_dependencies.go
      symbol: loadMaterializedServiceCloudResourceDependencies
      line_hint: 10
    cypher: |
      MATCH (workload:Workload {id: $workload_id})<-[:INSTANCE_OF]-(instance:WorkloadInstance)-[rel:USES]->(c:CloudResource)
      RETURN DISTINCT coalesce(c.id, c.uid, c.resource_id, c.arn, c.name) AS id,
             c.name AS name
      ORDER BY name, id
      LIMIT $limit
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
      - cloud_resource_resource_id
    required_limits:
      - $limit
    requires_order: true
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Distinct
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-CODE-REL-STORY
    domain: code_relationship
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/code_relationship_story_nornicdb.go
      symbol: nornicDBRelationshipStoryGraphCypher
      line_hint: 36
    cypher: |
      MATCH (anchor:Function {uid: $entity_id})-[rel:CALLS]->(target:Function)
      RETURN 'outgoing' as direction,
             'CALLS' as type,
             anchor.id as source_legacy_id,
             anchor.uid as source_uid,
             target.id as target_legacy_id,
             target.uid as target_uid
      ORDER BY target.name, target.id, target.uid
      SKIP $offset
      LIMIT $limit
    required_anchors:
      - label: Function
        property: uid
    required_schema:
      - function_uid_unique
      - nornicdb_function_uid_lookup
    required_limits:
      - $limit
    requires_order: true
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-CODE-REL-TRANSITIVE
    domain: code_relationship
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/code_relationship_story_nornicdb.go
      symbol: nornicDBRelationshipStoryInheritanceDepthCypher
      line_hint: 116
    cypher: |
      MATCH path = (anchor:Class {uid: $entity_id})-[:INHERITS*1..5]->(target:Class)
      RETURN 'outgoing' as direction,
             anchor.id as source_legacy_id,
             anchor.uid as source_uid,
             target.id as target_legacy_id,
             target.uid as target_uid,
             length(path) as depth
      ORDER BY depth DESC, target.name, target.id, target.uid
      LIMIT $limit
    required_anchors:
      - label: Class
        property: uid
    required_schema:
      - class_uid_unique
      - nornicdb_class_uid_lookup
    required_limits:
      - $limit
    requires_order: true
    plan:
      operators:
        - NodeIndexSeek
        - VarLengthExpand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-CODE-REL-STORY-INCOMING
    domain: code_relationship
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/code_relationship_story_nornicdb.go
      symbol: nornicDBRelationshipStoryGraphCypher
      line_hint: 36
    cypher: |
      MATCH (anchor:Function {uid: $entity_id})<-[rel:CALLS]-(source:Function)
      RETURN 'incoming' as direction,
             'CALLS' as type,
             source.id as source_legacy_id,
             source.uid as source_uid,
             anchor.id as target_legacy_id,
             anchor.uid as target_uid
      ORDER BY source.name, source.id, source.uid
      SKIP $offset
      LIMIT $limit
    required_anchors:
      - label: Function
        property: uid
    required_schema:
      - function_uid_unique
      - nornicdb_function_uid_lookup
    required_limits:
      - $limit
    requires_order: true
    caveats:
      - >-
        Incoming stories must seed the indexed target before expanding backwards.
        In the earlier raw-Cypher registry proof, one retained Function target
        had eight incoming edges: the source-first equivalent exceeded 25 seconds
        while this target-first query returned the identical set in 0.044 seconds.
        That query-only sample is distinct from the later one-relationship
        production-path proof recorded in
        docs/internal/evidence/5244-5253-dashboard-correctness.md (0.563 to 1.648 ms
        for the new shape); the targets, cardinalities, and timing boundaries differ.
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-CODE-REL-STORY-ANCHOR-COLLISION
    domain: code_relationship
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/code_relationship_story_nornicdb.go
      symbol: resolveNornicDBRelationshipStoryAnchorProperty
      line_hint: 48
    cypher: |
      MATCH (idAnchor:Function {id: $entity_id})
      WHERE coalesce(idAnchor.uid, '') <> $entity_id
      RETURN true AS collision
      LIMIT 1
    required_anchors:
      - label: Function
        property: id
    required_limits:
      - 1
    caveats:
      - This one-time labeled legacy-id check preserves the old uid-to-id fallback when separate nodes collide. Retained 887-repository proof rejected a Function.id property index because pinned NornicDB v1.1.11 replays property-index backfill work for CREATE INDEX IF NOT EXISTS and appends index entries without deduplication. The measured no-index resolver took 5.902045 seconds and 14 graph calls on a retained high-fan-in anchor versus 32.842229 seconds and 21 graph calls for the repeated fallback, with an exact result diff of 0/0. The one-time label scan remains a bounded tail tradeoff, not a claim that every cold relationship story meets the separate 2-3-second read SLO.
    plan:
      operators:
        - NodeByLabelScan
        - Filter
        - Limit
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-CODE-IMPORT-CYCLES
    domain: code_relationship
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/code_import_dependencies.go
      symbol: fileImportCyclesCypher
      line_hint: 280
    cypher: |
      MATCH (repo:Repository {id: $repo_id})-[:REPO_CONTAINS]->(source_file:File)-[source_import:IMPORTS]->(target_module:Module)
      MATCH (repo:Repository)-[:REPO_CONTAINS]->(target_file:File)-[target_import:IMPORTS]->(source_module:Module)
      WHERE source_file.name = source_module.name + '.py'
        AND target_file.name = target_module.name + '.py'
        AND source_file.relative_path < target_file.relative_path
      RETURN repo.id as repo_id,
             source_file.relative_path as source_file,
             target_file.relative_path as target_file
      ORDER BY source_file.relative_path, target_file.relative_path, source_module.name, target_module.name
      SKIP $offset
      LIMIT $limit
    required_anchors:
      - label: Repository
        property: id
    required_schema:
      - repository_id
      - nornicdb_repository_id_lookup
    required_limits:
      - $limit
    requires_order: true
    caveats:
      - Repo-scoped file-cycle investigation must seek the indexed repository before expanding either IMPORTS path. Requests scoped only by file or module retain the broader repository-discovery shape because no repo_id exists to anchor.
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-READINESS-HOSTED
    domain: readiness
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/status_hosted_readiness.go
      symbol: readHostedRepositoryCount
      line_hint: 70
    cypher: |
      MATCH (r:Repository)
      RETURN count(r) as count
    required_schema:
      - repository_id
      - nornicdb_repository_id_lookup
    caveats:
      - Hosted readiness primarily reports Postgres/status queue state; this graph readback is a bounded aggregate count without a selective user anchor.
    plan:
      operators:
        - LabelCount
      forbidden_operators:
        - CartesianProduct
        - UnboundedExpand

  - id: QP-READINESS-SC-IMPACT
    domain: readiness
    backend: postgres
    query_kind: sql_read_model
    source:
      file: go/internal/query/supply_chain_impact_readiness_postgres_query.go
      symbol: listSupplyChainImpactReadinessQuery
      line_hint: 3
    caveats:
      - Supply-chain impact readiness is reducer-owned SQL/read-model evidence, not hot Cypher; it is represented here so the gate tracks the caveat explicitly.

  - id: QP-IMPACT-CHANGE-SURFACE
    domain: impact
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/impact_change_surface_legacy.go
      symbol: findChangeSurfaceImpactRows
      line_hint: 107
    cypher: |
      MATCH (start:Workload {id: $target_id})
      OPTIONAL MATCH path = (start)-[rels*1..4]->(impacted)
      WHERE impacted.id <> $target_id AND any(label IN labels(impacted) WHERE label IN ['Repository', 'Workload', 'WorkloadInstance', 'CloudResource', 'TerraformModule', 'DataAsset'])
        AND ($environment = '' OR coalesce(impacted.environment, '') = '' OR impacted.environment = $environment)
      UNWIND relationships(path) as rel
      WITH impacted, rel, length(path) as depth
      RETURN DISTINCT impacted.id as id, impacted.name as name, labels(impacted) as labels, impacted.environment as environment,
             type(rel) as rel_type, rel.confidence as confidence, rel.reason as reason, depth
      ORDER BY depth, impacted.name, impacted.id
      LIMIT $limit
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
    required_limits:
      - $limit
    requires_order: true
    caveats:
      - The traversal start label is resolved per target kind via changeSurfaceTraversalStartMatch; the Workload anchor is the dense service-kind shape that issue #3384 bounded. The recorded depth *1..4 is the production default (normalizeChangeSurfaceLegacyDepth defaults to 4); the call site clamps the requested max_depth to [1, 8]. The canonical shape pins the bounded default rather than the maximum so the hot-path gate cannot bless the hardcoded *1..8 the fix removed (see TestFindChangeSurfaceServiceKindAnchorsLabeledStartAndBoundsDepth, which rejects *1..8).
    plan:
      operators:
        - NodeIndexSeek
        - VarLengthExpand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-RELATIONSHIPS-CATALOG-COUNT
    domain: relationships
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/relationships_catalog_cypher.go
      symbol: relationshipCountCypher
      line_hint: 84
    cypher: |
      MATCH ()-[r:CALLS]->()
      RETURN count(r) AS count
    caveats:
      - "One bounded count per fixed catalog verb, each a bare relationship-type aggregate answered by the NornicDB relationship-type index (this entry is the CALLS representative of the 16-verb family in relationshipVerbCatalog). The endpoints are anonymous () nodes, not bound unlabeled nodes, so this is not an unlabeled-node all-node scan; it is the relationship-type-indexed whole-graph edge count the catalog contract promises. The count is intentionally whole-graph: when a relationship type is written by more than one source label (e.g. DEPENDS_ON is written for both Repository and Workload sources), the count includes all source labels combined while the companion edge-slice endpoint is anchored on the catalog entry's sourceLabel; the two numbers can legitimately differ. NornicDB has no composite relationship-type+label index, so a source-label-scoped count would require a full label-population scan (measured at 30s+ for 16 verbs at ~900k-edge scale); the whole-graph count is the only index-served option (issue #3429)."
    plan:
      operators:
        - RelationshipTypeScan
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-RELATIONSHIPS-EDGES
    domain: relationships
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/relationships_catalog_cypher.go
      symbol: relationshipEdgesCypher
      line_hint: 96
    cypher: |
      MATCH (s:Function)-[r:CALLS]->(t)
      RETURN coalesce(s.id, s.uid, s.name, s.path) AS source_id,
             coalesce(s.name, s.path, s.id, s.uid) AS source_name,
             coalesce(t.id, t.uid, t.name, t.path) AS target_id,
             coalesce(t.name, t.path, t.id, t.uid) AS target_name,
             r.rationale AS evidence
      ORDER BY s.uid, coalesce(t.id, t.uid)
      LIMIT $limit
    required_schema:
      - function_uid_unique
      - nornicdb_function_uid_lookup
    required_limits:
      - $limit
    requires_order: true
    caveats:
      - Bounded per-verb concrete edge slice, anchored on the verb's source-node label (CALLS/Function representative of the 16-verb family). The ORDER BY targets the indexed source-anchor property (s.uid here, s.<sourceProperty> per verb) so the LIMIT short-circuits the index-ordered scan rather than materializing and sorting the verb's full edge set on a non-indexed coalesce() expression (issue #3429). The secondary coalesce(t.id, t.uid) tie-breaker makes the ordering deterministic when the page boundary falls inside one source node's outgoing edges. Callers over-fetch $limit+1 to flag truncation.
    plan:
      operators:
        - LabelScan
        - Expand
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-RELATIONSHIPS-CATALOG-SOURCE-TOOL
    domain: relationships
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/relationships_catalog_cypher.go
      symbol: relationshipSourceToolBreakdownCypher
      line_hint: 185
    cypher: |
      MATCH (s:Repository)-[r:DEPLOYS_FROM]->()
      WHERE r.source_tool IS NOT NULL
      RETURN r.source_tool AS source_tool, count(r) AS count
    required_schema:
      - repository_id
      - nornicdb_repository_id_lookup
    caveats:
      - This is the Repository/DEPLOYS_FROM representative of the seven fixed source-tool breakdowns. Each query starts from the indexed source label that owns stamped edges; the handler overlaps the seven independent reads while preserving catalog output order. DEPENDS_ON intentionally uses Repository for this aggregate because source_tool is stamped on its Repository-to-Repository evidence edges, while the per-verb drill-down sourceLabel remains Workload.
    plan:
      operators:
        - LabelScan
        - Expand
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-INFRA-RESOURCE-SEARCH
    domain: infra
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/infra.go
      symbol: (*InfraHandler).searchResources
      line_hint: 195
    cypher: |
      CALL {
      MATCH (n:CloudResource)
      WHERE true
        AND coalesce(n.name, '') CONTAINS $query
      RETURN coalesce(n.id, '') as id, coalesce(n.name, '') as name, labels(n) as labels
      }
      RETURN id, name, labels
      ORDER BY name
      LIMIT $limit
    required_limits:
      - $limit
    requires_order: true
    caveats:
      - No required_anchors are declared because this shape has no property-level anchor to enforce. Its only guarantee is a label scan (MATCH (n:CloudResource), see plan.operators below) — the WHERE predicate (coalesce(n.name, '') CONTAINS $query) is free-text and cannot use an index seek, and RETURN coalesce(n.id, '') is a projected field, not a filter, so declaring it as a required_anchors property would assert a guarantee the query does not actually provide (flagged in PR #5278 review: the validator accepts a property reference anywhere in the query text, so an unfiltered RETURN field can falsely satisfy an anchor check). Per-label LabelScan bounded by candidate-label cardinality is the real and only guarantee; do not add a required_anchors entry here unless a genuine WHERE-bound equality/indexed predicate is added to the query.
      - Representative of one branch of a dynamically generated per-label UNION (issue #5271). The handler builds one MATCH(n:Label) branch per candidate label (up to the ~27-entry allInfraLabels set when no category filter narrows it), unions them, and applies ORDER BY/LIMIT once after the final branch. This replaced a single unlabeled MATCH(n) WHERE (n:A OR n:B OR ...) scan, which forced a whole-graph scan on every call. A label disjunction inside one MATCH (MATCH (n:A|B|C)) was rejected as an alternative because docs/public/reference/nornicdb-pitfalls.md documents it matching zero rows on the pinned NornicDB backend; UNION avoids that defect. Plain UNION (not UNION ALL) de-duplicates, so a node cannot appear twice even if a future schema change lets it carry more than one candidate label.
      - The whole union is wrapped in CALL {...} RETURN ..., which is load-bearing, not stylistic. See docs/public/reference/nornicdb-pitfalls.md ("A Bare Top-Level UNION Returns Nothing When Its First Branch Is Empty") for the full reproduction. In short, a bare top-level UNION chain (with or without ALL) returns zero rows for the ENTIRE query whenever its FIRST branch matches zero rows, even though later branches have real matches. allInfraLabels starts with CloudResource, so any search on a corpus with zero matching CloudResource nodes silently returned an empty result for every other label without this wrapper.
    plan:
      operators:
        - LabelScan
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-INFRA-RESOURCE-AGGREGATE
    domain: infra
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/infra_resource_aggregates_cypher.go
      symbol: infraResourceAggregatePerLabelCypher
      line_hint: 42
    cypher: |
      CALL {
      MATCH (n:CloudResource)
      RETURN head(labels(n)) AS bucket, count(n) AS bucket_count
      }
      RETURN bucket, bucket_count
    caveats:
      - Representative of one branch of a dynamically generated per-label CALL { ... UNION ALL ... } (issue #5281), shown in its unfiltered form (the shape emitted when no property filter applies). CountInfraResources/fillBuckets/InfraResourceInventory build one MATCH (n:Label) branch per candidate infra label (up to the ~27-entry allInfraLabels set) and merge/sort/paginate the passed-through rows in Go. This replaced a single unlabeled MATCH (n) WHERE (n:A OR n:B ...) whole-graph scan (measured 380-410ms cold on a 91k-node corpus, growing with total graph size) — the same defect fixed for infra/resources/search in #5278. No required_anchors is declared because the only guarantee is a bounded per-label LabelScan; any property filter (e.g. n.provider = $provider) is optional and rendered by infraResourceAggregateBranchWhere without a "WHERE true" prefix. This static entry lints the query SHAPE (label-anchored, no AllNodesScan operator listed); the load-bearing drift guard that the generated query stays per-label CALL-anchored is the Go test TestInfraResourceScopePredicateRendersOnlyWhenScoped, not a live planner assertion.
      - The union is wrapped in CALL { ... } and each branch groups internally, passing rows through the outer RETURN without re-aggregating. Both are load-bearing on the pinned NornicDB backend (see docs/public/reference/nornicdb-pitfalls.md). A bare top-level UNION drops all rows when its first branch is empty (allInfraLabels starts with the frequently-empty CloudResource), and outer aggregation over a CALL subquery evaluates the group key to null and collapses every row into one bogus bucket. Callers therefore merge/sum the per-branch rows application-side.
    plan:
      operators:
        - LabelScan
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand
