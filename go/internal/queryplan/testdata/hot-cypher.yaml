version: 1
required_ids:
  - QP-SC-DEPS
  - QP-SC-PKGREG-DEPS
  - QP-DEPLOY-CATALOG-ENV
  - QP-DEPLOY-CATALOG-WORKLOAD-REPO
  - QP-DEPLOY-CATALOG-WORKLOAD-INSTANCE
  - QP-SVC-RESOLVE
  - QP-SVC-CONTEXT
  - QP-SVC-RUNS-ON
  - QP-SVC-CLOUD-DEPS
  - QP-CODE-REL-STORY
  - QP-CODE-REL-TRANSITIVE
  - QP-READINESS-HOSTED
  - QP-READINESS-SC-IMPACT
  - QP-IMPACT-CHANGE-SURFACE
entries:
  - id: QP-SC-DEPS
    domain: supply_chain
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/dependencies_cypher.go
      symbol: forwardDependenciesCypher
      line_hint: 48
    cypher: |
      MATCH (src:Package {normalized_name: $package})-[:HAS_VERSION]->(v:PackageVersion)-[:DECLARES_DEPENDENCY]->(d:PackageDependency)-[:DEPENDS_ON_PACKAGE]->(target:Package)
      WHERE ($ecosystem = '' OR src.ecosystem = $ecosystem)
        AND d.uid IS NOT NULL AND d.uid <> ''
        AND target.uid IS NOT NULL AND target.uid <> ''
        AND d.dependency_normalized IS NOT NULL AND d.dependency_normalized <> ''
        AND ($after_name = '' OR d.dependency_normalized > $after_name OR (d.dependency_normalized = $after_name AND d.uid > $after_edge))
      RETURN src.uid AS anchor_package_id,
             target.uid AS related_package_id,
             d.uid AS edge_id,
             d.dependency_normalized AS cursor_name
      ORDER BY d.dependency_normalized, d.uid
      LIMIT $limit
    required_anchors:
      - label: Package
        property: normalized_name
    required_schema:
      - package_normalized_name
      - nornicdb_package_uid_lookup
      - nornicdb_package_dependency_uid_lookup
    required_limits:
      - $limit
    requires_order: true
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-SC-PKGREG-DEPS
    domain: supply_chain
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/package_registry_cypher.go
      symbol: packageRegistryDependenciesCypher
      line_hint: 54
    cypher: |
      MATCH (d:PackageDependency)
      WHERE d.version_id = $version_id
      WITH d
      MATCH (d)-[:DEPENDS_ON_PACKAGE]->(target:Package)
      WHERE d.uid IS NOT NULL AND d.uid <> ''
        AND d.package_id IS NOT NULL AND d.package_id <> ''
        AND d.version_id IS NOT NULL AND d.version_id <> ''
        AND target.uid IS NOT NULL AND target.uid <> ''
        AND ($after_version_id = '' OR d.version_id > $after_version_id OR (d.version_id = $after_version_id AND d.uid > $after_dependency_id))
      RETURN d.uid AS dependency_id,
             d.package_id AS source_package_id,
             d.version_id AS source_version_id,
             target.uid AS dependency_package_id
      ORDER BY d.version_id, d.uid
      LIMIT $limit
    required_anchors:
      - label: PackageDependency
        property: version_id
    required_schema:
      - package_dependency_version_id
      - nornicdb_package_dependency_uid_lookup
    required_limits:
      - $limit
    requires_order: true
    allow_unlabeled: true
    caveats:
      - The second MATCH continues from d after WITH d; the entry keeps unlabeled bound-variable reuse explicit instead of weakening the global scan rule.
    plan:
      operators:
        - NodeIndexSeek
        - Expand
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-DEPLOY-CATALOG-ENV
    domain: deployable
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/catalog_workload_environments.go
      symbol: catalogWorkloadEvidenceEnvironmentCypher
      line_hint: 59
    cypher: |
      MATCH (w:Workload)<-[:DEFINES]-(repo:Repository)<-[:EVIDENCES_REPOSITORY_RELATIONSHIP]-(:EvidenceArtifact)-[:TARGETS_ENVIRONMENT]->(env:Environment)
      WHERE w.id IN $ids
      RETURN w.id AS id,
             env.name AS environment
      ORDER BY id, environment
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
      - environment_name
    requires_order: true
    caveats:
      - This catalog enrichment is bounded to the limited workload id set ($ids) from the catalog base query (issue #3389) and uses a connected path to avoid a NornicDB double-MATCH re-anchor fanout.
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-DEPLOY-CATALOG-WORKLOAD-REPO
    domain: deployable
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/catalog_workload_environments.go
      symbol: catalogWorkloadRepoCypher
      line_hint: 41
    cypher: |
      MATCH (w:Workload) WHERE w.id IN $ids
      MATCH (repo:Repository)-[:DEFINES]->(w)
      RETURN w.id AS id,
             repo.id AS repo_id,
             repo.name AS repo_name
      ORDER BY id
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
    requires_order: true
    caveats:
      - Bounded to the limited workload id set ($ids) from the catalog base query so the enrichment never scans every Workload/Repository edge (issue #3389).
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-DEPLOY-CATALOG-WORKLOAD-INSTANCE
    domain: deployable
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/catalog_workload_environments.go
      symbol: catalogWorkloadInstanceEnvironmentCypher
      line_hint: 51
    cypher: |
      MATCH (w:Workload) WHERE w.id IN $ids
      MATCH (inst:WorkloadInstance)-[:INSTANCE_OF]->(w)
      RETURN w.id AS id,
             count(inst) AS instance_count,
             collect(DISTINCT inst.environment) AS environments
      ORDER BY id
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
      - workload_instance_id
    requires_order: true
    caveats:
      - Bounded to the limited workload id set ($ids) from the catalog base query so the per-workload instance aggregate never groups over every WorkloadInstance (issue #3389).
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-SVC-RESOLVE
    domain: service
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/service_workload_resolution.go
      symbol: queryServiceWorkloadCandidates
      line_hint: 219
    cypher: |
      MATCH (w:Workload)
      WHERE w.id = $workload_id
      RETURN w.id as id,
             w.name as name,
             w.kind as kind,
             w.repo_id as repo_id,
             '' as environment
      ORDER BY repo_id, id
      LIMIT 2
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
    required_limits:
      - "2"
    requires_order: true
    plan:
      operators:
        - NodeIndexSeek
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-SVC-CONTEXT
    domain: service
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/entity_workload_context.go
      symbol: fetchWorkloadContextForOperation
      line_hint: 46
    cypher: |
      MATCH (w:Workload)
      WHERE w.id = $workload_id
      RETURN w.id as id, w.name as name, w.kind as kind, w.repo_id as repo_id
      LIMIT 1
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
    required_limits:
      - "1"
    plan:
      operators:
        - NodeIndexSeek
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-SVC-RUNS-ON
    domain: service
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/entity_workload_context.go
      symbol: fetchWorkloadPlatformRows
      line_hint: 357
    cypher: |
      MATCH (i:WorkloadInstance)-[runsOn:RUNS_ON]->(p:Platform)
      WHERE i.id IN $instance_ids
      RETURN i.id as instance_id,
             p.name as platform_name
      ORDER BY instance_id, platform_name
    required_anchors:
      - label: WorkloadInstance
        property: id
    required_schema:
      - workload_instance_id
      - nornicdb_workload_instance_id_lookup
      - platform_id
    requires_order: true
    plan:
      operators:
        - NodeIndexSeek
        - Expand
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-SVC-CLOUD-DEPS
    domain: service
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/cloud_resource_dependencies.go
      symbol: loadMaterializedServiceCloudResourceDependencies
      line_hint: 10
    cypher: |
      MATCH (workload:Workload {id: $workload_id})<-[:INSTANCE_OF]-(instance:WorkloadInstance)-[rel:USES]->(c:CloudResource)
      RETURN DISTINCT coalesce(c.id, c.uid, c.resource_id, c.arn, c.name) AS id,
             c.name AS name
      ORDER BY name, id
      LIMIT $limit
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
      - cloud_resource_resource_id
    required_limits:
      - $limit
    requires_order: true
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Distinct
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-CODE-REL-STORY
    domain: code_relationship
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/code_relationship_story_nornicdb.go
      symbol: nornicDBRelationshipStoryGraphCypher
      line_hint: 36
    cypher: |
      MATCH (anchor:Function {uid: $entity_id})-[rel:CALLS]->(target:Function)
      RETURN 'outgoing' as direction,
             type(rel) as type,
             coalesce(anchor.id, anchor.uid) as source_id,
             coalesce(target.id, target.uid) as target_id
      ORDER BY target.name, target_id
      SKIP $offset
      LIMIT $limit
    required_anchors:
      - label: Function
        property: uid
    required_schema:
      - function_uid_unique
      - nornicdb_function_uid_lookup
    required_limits:
      - $limit
    requires_order: true
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct

  - id: QP-CODE-REL-TRANSITIVE
    domain: code_relationship
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/code_relationship_story_nornicdb.go
      symbol: nornicDBRelationshipStoryInheritanceDepthCypher
      line_hint: 116
    cypher: |
      MATCH path = (anchor:Class {uid: $entity_id})-[:INHERITS*1..5]->(target:Class)
      RETURN 'outgoing' as direction,
             coalesce(anchor.id, anchor.uid) as source_id,
             coalesce(target.id, target.uid) as target_id,
             length(path) as depth
      ORDER BY depth DESC, target.name, target_id
      LIMIT $limit
    required_anchors:
      - label: Class
        property: uid
    required_schema:
      - class_uid_unique
      - nornicdb_class_uid_lookup
    required_limits:
      - $limit
    requires_order: true
    plan:
      operators:
        - NodeIndexSeek
        - VarLengthExpand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand

  - id: QP-READINESS-HOSTED
    domain: readiness
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/status_hosted_readiness.go
      symbol: readHostedRepositoryCount
      line_hint: 70
    cypher: |
      MATCH (r:Repository)
      RETURN count(r) as count
    required_schema:
      - repository_id
      - nornicdb_repository_id_lookup
    caveats:
      - Hosted readiness primarily reports Postgres/status queue state; this graph readback is a bounded aggregate count without a selective user anchor.
    plan:
      operators:
        - LabelCount
      forbidden_operators:
        - CartesianProduct
        - UnboundedExpand

  - id: QP-READINESS-SC-IMPACT
    domain: readiness
    backend: postgres
    query_kind: sql_read_model
    source:
      file: go/internal/query/supply_chain_impact_readiness_postgres_query.go
      symbol: listSupplyChainImpactReadinessQuery
      line_hint: 3
    caveats:
      - Supply-chain impact readiness is reducer-owned SQL/read-model evidence, not hot Cypher; it is represented here so the gate tracks the caveat explicitly.

  - id: QP-IMPACT-CHANGE-SURFACE
    domain: impact
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/impact_change_surface_legacy.go
      symbol: findChangeSurfaceImpactRows
      line_hint: 107
    cypher: |
      MATCH (start:Workload {id: $target_id})
      OPTIONAL MATCH path = (start)-[rels*1..8]->(impacted)
      WHERE impacted.id <> $target_id AND any(label IN labels(impacted) WHERE label IN ['Repository', 'Workload', 'WorkloadInstance', 'CloudResource', 'TerraformModule', 'DataAsset'])
        AND ($environment = '' OR coalesce(impacted.environment, '') = '' OR impacted.environment = $environment)
      UNWIND relationships(path) as rel
      WITH impacted, rel, length(path) as depth
      RETURN DISTINCT impacted.id as id, impacted.name as name, labels(impacted) as labels, impacted.environment as environment,
             type(rel) as rel_type, rel.confidence as confidence, rel.reason as reason, depth
      ORDER BY depth, impacted.name, impacted.id
      LIMIT $limit
    required_anchors:
      - label: Workload
        property: id
    required_schema:
      - workload_id
      - nornicdb_workload_id_lookup
    required_limits:
      - $limit
    requires_order: true
    caveats:
      - The traversal start label is resolved per target kind via changeSurfaceTraversalStartMatch; the Workload anchor is the dense service-kind shape that issue #3384 bounded, and the depth bound is clamped at the call site (default 4, max 8) rather than the hardcoded *1..8 it replaced.
    plan:
      operators:
        - NodeIndexSeek
        - VarLengthExpand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand
