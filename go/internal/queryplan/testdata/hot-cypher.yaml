  - id: QP-CODE-REL-STORY-INCOMING
    domain: code_relationship
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/code_relationship_story_nornicdb.go
      symbol: nornicDBRelationshipStoryGraphCypher
      source_sha256: d330e4456083939d04671eebe17376779e9a527f9f5ede83513cd1279a4cde52
      line_hint: 36
    required_anchors:
      - label: Function
        property: uid
    required_schema:
      - function_uid_unique
      - nornicdb_function_uid_lookup
    required_limits:
      - $limit
    requires_order: true
    allow_unlabeled: true
    caveats:
      - The only unlabeled endpoint is reached backwards from the indexed Function anchor through the fixed CALLS relationship; subsequent optional matches enrich already-bound endpoints and do not seed an all-node scan.
      - >-
        Incoming stories must seed the indexed target before expanding backwards. In the earlier raw-Cypher registry proof, one retained Function target had eight incoming edges: the source-first equivalent exceeded 25 seconds while this target-first query returned the identical set in 0.044 seconds. That query-only sample is distinct from the later one-relationship production-path proof recorded in docs/internal/evidence/5244-5253-dashboard-correctness.md (0.563 to 1.648 ms for the new shape); the targets, cardinalities, and timing boundaries differ.
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
    cypher_sha256: "bf6d526cacc25c5058e24d28c3a45cb1ff04c486abe07649bb3b9df1e14381bf"
  - id: QP-CODE-REL-STORY-ANCHOR-COLLISION
    domain: code_relationship
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/code_relationship_story_nornicdb.go
      symbol: (*CodeHandler).resolveNornicDBRelationshipStoryAnchorProperty
      source_sha256: 8e5cde039dd4f4a605f8558cb610a4aaf8c6ba81898ae0aff858242ca0761cac
      line_hint: 48
    required_anchors:
      - label: Function
        property: id
    required_limits:
      - 1
    caveats:
      - This one-time labeled legacy-id check preserves the old uid-to-id fallback when separate nodes collide. Retained 887-repository proof rejected a Function.id property index because pinned NornicDB v1.1.11 replays property-index backfill work for CREATE INDEX IF NOT EXISTS and appends index entries without deduplication. The measured no-index resolver took 5.902045 seconds and 14 graph calls on a retained high-fan-in anchor versus 32.842229 seconds and 21 graph calls for the repeated fallback, with an exact result diff of 0/0. The one-time label scan remains a bounded tail tradeoff, not a claim that every cold relationship story meets the separate 2-3-second read SLO.
    plan:
      operators:
        - NodeByLabelScan
        - Filter
        - Limit
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
    cypher_sha256: "d71088b47d328e2617bb85cea6f54f067d43c64dd47a46fce27c267823905426"
