      - The graph read returns one bounded ordered IMPORTS edge set; exact reciprocal Python cycles are reconstructed, deduplicated, filtered, and paged in Go.
      - The exact-hash import-dependency variant family profiles every reachable optional-filter shape, including unscoped label-bounded variants.
    plan:
      operators:
        - NodeIndexSeek
        - Expand
        - Sort
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand
    cypher_sha256: "03d641efabac1a59818e790354ed551d528db1cc3b6ee8755ec608a3d2917569"
