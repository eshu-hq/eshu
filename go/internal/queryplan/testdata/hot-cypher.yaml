  - id: QP-INFRA-RESOURCE-SEARCH
    domain: infra
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/infra.go
      symbol: (*InfraHandler).searchResources
      source_sha256: 2f6c76e66dd4601d82ab8c71bee437ce39b3626776181515abf5f87a18430a17
      line_hint: 195
    required_limits:
      - $limit
    requires_order: true
    caveats:
      - No required_anchors are declared because this shape has no property-level anchor to enforce. Its only guarantee is a label scan (MATCH (n:CloudResource), see plan.operators below) — the WHERE predicate (coalesce(n.name, '') CONTAINS $query) is free-text and cannot use an index seek, and RETURN coalesce(n.id, '') is a projected field, not a filter, so declaring it as a required_anchors property would assert a guarantee the query does not actually provide (flagged in PR #5278 review: the validator accepts a property reference anywhere in the query text, so an unfiltered RETURN field can falsely satisfy an anchor check). Per-label LabelScan bounded by candidate-label cardinality is the real and only guarantee; do not add a required_anchors entry here unless a genuine WHERE-bound equality/indexed predicate is added to the query.
      - Representative of one branch of a dynamically generated per-label UNION (issue #5271). The handler builds one MATCH(n:Label) branch per candidate label (up to the ~27-entry allInfraLabels set when no category filter narrows it), unions them, and applies ORDER BY/LIMIT once after the final branch. This replaced a single unlabeled MATCH(n) WHERE (n:A OR n:B OR ...) scan, which forced a whole-graph scan on every call. A label disjunction inside one MATCH (MATCH (n:A|B|C)) was rejected as an alternative because docs/public/reference/nornicdb-pitfalls.md documents it matching zero rows on the pinned NornicDB backend; UNION avoids that defect. Plain UNION (not UNION ALL) de-duplicates, so a node cannot appear twice even if a future schema change lets it carry more than one candidate label.
      - The whole union is wrapped in CALL {...} RETURN ..., which is load-bearing, not stylistic. See docs/public/reference/nornicdb-pitfalls.md ("A Bare Top-Level UNION Returns Nothing When Its First Branch Is Empty") for the full reproduction. In short, a bare top-level UNION chain (with or without ALL) returns zero rows for the ENTIRE query whenever its FIRST branch matches zero rows, even though later branches have real matches. allInfraLabels starts with CloudResource, so any search on a corpus with zero matching CloudResource nodes silently returned an empty result for every other label without this wrapper.
    plan:
      operators:
        - LabelScan
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand
    cypher_sha256: "dc61d96bcb6c31bca186f3b1701badb0591b926962814c92171ebd1b817bfac5"
  - id: QP-INFRA-RESOURCE-AGGREGATE
    domain: infra
    backend: nornicdb
    query_kind: cypher
    source:
      file: go/internal/query/infra_resource_aggregates_cypher.go
      symbol: infraResourceAggregatePerLabelCypher
      source_sha256: fb3765dd690a048609abb5ee8d330372ca430c815f82db88af57d5fbc501cdaf
      line_hint: 42
    caveats:
      - Representative of one branch of a dynamically generated per-label CALL { ... UNION ALL ... } (issue #5281), shown in its unfiltered form (the shape emitted when no property filter applies). CountInfraResources/fillBuckets/InfraResourceInventory build one MATCH (n:Label) branch per candidate infra label (up to the ~27-entry allInfraLabels set) and merge/sort/paginate the passed-through rows in Go. This replaced a single unlabeled MATCH (n) WHERE (n:A OR n:B ...) whole-graph scan (measured 380-410ms cold on a 91k-node corpus, growing with total graph size) — the same defect fixed for infra/resources/search in #5278. No required_anchors is declared because the only guarantee is a bounded per-label LabelScan; any property filter (e.g. n.provider = $provider) is optional and rendered by infraResourceAggregateBranchWhere without a "WHERE true" prefix. This static entry lints the query SHAPE (label-anchored, no AllNodesScan operator listed); the load-bearing drift guard that the generated query stays per-label CALL-anchored is the Go test TestInfraResourceScopePredicateRendersOnlyWhenScoped, not a live planner assertion.
      - The union is wrapped in CALL { ... } and each branch groups internally, passing rows through the outer RETURN without re-aggregating. Both are load-bearing on the pinned NornicDB backend (see docs/public/reference/nornicdb-pitfalls.md). A bare top-level UNION drops all rows when its first branch is empty (allInfraLabels starts with the frequently-empty CloudResource), and outer aggregation over a CALL subquery evaluates the group key to null and collapses every row into one bogus bucket. Callers therefore merge/sum the per-branch rows application-side.
    plan:
      operators:
        - LabelScan
      forbidden_operators:
        - AllNodesScan
        - CartesianProduct
        - UnboundedExpand
    cypher_sha256: "c5c0da930b9583c73ffff79fdea9a7118da9a7ce65d2cc9ea32d052d63efd750"
