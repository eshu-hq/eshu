# Capability catalog overlay.
#
# Source of editorial capability metadata that cannot be derived from the
# capability matrix (specs/capability-matrix*.yaml): display names, owning
# packages, operational maturity overrides, known gaps, linked issues, docs,
# and the exemption/surface lists that record intentional reconciliation gaps.
#
# The reconciled, generated artifact is
# go/internal/capabilitycatalog/data/catalog.generated.json. Regenerate it with:
#   cd go && go run ./cmd/capability-inventory -mode generate
# Verify drift with:
#   cd go && go run ./cmd/capability-inventory -mode verify
#
# Treat edits here as a contract change. See
# docs/public/reference/capability-catalog.md.
version: v1
updated_at: 2026-06-20
owners:
  - platform-engineering

# Per-capability editorial overlay. Capabilities without an entry inherit
# derived display names and matrix-derived maturity.
capabilities:
  - capability: ask.natural_language_answer
    display_name: Ask Eshu Natural-Language Answer
    owner_package: internal/ask
    maturity: gated
    maturity_reason: "Ask is default-off and requires ESHU_ASK_ENABLED plus an agent_reasoning provider profile; without both, the HTTP and MCP surfaces return unavailable instead of running the engine."
    docs:
      - reference/mcp-tool-contract-matrix.md
    known_gaps:
      - "Scoped-token support, SSE streaming, and Tier-2 sandbox wiring are planned follow-ups."
    console: false
  - capability: query.playbooks
    owner_package: internal/query
    console: true
  - capability: query.investigation_workflows
    display_name: Investigation Workflows
    owner_package: internal/query
    docs:
      - reference/investigation-workflows.md
    console: false
  - capability: semantic_search.curated_retrieval
    owner_package: internal/searchretrieval
    console: true

  # Per-ecosystem reachability rows (issue #3021). Reachability rides the
  # supply-chain impact envelope, so these rows share its surfaces. Go is
  # always on and derives general_availability from the matrix. value_flow
  # ecosystems are operationally gated by ESHU_EMIT_DATAFLOW, which the matrix
  # cannot express, so they take an overlay gated maturity. JVM is bounded and
  # derives preview from its local-only matrix support.
  - capability: reachability.go.govulncheck
    display_name: Go Reachability (govulncheck)
    owner_package: internal/collector/vulnerabilityintelligence
    linked_issues: [3021, 2704, 2705]
    docs:
      - reference/vulnerability-scanner-confidence.md
    known_gaps:
      - "Reachability is prioritization evidence on the impact envelope; not_called is emitted only with ecosystem-specific scanner semantics, otherwise unknown."
    console: true
  - capability: reachability.python.value_flow
    display_name: Python Reachability (value flow)
    owner_package: internal/parser/python/pydataflow
    maturity: gated
    maturity_reason: "Python value-flow reachability is gated by ESHU_EMIT_DATAFLOW, which is off by default; the matrix cannot express an env-var gate, so the profiles are unsupported until an operator opts in."
    linked_issues: [3021, 2704, 2705]
    docs:
      - reference/vulnerability-scanner-confidence.md
    known_gaps:
      - "Disabled unless ESHU_EMIT_DATAFLOW is set; when enabled, value-flow taint evidence is derived (partial), never exact, and does not change impact truth."
  - capability: reachability.typescript.value_flow
    display_name: TypeScript Reachability (value flow)
    owner_package: internal/parser/javascript/jsdataflow
    maturity: gated
    maturity_reason: "TypeScript value-flow reachability is gated by ESHU_EMIT_DATAFLOW, which is off by default; the matrix cannot express an env-var gate, so the profiles are unsupported until an operator opts in."
    linked_issues: [3021, 2704, 2705]
    docs:
      - reference/vulnerability-scanner-confidence.md
    known_gaps:
      - "Disabled unless ESHU_EMIT_DATAFLOW is set; when enabled, value-flow taint evidence is derived (partial), never exact, and does not change impact truth."
  - capability: reachability.javascript.value_flow
    display_name: JavaScript Reachability (value flow)
    owner_package: internal/parser/javascript/jsdataflow
    maturity: gated
    maturity_reason: "JavaScript value-flow reachability is gated by ESHU_EMIT_DATAFLOW, which is off by default; the matrix cannot express an env-var gate, so the profiles are unsupported until an operator opts in."
    linked_issues: [3021, 2704, 2705]
    docs:
      - reference/vulnerability-scanner-confidence.md
    known_gaps:
      - "Disabled unless ESHU_EMIT_DATAFLOW is set; when enabled, value-flow taint evidence is derived (partial), never exact, and does not change impact truth."
  - capability: reachability.java.value_flow
    display_name: Java Reachability (value flow)
    owner_package: internal/parser/java
    maturity: gated
    maturity_reason: "Java value-flow reachability is gated by ESHU_EMIT_DATAFLOW, which is off by default; the matrix cannot express an env-var gate, so the profiles are unsupported until an operator opts in."
    linked_issues: [3021, 2704, 2705, 3069]
    docs:
      - reference/vulnerability-scanner-confidence.md
    known_gaps:
      - "Disabled unless ESHU_EMIT_DATAFLOW is set; when enabled, value-flow taint evidence is derived (partial), never exact, and does not change impact truth."
  - capability: reachability.csharp.value_flow
    display_name: C# Reachability (value flow)
    owner_package: internal/parser/csharp
    maturity: gated
    maturity_reason: "C# value-flow reachability is gated by ESHU_EMIT_DATAFLOW, which is off by default; the matrix cannot express an env-var gate, so the profiles are unsupported until an operator opts in."
    linked_issues: [3021, 2704, 2705, 3069]
    docs:
      - reference/vulnerability-scanner-confidence.md
    known_gaps:
      - "Disabled unless ESHU_EMIT_DATAFLOW is set; when enabled, value-flow taint evidence is derived (partial), never exact, and does not change impact truth."
      - "ADO.NET sink receiver-type inference is intraprocedural and explicit-type only: a sink whose receiver is a var/implicit-typed local with no declared type is conservatively not matched (honesty over false positive)."
  - capability: reachability.jvm.bounded
    display_name: JVM Reachability (bounded)
    owner_package: internal/reducer
    linked_issues: [3021, 2704, 2705]
    docs:
      - reference/vulnerability-scanner-confidence.md
    known_gaps:
      - "Bounded/partial: the JVM reducer family derives Maven/Gradle reachability from stored parser/SCIP package-API evidence (jvm_package_api_reachable), not a full call graph, so it never proves not_called and stays a local graph-backed preview."

# MCP tools that the matrix tools field does not reference. A capability maps
# the tool to an existing entry as an alias surface; an empty capability marks a
# genuine utility or operator surface that is not a distinct product capability.
tool_exemptions:
  # Narrative, report-composition, and visualization tools are now first-class
  # capability-matrix surfaces (issue #3028): the repo/service/workload story,
  # summary, dossier, intelligence-report, and investigation tools are declared
  # surfaces of platform_impact.context_overview (the same truth envelope they
  # emit at runtime); derive_visualization_packet has its own
  # visualization.packet_derivation row; and visualize_graph_query has its own
  # visualization.graph_query_link row. None remain exempt here.

  # Genuine retrieval, diagnostic, and operator utilities that are not distinct
  # product capabilities.
  - tool: get_file_content
    reason: file content retrieval utility
  - tool: get_file_lines
    reason: file line-range retrieval utility
  - tool: get_entity_content
    reason: entity content retrieval utility
  - tool: get_entity_context
    reason: entity context retrieval utility
  - tool: search_entity_content
    reason: entity content search utility
  - tool: resolve_entity
    reason: entity id resolution utility
  - tool: search_registry_bundles
    reason: package registry bundle catalog search utility
  - tool: get_repository_coverage
    reason: repository coverage diagnostic surface
  - tool: get_repository_stats
    reason: repository statistics diagnostic surface
  - tool: get_index_status
    reason: operator index status surface
  - tool: get_ingester_status
    reason: operator ingester status surface
  - tool: list_ingesters
    reason: operator ingester listing surface
  - tool: list_collectors
    reason: operator collector listing surface
  - tool: list_indexed_repositories
    reason: operator repository index listing surface
  - tool: get_hosted_readiness
    reason: operator hosted readiness surface
  - tool: get_collector_readiness
    reason: operator collector family readiness surface
    issue: 2687
  - tool: get_operator_control_plane
    reason: operator control-plane read model surface
    issue: 3185
  - tool: get_freshness_causality
    reason: operator freshness causality surface
    issue: 3187

# Matrix-declared tools that are served through an HTTP API operation rather
# than the MCP registry. Each name maps 1:1 to an OpenAPI operationId.
non_mcp_surfaces:
  - tool: entity_map
    kind: api
    reason: served by the entityMap HTTP operation (GET /api/v0/entities/{id}/map)
  - tool: get_metrics_time_series
    kind: api
    reason: served by the getMetricsTimeSeries HTTP operation (GET /api/v0/metrics/timeseries)
  - tool: list_cloud_resources
    kind: api
    reason: served by the listCloudResources HTTP operation (GET /api/v0/cloud/resources)
  - tool: list_container_images
    kind: api
    reason: served by the listContainerImages HTTP operation (GET /api/v0/supply-chain/container-images)
  - tool: list_iac_resources
    kind: api
    reason: served by the listIaCResources HTTP operation (GET /api/v0/iac/resources)
  - tool: list_package_registry_dependency_chains
    kind: api
    reason: served by the listPackageRegistryDependencyChains HTTP operation (GET /api/v0/package-registry/dependency-chains)
  - tool: get_relationships_catalog
    kind: api
    reason: served by the getRelationshipsCatalog HTTP operation (POST /api/v0/relationships/catalog)
  - tool: get_relationship_edges
    kind: api
    reason: served by the getRelationshipEdges HTTP operation (POST /api/v0/relationships/edges)
