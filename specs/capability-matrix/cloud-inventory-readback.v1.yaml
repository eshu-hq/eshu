version: v1
updated_at: 2026-06-09
owners:
  - platform-engineering
# Canonical multi-cloud resource inventory readback. This surfaces the
# reducer-owned reducer_cloud_resource_identity rows (one per cloud_resource_uid)
# as a bounded, paginated, truth-labeled list filterable by provider
# (aws/gcp/azure), scope, and management_origin. The serving route
# (GET /api/v0/cloud/inventory) and MCP tool (list_cloud_resource_inventory)
# read durable canonical identity facts; they never fabricate identity or leak
# raw provider locators. Lightweight local runtime cannot materialize the
# reducer-owned canonical identity rows and returns unsupported_capability.
# See docs/public/reference/multi-cloud-collector-contract.md (Query Truth) and
# docs/public/reference/replatforming-source-state-taxonomy.md for the
# per-item source-state vocabulary surfaced alongside management_origin.
capabilities:
  - capability: cloud_inventory.readback.list
    tools: [list_cloud_resource_inventory]
    profiles:
      local_lightweight: {status: unsupported, max_truth_level: unsupported, required_runtime: local_host, p95_latency_ms: null, max_scope_size: account_project_or_subscription, verification: [{integration_test: local-lightweight-unsupported-cloud-inventory-readback}], notes: requires reducer-materialized canonical CloudResource identity rows; lightweight local cannot serve a provider-neutral inventory readback and must return unsupported_capability}
      local_authoritative: {status: supported, max_truth_level: derived, required_runtime: local_host_plus_graph, p95_latency_ms: 5000, max_scope_size: account_project_or_subscription, verification: [{go_test: ./internal/query}], notes: bounded paginated readback of reducer-owned reducer_cloud_resource_identity rows with provider, normalized identity, management_origin, evidence-layer flags, and provider-neutral source state}
      local_full_stack: {status: supported, max_truth_level: derived, required_runtime: full_stack, p95_latency_ms: 5000, max_scope_size: account_project_or_subscription, verification: [{go_test: ./internal/query}], notes: bounded paginated readback of reducer-owned reducer_cloud_resource_identity rows with provider, normalized identity, management_origin, evidence-layer flags, and provider-neutral source state}
      production: {status: supported, max_truth_level: derived, required_runtime: deployed_services, p95_latency_ms: 5000, max_scope_size: account_project_or_subscription, verification: [{remote_validation: prod-cloud-inventory-readback}], notes: bounded paginated readback of reducer-owned reducer_cloud_resource_identity rows with provider, normalized identity, management_origin, evidence-layer flags, and provider-neutral source state}
