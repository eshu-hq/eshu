      production: {status: supported, max_truth_level: exact, required_runtime: none, p95_latency_ms: 100, max_scope_size: one_collector_family, verification: [{go_test: ./internal/query}], notes: singleton collector extraction readiness drilldown; classification matches the list surface for the same family}
