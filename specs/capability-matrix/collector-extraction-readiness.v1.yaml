      local_authoritative: {status: supported, max_truth_level: exact, required_runtime: none, p95_latency_ms: 50, max_scope_size: bounded_extraction_policy_catalog_page_1_500, verification: [{go_test: ./internal/query}], notes: advisory static collector extraction policy catalog; classifications computed deterministically from documented repo evidence}
      local_full_stack: {status: supported, max_truth_level: exact, required_runtime: none, p95_latency_ms: 50, max_scope_size: bounded_extraction_policy_catalog_page_1_500, verification: [{go_test: ./internal/query}], notes: advisory static collector extraction policy catalog with per-criterion checklist and blockers}
      production: {status: supported, max_truth_level: exact, required_runtime: none, p95_latency_ms: 100, max_scope_size: bounded_extraction_policy_catalog_page_1_500, verification: [{go_test: ./internal/query}], notes: advisory static collector extraction policy catalog; identical classifications across profiles because the source is in-binary policy data, not runtime state}
