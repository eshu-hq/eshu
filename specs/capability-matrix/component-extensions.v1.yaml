capabilities:
  - capability: component_extensions.inventory
    tools: [list_component_extensions]
    profiles:
      local_lightweight: {status: supported, max_truth_level: exact, required_runtime: local_host_component_registry, p95_latency_ms: 250, max_scope_size: bounded_local_component_registry_page_1_500, verification: [{go_test: ./internal/query}], notes: sanitized component registry readback with count, total_count, limit, and truncated; unavailable when ESHU_COMPONENT_HOME is unset; no graph or Postgres read}
      local_authoritative: {status: supported, max_truth_level: exact, required_runtime: local_host_component_registry, p95_latency_ms: 250, max_scope_size: bounded_local_component_registry_page_1_500, verification: [{go_test: ./internal/query}], notes: sanitized component registry readback; installed, enabled, and claim-capable states stay distinct}
      local_full_stack: {status: supported, max_truth_level: exact, required_runtime: full_stack_component_registry, p95_latency_ms: 250, max_scope_size: bounded_local_component_registry_page_1_500, verification: [{go_test: ./internal/query}], notes: sanitized component registry readback with policy diagnostics; local paths are not exposed}
      production: {status: experimental, max_truth_level: exact, required_runtime: deployed_services_component_registry, p95_latency_ms: 500, max_scope_size: bounded_deployed_component_registry_page_1_500, verification: [{go_test: ./internal/query}], notes: functional readback proven by go_test against the same handler as the local profiles; production deployed-registry validation at scale is not committed evidence, so the production claim is downgraded to experimental (issue 5336, issue 5552)}
  - capability: component_extensions.diagnostics
    tools: [get_component_extension_diagnostics]
    profiles:
      local_lightweight: {status: supported, max_truth_level: exact, required_runtime: local_host_component_registry, p95_latency_ms: 250, max_scope_size: one_component, verification: [{go_test: ./internal/query}], notes: singleton component diagnostics from registry readback; unavailable when ESHU_COMPONENT_HOME is unset}
      local_authoritative: {status: supported, max_truth_level: exact, required_runtime: local_host_component_registry, p95_latency_ms: 250, max_scope_size: one_component, verification: [{go_test: ./internal/query}], notes: singleton component diagnostics with policy failure reasons; graph is not required}
      local_full_stack: {status: supported, max_truth_level: exact, required_runtime: full_stack_component_registry, p95_latency_ms: 250, max_scope_size: one_component, verification: [{go_test: ./internal/query}], notes: singleton component diagnostics with sanitized activation config handles}
      production: {status: experimental, max_truth_level: exact, required_runtime: deployed_services_component_registry, p95_latency_ms: 500, max_scope_size: one_component, verification: [{go_test: ./internal/query}], notes: functional readback proven by go_test against the same handler as the local profiles; production deployed-registry validation at scale is not committed evidence, so the production claim is downgraded to experimental (issue 5336, issue 5552)}
