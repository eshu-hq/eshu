capabilities:
  - capability: platform_metrics.timeseries
    tools: [get_metrics_time_series]
    profiles:
      local_lightweight: {status: supported, max_truth_level: derived, required_runtime: local_host, p95_latency_ms: 1500, max_scope_size: one_metric_window_2000_samples, verification: [{go_test: ./internal/query}], notes: bounded HTTP metric history read; returns fallback unavailable-empty when no Prometheus/Mimir source is configured}
      local_authoritative: {status: supported, max_truth_level: derived, required_runtime: local_host, p95_latency_ms: 1500, max_scope_size: one_metric_window_2000_samples, verification: [{go_test: ./internal/query}], notes: bounded HTTP metric history read; graph sidecar unused}
      local_full_stack: {status: supported, max_truth_level: derived, required_runtime: full_stack, p95_latency_ms: 1500, max_scope_size: one_metric_window_2000_samples, verification: [{go_test: ./internal/query}], notes: bounded HTTP metric history read backed by configured Prometheus/Mimir collector target}
      production: {status: supported, max_truth_level: derived, required_runtime: deployed_services, p95_latency_ms: 2500, max_scope_size: one_metric_window_2000_samples, verification: [{remote_validation: prod-metrics-timeseries}], notes: bounded HTTP metric history read backed by configured Prometheus/Mimir collector target}
