version: v1
updated_at: 2026-06-09
owners:
  - platform-engineering
# Provider-neutral unmanaged-resource ownership packet capability. For each
# active AWS runtime drift finding the surface composes owner, repository,
# module, service, and environment candidates with explicit ambiguity reasons,
# confidence, freshness, and the read-only safety gate, reusing reducer-owned
# finding fields and the source-state taxonomy in
# docs/public/reference/replatforming-source-state-taxonomy.md. Raw tags stay
# provenance-only and never become owner candidates; a single candidate is
# derived, never exact. This fragment is intentionally separate from
# replatforming.v1.yaml and replatforming-rollups.v1.yaml to avoid conflicts
# with parallel work. It MUST stay in sync with the Go capability row in
# go/internal/query/contract_replatforming_ownership.go.
capabilities:
  - capability: replatforming.ownership.candidates
    tools:
      - find_unmanaged_resource_owners
    profiles:
      local_lightweight: {status: unsupported, max_truth_level: unsupported, required_runtime: local_host, p95_latency_ms: null, max_scope_size: account_or_scope, verification: [{integration_test: local-lightweight-unsupported-replatforming-ownership}], notes: requires reducer-materialized drift and IaC evidence; lightweight local cannot compose provider-neutral ownership candidates and must return unsupported_capability}
      local_authoritative: {status: supported, max_truth_level: derived, required_runtime: local_host_plus_graph, p95_latency_ms: 5000, max_scope_size: account_or_scope, verification: [{go_test: ./internal/query}], notes: bounded ownership packet per drift finding with owner/repository/module/service/environment candidates; ambiguous or missing attribution is surfaced explicitly and never promoted to a single owner}
      local_full_stack: {status: supported, max_truth_level: derived, required_runtime: full_stack, p95_latency_ms: 5000, max_scope_size: account_or_scope, verification: [{go_test: ./internal/query}], notes: bounded ownership packet per drift finding with owner/repository/module/service/environment candidates; ambiguous or missing attribution is surfaced explicitly and never promoted to a single owner}
      production: {status: supported, max_truth_level: derived, required_runtime: deployed_services, p95_latency_ms: 5000, max_scope_size: account_or_scope, verification: [{remote_validation: prod-replatforming-ownership}], notes: bounded ownership packet per drift finding with owner/repository/module/service/environment candidates; ambiguous or missing attribution is surfaced explicitly and never promoted to a single owner}
