capabilities:
  - capability: semantic_extraction.status
    tools: [get_semantic_capability_status]
    profiles:
      local_lightweight: {status: supported, max_truth_level: derived, required_runtime: local_host, p95_latency_ms: 100, max_scope_size: runtime_status, verification: [{go_test: ./internal/query}], notes: static runtime semantic extraction status with redacted provider profile rows when configured; no credential loading, provider API calls, or effect on deterministic indexing, reducer projection, API reads, MCP tools, or documentation facts}
      local_authoritative: {status: supported, max_truth_level: derived, required_runtime: local_host_plus_graph, p95_latency_ms: 100, max_scope_size: runtime_status, verification: [{go_test: ./internal/query}], notes: static runtime semantic extraction status with redacted provider profile rows when configured; no credential loading, provider API calls, or effect on deterministic indexing, reducer projection, API reads, MCP tools, or documentation facts}
      local_full_stack: {status: supported, max_truth_level: derived, required_runtime: full_stack, p95_latency_ms: 100, max_scope_size: runtime_status, verification: [{go_test: ./internal/query}], notes: static runtime semantic extraction status with redacted provider profile rows when configured; no credential loading, provider API calls, or effect on deterministic indexing, reducer projection, API reads, MCP tools, or documentation facts}
      production: {status: supported, max_truth_level: derived, required_runtime: deployed_services, p95_latency_ms: 100, max_scope_size: runtime_status, verification: [{go_test: ./internal/query}], notes: static runtime semantic extraction status with redacted provider profile rows when configured; no credential loading, provider API calls, or effect on deterministic indexing, reducer projection, API reads, MCP tools, or documentation facts}
  - capability: semantic_evidence.documentation_observations.list
    tools: [list_semantic_documentation_observations]
    profiles:
      local_lightweight: {status: supported, max_truth_level: derived, required_runtime: local_host, p95_latency_ms: 1000, max_scope_size: bounded_semantic_scope, verification: [{go_test: ./internal/query}], notes: "bounded semantic documentation observation facts by source, document, repository, service, fact, provider, freshness, status, policy, or observation scope; redacts prompt payloads, credentials, and provider responses"}
      local_authoritative: {status: supported, max_truth_level: derived, required_runtime: local_host_plus_graph, p95_latency_ms: 1000, max_scope_size: bounded_semantic_scope, verification: [{go_test: ./internal/query}], notes: "bounded semantic documentation observation facts by source, document, repository, service, fact, provider, freshness, status, policy, or observation scope; graph sidecar unused for the list read"}
      local_full_stack: {status: supported, max_truth_level: derived, required_runtime: full_stack, p95_latency_ms: 1000, max_scope_size: indexed_semantic_scope, verification: [{go_test: ./internal/query}], notes: "bounded semantic documentation observation facts with truth basis, freshness, provider profile, prompt version, redaction version, and policy state metadata"}
      production: {status: supported, max_truth_level: derived, required_runtime: deployed_services, p95_latency_ms: 1500, max_scope_size: multi_repo_platform, verification: [{remote_validation: prod-semantic-documentation-observations}], notes: "bounded semantic documentation observation facts with redacted provenance and no raw prompt payloads or private provider responses"}
  - capability: semantic_evidence.code_hints.list
    tools: [list_semantic_code_hints]
    profiles:
      local_lightweight: {status: supported, max_truth_level: derived, required_runtime: local_host, p95_latency_ms: 1000, max_scope_size: bounded_semantic_scope, verification: [{go_test: ./internal/query}], notes: "bounded non-canonical semantic code hint facts by repository, path, entity, topic, fact, provider, freshness, status, policy, or corroboration scope; deterministic code reads do not include these hints"}
      local_authoritative: {status: supported, max_truth_level: derived, required_runtime: local_host_plus_graph, p95_latency_ms: 1000, max_scope_size: bounded_semantic_scope, verification: [{go_test: ./internal/query}], notes: "bounded non-canonical semantic code hint facts with corroboration and promotion state; graph sidecar unused for the list read"}
      local_full_stack: {status: supported, max_truth_level: derived, required_runtime: full_stack, p95_latency_ms: 1000, max_scope_size: indexed_semantic_scope, verification: [{go_test: ./internal/query}], notes: "bounded non-canonical semantic code hint facts with truth basis, freshness, provider profile, prompt version, redaction version, policy state, corroboration, and promotion metadata"}
      production: {status: experimental, max_truth_level: derived, required_runtime: deployed_services, p95_latency_ms: 1500, max_scope_size: multi_repo_platform, verification: [{go_test: ./internal/query}], notes: "query handler proven by go_test but no producer/extraction pipeline emits SemanticCodeHintFactKind in the runtime, so the deployed surface returns empty (deployed proof issue 5681, defect issue 5693); downgraded to experimental until the code-hint extraction pipeline exists"}
  - capability: semantic_search.curated_retrieval
    tools: [search_semantic_context]
    profiles:
      local_lightweight: {status: unsupported, max_truth_level: unsupported, required_runtime: local_host_plus_search_documents, p95_latency_ms: null, max_scope_size: active_repo, verification: [{go_test: ./internal/query}], notes: "requires reducer-materialized curated search documents; lightweight local must return unsupported_capability rather than a downgraded whole-graph or raw-content fallback"}
      local_authoritative: {status: supported, max_truth_level: derived, required_runtime: local_host_plus_graph, p95_latency_ms: 1000, max_scope_size: active_repo, verification: [{go_test: ./internal/query}], notes: "repository-bounded curated search-document retrieval with explicit limit, timeout, truncation, search_method, derived truth labels, and scoped-token filtering before read-model access"}
      local_full_stack: {status: supported, max_truth_level: derived, required_runtime: full_stack, p95_latency_ms: 1000, max_scope_size: active_repo, verification: [{go_test: ./internal/query}], notes: "repository-bounded curated search-document retrieval over active generations; hybrid mode may report bm25 when no local embedder is configured"}
      production: {status: supported, max_truth_level: derived, required_runtime: deployed_services, p95_latency_ms: 1500, max_scope_size: active_repo, verification: [{remote_validation: prod-curated-semantic-search}], notes: "bounded retrieval evidence only; search scores are not canonical graph truth and responses expose graph handles for follow-up bounded expansion"}
