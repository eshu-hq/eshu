      production: {status: supported, max_truth_level: derived, required_runtime: deployed_services, p95_latency_ms: 100, max_scope_size: runtime_status, verification: [{go_test: ./internal/query}], notes: static runtime semantic extraction status with redacted provider profile rows when configured; no credential loading, provider API calls, or effect on deterministic indexing, reducer projection, API reads, MCP tools, or documentation facts}
