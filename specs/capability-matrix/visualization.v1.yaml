# Visualization capability matrix fragment.
#
# Two pure visualization helpers that issue #3028 promotes from overlay
# exemptions to first-class, machine-verified matrix surfaces. Neither runs a
# graph or content query, so both stay outside the graph_query.read_only_cypher
# diagnostics capability (which requires a graph and is unsupported in
# local_lightweight):
#
#   - derive_visualization_packet transforms an already-authorized answer
#     response (service_story, evidence_citation, or incident_context) into a
#     bounded node/edge packet. The packet carries the source response's truth
#     envelope, while the route envelope declares visualization.packet_derivation
#     at a derived ceiling because this helper only derives visualization shape.
#   - visualize_graph_query formats a graph-browser URL for caller-supplied
#     read-only Cypher. The handler performs no graph read and emits a derived
#     visualization.graph_query_link envelope, so it is supported in every
#     profile (the linked browser, not the tool, is what needs a running graph
#     backend).
capabilities:
  - capability: visualization.packet_derivation
    tools: [derive_visualization_packet]
    profiles:
      local_lightweight: {status: supported, max_truth_level: derived, required_runtime: local_host, p95_latency_ms: 200, max_scope_size: bounded_packet, verification: [{go_test: ./internal/query}], notes: pure in-memory transform of a caller-supplied source response into a node/edge-bounded packet; no graph or content read; packet carries source truth while response envelope is derived}
      local_authoritative: {status: supported, max_truth_level: derived, required_runtime: local_host, p95_latency_ms: 200, max_scope_size: bounded_packet, verification: [{go_test: ./internal/query}], notes: graph sidecar unused; packet carries source truth while response envelope is derived}
      local_full_stack: {status: supported, max_truth_level: derived, required_runtime: full_stack, p95_latency_ms: 200, max_scope_size: bounded_packet, verification: [{go_test: ./internal/query}], notes: pure transform with node and edge caps; packet carries source truth while response envelope is derived}
      production: {status: supported, max_truth_level: derived, required_runtime: deployed_services, p95_latency_ms: 400, max_scope_size: bounded_packet, verification: [{remote_validation: prod-visualization-packet}], notes: pure transform with node and edge caps; packet carries source truth while response envelope is derived}
  - capability: visualization.graph_query_link
    tools: [visualize_graph_query]
    profiles:
      local_lightweight: {status: supported, max_truth_level: derived, required_runtime: local_host, p95_latency_ms: 50, max_scope_size: single_query, verification: [{go_test: ./internal/query}], notes: validates read-only Cypher and formats a graph-browser URL; no graph or content read; emits a derived graph-query-link envelope, so the linked browser (not the tool) is what needs a graph backend}
      local_authoritative: {status: supported, max_truth_level: derived, required_runtime: local_host, p95_latency_ms: 50, max_scope_size: single_query, verification: [{go_test: ./internal/query}], notes: validates read-only Cypher and formats a graph-browser URL; no graph read; emits a derived graph-query-link envelope}
      local_full_stack: {status: supported, max_truth_level: derived, required_runtime: full_stack, p95_latency_ms: 50, max_scope_size: single_query, verification: [{go_test: ./internal/query}], notes: validates read-only Cypher and formats a graph-browser URL; no graph read; emits a derived graph-query-link envelope}
      production: {status: supported, max_truth_level: derived, required_runtime: deployed_services, p95_latency_ms: 100, max_scope_size: single_query, verification: [{remote_validation: prod-visualization-graph-query-link}], notes: validates read-only Cypher and formats a graph-browser URL; no graph read; emits a derived graph-query-link envelope}
