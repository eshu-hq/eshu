  # ─── RACE ──────────────────────────────────────────────────────────────────

  - id: race-graph-writes
    name: Race detector — graph writes
    category: race
    tier: pre-pr
    blocking: true
    triggers:
      - "go/internal/storage/cypher/**"
      - "go/internal/reducer/**"
      - "go/internal/projector/**"
      - "go/internal/correlation/**"
      - "go/internal/content/shape/**"
      - "go/internal/relationships/**"
    local:
      command: "cd go && go test -race -count=1 -timeout 600s ./internal/storage/cypher/... ./internal/reducer/... ./internal/projector/... ./internal/correlation/... ./internal/content/shape/... ./internal/relationships/..."
      test_command: ""
    ci:
      workflow: race-graph-writes.yml
      job: "Run graph-write tests with race detector"
    requirements:
      - go
    ci_only_reason: ""

  - id: reducer-contention
    name: Reducer Contention Gate (real Postgres)
    category: race
    tier: pre-pr
    blocking: true
    triggers:
      - "go/internal/storage/postgres/**"
      - "go/internal/reducer/**"
      - "schema/data-plane/postgres/**"
    ci:
      workflow: reducer-contention-gate.yml
      job: "reducer contention gate"
    requirements:
      - go
      - postgres
    ci_only_reason: "needs Postgres service container (GitHub Actions)"

