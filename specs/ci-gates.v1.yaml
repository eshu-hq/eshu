      test_command: ""
    ci:
      workflow: sdk-go.yml
      job: "SDK Go: factschema"
    requirements:
      - go
    ci_only_reason: ""
    # #4602: same rationale as sdk-go-collector, plus a go generate drift
    # check — factschema's derived JSON Schema/Go artifacts must match their
    # source, or a schema edit without regeneration ships a stale artifact.

