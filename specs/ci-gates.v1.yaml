# CI gate registry — single source of truth mapping changed paths to local/CI gates.
# Version: v1
# See docs/public/reference/local-testing.md for usage.
# Managed by: scripts/verify-ci-gates-registry.sh (validate)
#             scripts/dev/select-gates.sh (select)
#             scripts/dev/run-selected-gates.sh (run)

version: v1

gates:

  # ─── HYGIENE / GO CORE ─────────────────────────────────────────────────────

  - id: go-fmt
    name: Go gofumpt formatting
    category: hygiene
    tier: pre-commit
    blocking: true
    triggers:
      - "go/**"
    local:
      command: "bash scripts/dev/precommit-go.sh fmt-all"
      test_command: ""
    ci:
      workflow: test.yml
      job: "Check gofumpt formatting"
    requirements:
      - go
    ci_only_reason: ""
    hook_id: go-fmt

  - id: go-lint
    name: Go lint (golangci-lint)
    category: hygiene
    tier: pre-commit
    blocking: true
    triggers:
      - "go/**"
    local:
      command: "bash scripts/dev/precommit-go.sh lint-all"
      test_command: ""
    ci:
      workflow: test.yml
      job: "Lint Go"
    requirements:
      - go
    ci_only_reason: ""
    hook_id: go-lint

  - id: go-build
    name: Go build (all binaries)
    category: build
    tier: pre-push
    blocking: true
    triggers:
      - "go/**"
    local:
      command: "cd go && go build ./..."
      test_command: ""
    ci:
      workflow: test.yml
      job: "Build all Go binaries"
    requirements:
      - go
    ci_only_reason: ""

  - id: go-vet
    name: Go vet
    category: hygiene
    tier: pre-push
    blocking: true
    triggers:
      - "go/**"
    local:
      command: "cd go && go vet ./..."
      test_command: ""
    ci:
      workflow: test.yml
      job: "Lint Go"
    requirements:
      - go
    ci_only_reason: ""

  - id: go-file-cap
    name: Go 500-line file cap
    category: hygiene
    tier: pre-commit
    blocking: true
    triggers:
      - "go/**"
    local:
      command: "bash scripts/dev/precommit-go.sh filecap-all"
      test_command: ""
    ci:
      workflow: test.yml
      job: "Lint Go"
    requirements:
      - go
    ci_only_reason: ""
    hook_id: go-file-cap

  - id: package-docs
    name: Go package docs coverage
    category: hygiene
    tier: pre-pr
    blocking: true
    triggers:
      - "go/**"
    local:
      command: "bash scripts/verify-package-docs.sh"
      test_command: "bash scripts/test-verify-package-docs.sh"
    ci:
      workflow: test.yml
      job: "Verify package docs"
    requirements:
      - go
    ci_only_reason: ""
    hook_id: go-package-docs

  - id: agent-canon
    name: Agent canon check
    category: hygiene
    tier: pre-pr
    blocking: true
    triggers:
      - "go/**"
      - ".agents/**"
      - "AGENTS.md"
      - "CLAUDE.md"
    local:
      command: "bash scripts/verify-agent-canon.sh"
      test_command: "bash scripts/test-verify-agent-hygiene.sh"
    ci:
      workflow: verify-agent-hygiene.yml
      job: "Verify agent hygiene"
    requirements:
      - go
    ci_only_reason: ""
    hook_id: agent-canon

  - id: no-ai-attribution
    name: No AI attribution in commits/docs
    category: hygiene
    tier: pre-commit
    blocking: true
    triggers:
      - "go/**"
      - "docs/**"
      - "specs/**"
      - ".agents/**"
      - "AGENTS.md"
      - "CLAUDE.md"
    local:
      command: "bash scripts/verify-no-ai-attribution.sh"
      test_command: ""
    ci:
      workflow: test.yml
      job: "Check whitespace hygiene"
    requirements:
      - go
    ci_only_reason: ""
    hook_id: no-ai-attribution-content

  - id: license-header
    name: Go license header verification
    category: hygiene
    tier: pre-commit
    blocking: true
    triggers:
      - "go/**"
    local:
      command: "bash scripts/verify-license-header.sh"
