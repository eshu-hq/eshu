    hook_id: docs-build-changed

  # ─── FRONTEND ──────────────────────────────────────────────────────────────

  - id: frontend-format-changed
    name: Verify Frontend Format (changed)
    category: frontend
    tier: pre-push
    blocking: false
    triggers:
      - "src/**"
      - "apps/console/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "wrangler.jsonc"
      - "eslint.config.js"
      - ".prettierrc.json"
      - ".prettierignore"
    local:
      command: "bash scripts/verify-frontend-format-changed.sh"
      test_command: "bash scripts/test-verify-frontend-format-changed.sh"
    ci:
      workflow: frontend.yml
      job: "Prettier format check (issue #3763)"
    requirements:
      - node
    ci_only_reason: ""
    hook_id: frontend-format-changed

  - id: console-e2e
    name: Console e2e (mocked)
    category: frontend
    tier: pre-push
    blocking: true
    triggers:
      - "apps/console/**"
      - "src/**"
    local:
      command: "bash scripts/dev/precommit-console.sh e2e"
      test_command: "bash scripts/test-precommit-console.sh"
    ci:
      workflow: frontend.yml
      job: "Console (apps/console)"
    requirements:
      - node
    ci_only_reason: ""
    hook_id: console-e2e

  # ─── SECURITY ──────────────────────────────────────────────────────────────

  - id: gosec-changed
    name: gosec static analysis (whole module)
    category: security
    tier: pre-push
    blocking: true
    triggers:
      - "go/**"
    # Whole-module gosec here so the ci-gates runner (which passes no file list)
    # runs a real scan rather than a no-op. #4217 narrows the local security lane
    # to changed packages for speed while keeping CI authoritative.
    local:
      command: "bash scripts/dev/precommit-go.sh gosec-all"
      test_command: ""
    ci:
      workflow: security-scan.yml
      job: "gosec (Go static analysis)"
    requirements:
      - go
    ci_only_reason: ""
    hook_id: go-gosec

