  - id: factschema-diff
    name: Fact Schema Diff (breaking-change gate)
    category: exactness
    tier: pre-pr
    blocking: true
    triggers:
      - "sdk/go/factschema/schema/**"
      - "sdk/go/factschema/aws/v1/**"
      - "sdk/go/factschema/internal/schemagen/**"
      - "go/cmd/factschema-diff/**"
      - "scripts/*verify-factschema-diff*.sh"
    local:
      command: "bash scripts/verify-factschema-diff.sh"
      test_command: "bash scripts/test-verify-factschema-diff.sh"
    ci:
      workflow: factschema-diff.yml
      job: "Verify factschema-diff gate"
    requirements:
      - go
    ci_only_reason: ""
    # Contract System v1 §6 enforcement gate 1: diffs generated JSON Schemas
    # under sdk/go/factschema/schema/ against a baseline git ref (default:
    # merge-base against origin/main, since no factschema-* release tag
    # exists yet), comparing the union of baseline and current schema files.
    # Fails on a removed/renamed field (required, or optional under a
    # fail-closed additionalProperties:false schema), a narrowed type
    # (including nested map-value/array-item types), a widened required set, a
    # newly added required field, or a deleted schema file — all without a
    # corresponding major version bump. See go/cmd/factschema-diff/README.md.

  - id: payload-usage-manifest
    name: Payload Usage Manifest (reverse contract gate)
    category: exactness
    tier: pre-pr
    blocking: true
    triggers:
      - "go/internal/reducer/**"
      - "go/internal/projector/**"
      - "go/internal/query/**"
      - "go/internal/storage/postgres/**"
      - "go/internal/relationships/**"
      - "go/internal/replay/**"
      - "sdk/go/factschema/**"
      - "go/internal/payloadusage/**"
      - "go/cmd/payload-usage-manifest/**"
      - "scripts/*verify-payload-usage-manifest*.sh"
    local:
      command: "bash scripts/verify-payload-usage-manifest.sh"
      test_command: "bash scripts/test-verify-payload-usage-manifest.sh"
    ci:
      workflow: payload-usage-manifest.yml
      job: "Verify payload-usage-manifest gate"
    requirements:
      - go
    ci_only_reason: ""
    # Contract System v1 §6 enforcement gate 2: derives, from typed
    # factschema.Decode* seams across reducer/projector/query/loader/
    # relationships/replay, which declared payload fields typed-decoded
    # handlers actually read (go/internal/payloadusage), and fails when a
    # handler reads a field no checked-in JSON Schema
    # (sdk/go/factschema/schema/*.json) declares. It also ratchets new raw
    # payload reads on loader/relationships/replay behind explicit exemptions.
    # This is the REVERSE direction from factschema-diff (a schema breaking its
    # own declared shape): a consumer starting to require a field no schema
    # promises. See go/internal/payloadusage/README.md and
    # go/internal/reducer/payload_usage_manifest_test.go
    # (TestPayloadUsageManifest).

  - id: scorecard-example-conformance
    name: Scorecard example go test
    category: exactness
    tier: pre-pr
    blocking: true
    triggers:
      - "examples/collector-extensions/scorecard/**"
      - "sdk/go/collector/**"
      - "sdk/go/factschema/**"
    local:
      command: "cd examples/collector-extensions/scorecard && go test ./... -count=1"
      test_command: ""
    ci:
      workflow: scorecard-example-conformance.yml
      job: "Scorecard example go test"
    requirements:
      - go
    ci_only_reason: ""
    # #4583 / #4572: runs the out-of-tree scorecard example's own `go test
    # ./...` (its own go.mod, resolved via replace directives against the SDK
    # module paths in-repo) so "the external collector proves conformance in
    # its own CI" is a real running gate on any PR touching the example or
    # either public SDK module, not a manual command a contributor could
    # forget. See examples/collector-extensions/scorecard/README.md
    # ("Pinning story") and fixturepack_pin_test.go for the pinned
    # fixture-pack conformance proof this gate protects.

  - id: sdk-go-collector
    name: "SDK Go: collector build/test/vet/fmt/boundary"
    category: exactness
    tier: pre-pr
    blocking: true
    triggers:
      - "sdk/go/collector/**"
      - ".github/workflows/sdk-go.yml"
      - "scripts/ci/install-apt-packages.sh"
    local:
      command: "cd sdk/go/collector && go build ./... && go test ./... -count=1 && go vet ./... && test -z \"$(gofmt -l .)\" && ! go list -deps ./... | rg -q 'eshu-hq/eshu/go/internal'"
      test_command: ""
    ci:
      workflow: sdk-go.yml
      job: "SDK Go: collector"
    requirements:
      - go
    ci_only_reason: ""
    # #4602: sdk/go/collector is its own go.mod, resolved independently of the
    # go/ app module that test.yml's working-directory: go covers. Without
    # this gate a PR could go all-green while the collector SDK module failed
    # to build/test, drifted from gofmt, or started importing go/internal
    # (which the SDK, shipped to external collectors, must never depend on).

  - id: sdk-go-factschema
