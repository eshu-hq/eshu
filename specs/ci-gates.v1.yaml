# CI gate registry — single source of truth mapping changed paths to local/CI gates.
# Version: v1
# See docs/public/reference/local-testing.md for usage.
# Managed by: scripts/verify-ci-gates-registry.sh (validate)
#             scripts/dev/select-gates.sh (select)
#             scripts/dev/run-selected-gates.sh (run)

version: v1

gates:

  # ─── HYGIENE / GO CORE ─────────────────────────────────────────────────────

  - id: go-fmt
    name: Go gofumpt formatting
    category: hygiene
    tier: pre-commit
    blocking: true
    triggers:
      - "go/**"
    local:
      command: "bash scripts/dev/precommit-go.sh fmt-all"
      test_command: ""
    ci:
      workflow: test.yml
      job: "go-core"
    requirements:
      - go
    ci_only_reason: ""
    hook_id: go-fmt

  - id: go-lint
    name: Go lint (golangci-lint)
    category: hygiene
    tier: pre-commit
