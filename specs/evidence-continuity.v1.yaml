    continuity:
      projection: {ref: "go test ./internal/query -run '^(TestSupplyChainImpactFindingsExposeReachabilityWithoutDowngradingImpact|TestDecodeSupplyChainImpactFindingRowPreservesJSTSReachabilitySeparatelyFromImpact)$' -count=1"}
      api: {ref: "go test ./internal/query -run '^(TestBuildSupplyChainImpactExplanationUsesEvidenceDerivedDependencyChainForMissingEvidence|TestBuildSupplyChainImpactExplanationReturnsRuntimePathAndMissingHops)$' -count=1"}
      mcp: {ref: "go test ./internal/mcp -run '^(TestSupplyChainImpactToolDescriptionAdvertisesReachabilityEnvelope|TestDispatchToolSupplyChainImpactExplainReturnsEnvelope)$' -count=1"}
    empty_states:
      no_provider: {ref: "go test ./cmd/eshu -run '^(TestRunVulnScanRepoSurfacesServerNotConfiguredReadiness)$' -count=1"}
      no_collector: {ref: "go test ./internal/query -run '^(TestSupplyChainExplainImpactNoEvidenceSurfacesUnsupportedEcosystem)$' -count=1"}
      empty: {ref: "go test ./internal/query -run '^(TestSupplyChainExplainImpactNoEvidenceResponse)$' -count=1"}
    negative_cases:
      - {case: empty_evidence, ref: "go test ./internal/query -run '^(TestSupplyChainExplainImpactNoEvidenceResponse)$' -count=1"}
      - {case: missing_evidence, ref: "go test ./internal/query -run '^(TestBuildSupplyChainImpactExplanationUsesEvidenceDerivedDependencyChainForMissingEvidence)$' -count=1"}
