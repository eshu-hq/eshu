      - {case: truncated_evidence, ref: "go test ./internal/query -run '^(TestSupplyChainImpactAggregateInventoryReportsTruncated)$' -count=1"}
      - {case: inaccessible_evidence, ref: "go test ./internal/query -run '^(TestSupplyChainImpactScopedRepositorySelectorDeniesOutOfGrantWithoutStoreRead)$' -count=1"}
    properties: *required_properties

