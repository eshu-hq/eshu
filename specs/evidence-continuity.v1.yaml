      - {case: truncated_evidence, ref: "go test ./internal/query -run '^(TestSupplyChainExplainImpactRequiresBoundedInput)$' -count=1"}
      - {case: inaccessible_evidence, ref: "go test ./internal/query -run '^(TestSupplyChainExplainImpactNoEvidenceSurfacesPermissionHiddenSourceState)$' -count=1"}
    properties: *required_properties

