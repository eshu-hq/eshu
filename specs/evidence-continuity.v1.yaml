version: v1
required_domains:
  - code_to_cloud
  - supply_chain
  - vulnerability_reachability
  - iam_secrets
  - change_risk
  - iac_replatforming
  - observability
  - documentation_evidence
  - capability_catalog_proof
  - citation_packet
required_capabilities:
  - platform_impact.deployment_chain
  - supply_chain.impact_findings.list
  - reachability.go.govulncheck
  - secrets_iam.identity_trust_chains.list
  - platform_impact.developer_change_plan
  - replatforming.plan.readiness
  - observability.coverage.correlations.list
  - documentation_evidence_packet.read
  - capability_catalog.list
  - evidence_citation.packet
capability_api_routes:
  platform_impact.deployment_chain: ["POST /api/v0/impact/trace-deployment-chain"]
  supply_chain.impact_findings.list: ["GET /api/v0/supply-chain/impact/findings"]
  reachability.go.govulncheck: ["GET /api/v0/supply-chain/impact/explain"]
  secrets_iam.identity_trust_chains.list: ["GET /api/v0/secrets-iam/identity-trust-chains"]
  platform_impact.developer_change_plan: ["POST /api/v0/impact/developer-change-plan"]
  replatforming.plan.readiness: ["POST /api/v0/replatforming/plans"]
  observability.coverage.correlations.list: ["GET /api/v0/observability/coverage/correlations"]
  documentation_evidence_packet.read: ["GET /api/v0/documentation/findings/{finding_id}/evidence-packet"]
  capability_catalog.list: ["GET /api/v0/capabilities"]
  evidence_citation.packet: ["POST /api/v0/evidence/citations"]
rows:
  - id: code-to-cloud-deployment-chain
    domain: code_to_cloud
    capability: platform_impact.deployment_chain
    api_routes: ["POST /api/v0/impact/trace-deployment-chain"]
    mcp_tools: ["trace_deployment_chain"]
    source_fact: {ref: "go test ./internal/query -run '^(TestBuildDeploymentTraceResponsePromotesWorkflowAndControllerProvenance|TestBuildDeploymentTraceArtifactLineageUsesExplicitWorkflowAndControllerEvidence)$' -count=1"}
    continuity:
      projection: {ref: "go test ./internal/query -run '^(TestBuildDeploymentTraceArtifactLineageSkipsImplicitOnlyEvidence|TestTraceDeploymentChainSkipsIndirectEvidenceWhenDirectOnly)$' -count=1"}
      api: {ref: "go test ./internal/query -run '^(TestTraceDeploymentChain_LocalLightweightReturnsStructuredUnsupportedCapability|TestBuildDeploymentTraceResponseIncludesOCIRegistryTruthInOverview)$' -count=1"}
      mcp: {ref: "go test ./internal/mcp -run '^(TestResolveRouteMapsTraceDeploymentChain|TestEcosystemTraceDeploymentChainSchema)$' -count=1"}
    empty_states:
      no_provider: {ref: "go test ./internal/query -run '^(TestTraceDeploymentChain_LocalLightweightReturnsStructuredUnsupportedCapability)$' -count=1"}
      no_collector: {ref: "go test ./internal/query -run '^(TestTraceDeploymentChainSkipsIndirectEvidenceWhenDirectOnly)$' -count=1"}
      empty: {ref: "go test ./internal/query -run '^(TestBuildDeploymentTraceResponseDoesNotEmitStructurallyEmptyDeliveryPaths)$' -count=1"}
    negative_cases:
      - {case: empty_evidence, ref: "go test ./internal/query -run '^(TestBuildDeploymentTraceResponseDoesNotEmitStructurallyEmptyDeliveryPaths)$' -count=1"}
      - {case: missing_evidence, ref: "go test ./internal/query -run '^(TestBuildDeploymentTraceResponseExplainsUncorrelatedCloudCandidates)$' -count=1"}
      - {case: stale_evidence, ref: "go test ./internal/query -run '^(TestTraceDeploymentChain_LocalLightweightReturnsStructuredUnsupportedCapability)$' -count=1"}
      - {case: truncated_evidence, ref: "go test ./internal/query -run '^(TestBuildDeploymentTraceResponseIncludesArtifactBackedDeliveryPaths)$' -count=1"}
      - {case: inaccessible_evidence, ref: "go test ./internal/query -run '^(TestTraceDeploymentChain_LocalLightweightReturnsStructuredUnsupportedCapability)$' -count=1"}
    properties: &required_properties
      provider_key_independent: "true"
      deterministic_truth: "required"

  - id: supply-chain-impact-findings
    domain: supply_chain
    capability: supply_chain.impact_findings.list
    api_routes: ["GET /api/v0/supply-chain/impact/findings"]
    mcp_tools: ["list_supply_chain_impact_findings"]
    source_fact: {ref: "go test ./internal/query -run '^(TestSupplyChainImpactFindingsExposeReachabilityWithoutDowngradingImpact|TestBuildSupplyChainImpactReadinessDistinguishesSourceStates)$' -count=1"}
    continuity:
      projection: {ref: "go test ./internal/query -run '^(TestPostgresSupplyChainImpactReadinessScopesAdvisoryFacts|TestSupplyChainListImpactFindingsDefaultsToPreciseProfile)$' -count=1"}
      api: {ref: "go test ./internal/query -run '^(TestSupplyChainExplainImpactFindingIncludesEvidenceChain|TestSupplyChainListImpactFindingsDefaultsExcludeOperatorSuppressions)$' -count=1"}
      mcp: {ref: "go test ./internal/mcp -run '^(TestResolveRouteMapsSupplyChainImpactFindingsToBoundedQuery|TestDispatchToolSupplyChainImpactFindingsSurfacesIncompleteCoverageStates)$' -count=1"}
    empty_states:
      no_provider: {ref: "go test ./internal/query -run '^(TestSupplyChainListImpactFindingsReadinessSurfacesNotConfigured)$' -count=1"}
      no_collector: {ref: "go test ./internal/query -run '^(TestSupplyChainListImpactFindingsReadinessWithoutStore)$' -count=1"}
      empty: {ref: "go test ./internal/query -run '^(TestSupplyChainListImpactFindingsAttachesReadinessForZeroFindings)$' -count=1"}
    negative_cases:
      - {case: empty_evidence, ref: "go test ./internal/query -run '^(TestSupplyChainListImpactFindingsAttachesReadinessForZeroFindings)$' -count=1"}
      - {case: missing_evidence, ref: "go test ./internal/query -run '^(TestBuildSupplyChainImpactReadinessClassifiesMissingSBOMOrImageEvidence)$' -count=1"}
