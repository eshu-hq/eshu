# Generated fact-kind registry contract v1.
# This is the source input for go/internal/facts/fact_kind_registry.generated.go
# and go/internal/facts/FACT_KIND_REGISTRIES.md. Keep fact kind, schema version,
# reducer domain, projection, admission, read surface, owner, and truth-profile
# naming aligned with specs/surface-inventory.v1.yaml and
# specs/evidence-continuity.v1.yaml.
#
# v1.1.0 adds three additive, optional fields (per kind, with the same
# per-kind override pattern as schema_version_overrides /
# read_surface_overrides):
#   - payload_schema / payload_schema_overrides: repo-relative path to the
#     checked-in JSON Schema artifact under sdk/go/factschema/schema/ that
#     describes a kind's payload shape. A dangling reference fails the
#     generator closed. Most kinds leave this unset until their payload is
#     migrated to a typed sdk/go/factschema struct (family-by-family plan,
#     docs/internal/design/contract-system-v1.md section 7).
#   - deprecated_in / deprecated_in_overrides: semver marker for when a kind
#     was deprecated.
#   - removed_in / removed_in_overrides: semver marker for when a kind is
#     scheduled for removal. Requires deprecated_in to also be set.
# See docs/public/reference/fact-schema-versioning.md for the full contract.
version: "1.1.0"
families:
  documentation:
    lifecycle_owner: go/internal/facts
    schema_version: "1.0.0"
    schema_version_overrides: {documentation_section: "1.1.0"}
    reducer_domain: documentation_materialization
    projection_hook: documentation_evidence
    admission_hook: facts.ValidateSchemaVersion
    read_surface: "GET /api/v0/documentation/facts"
    truth_profile: deterministic
    provider_key_independent: true
    payload_schema_overrides:
      documentation_claim_candidate: "sdk/go/factschema/schema/documentation_claim_candidate.v1.schema.json"
      documentation_document: "sdk/go/factschema/schema/documentation_document.v1.schema.json"
      documentation_entity_mention: "sdk/go/factschema/schema/documentation_entity_mention.v1.schema.json"
      documentation_evidence_packet: "sdk/go/factschema/schema/documentation_evidence_packet.v1.schema.json"
      documentation_finding: "sdk/go/factschema/schema/documentation_finding.v1.schema.json"
      documentation_link: "sdk/go/factschema/schema/documentation_link.v1.schema.json"
      documentation_section: "sdk/go/factschema/schema/documentation_section.v1.schema.json"
      documentation_source: "sdk/go/factschema/schema/documentation_source.v1.schema.json"
    kinds: [documentation_claim_candidate, documentation_document, documentation_entity_mention, documentation_evidence_packet, documentation_finding, documentation_link, documentation_section, documentation_source]
  aws:
    lifecycle_owner: go/internal/facts
    schema_version: "1.0.0"
    reducer_domain: aws_cloud_runtime_drift
    projection_hook: cloud_asset_resolution
    admission_hook: facts.ValidateSchemaVersion
    read_surface: "GET /api/v0/cloud/inventory"
    truth_profile: provider_gated
