    projection_hook: ci_cd_run_correlation
    admission_hook: facts.ValidateSchemaVersion
    read_surface: "GET /api/v0/ci-cd/run-correlations"
    truth_profile: provider_gated
    provider_key_independent: false
    payload_schema_overrides:
      ci.run: "sdk/go/factschema/schema/ci.run.v1.schema.json"
      ci.artifact: "sdk/go/factschema/schema/ci.artifact.v1.schema.json"
      ci.environment_observation: "sdk/go/factschema/schema/ci.environment_observation.v1.schema.json"
      ci.trigger_edge: "sdk/go/factschema/schema/ci.trigger_edge.v1.schema.json"
      ci.step: "sdk/go/factschema/schema/ci.step.v1.schema.json"
      ci.workflow_image_evidence: "sdk/go/factschema/schema/ci.workflow_image_evidence.v1.schema.json"
    kinds: [ci.artifact, ci.environment_observation, ci.job, ci.pipeline_definition, ci.run, ci.step, ci.trigger_edge, ci.warning, ci.workflow_image_evidence]
    # ci.job, ci.pipeline_definition, and ci.warning are registry-disclosed:
    # they have no reducer decode call today and no graph-projection path in
    # policy v1 (#5472). They carry payload_schema contracts for future use
    # but produce no graph or Postgres read-model output.
  # code is an admission-exempt family (registry v1.1, issue #4752). It records
  # the payload_schema contract for the legacy git code-graph kinds (file,
  # repository) WITHOUT enrolling them in schema-version admission. These kinds
  # predate the versioned-admission regime and flow as CompatibilityUnknownKind
  # today; admission_exempt keeps that runtime behavior identical (no schema
  # version, no collector stamp, no fixture ripple) while still checking in
  # their JSON Schema references. This is the reusable pattern for the other
  # version-less git kinds (code_dataflow_*, taint, interproc, function_summary)
  # should they later register a payload_schema. See
  # docs/public/reference/fact-schema-versioning.md.
  code:
    lifecycle_owner: go/internal/facts
    admission_exempt: true
    reducer_domain: code_graph_projection
    projection_hook: canonical_code_graph
    admission_hook: none
    # repository fact read truth is the repositories route (repository rows).
    # file fact read truth is the file listing, which that route does NOT
    # return; it is served through the MCP file tools. read_surface_overrides
    # points file at list_repository_files so its coverage exercises file rows
    read_surface: "GET /api/v0/repositories"
    read_surface_overrides: {file: "list_repository_files"}
    truth_profile: deterministic
    provider_key_independent: true
    payload_schema_overrides:
      file: "sdk/go/factschema/schema/file.v1.schema.json"
      repository: "sdk/go/factschema/schema/repository.v1.schema.json"
    kinds: [file, repository]
