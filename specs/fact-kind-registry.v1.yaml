      aws_iam_permission: "sdk/go/factschema/schema/aws_iam_permission.v1.schema.json"
      aws_image_reference: "sdk/go/factschema/schema/aws_image_reference.v1.schema.json"
      aws_relationship: "sdk/go/factschema/schema/aws_relationship.v1.schema.json"
      aws_resource: "sdk/go/factschema/schema/aws_resource.v1.schema.json"
      aws_resource_policy_permission: "sdk/go/factschema/schema/aws_resource_policy_permission.v1.schema.json"
      aws_security_group_rule: "sdk/go/factschema/schema/aws_security_group_rule.v1.schema.json"
      aws_warning: "sdk/go/factschema/schema/aws_warning.v1.schema.json"
    kinds: [aws_dns_record, aws_iam_permission, aws_image_reference, aws_relationship, aws_resource, aws_resource_policy_permission, aws_security_group_rule, aws_tag_observation, aws_warning]
