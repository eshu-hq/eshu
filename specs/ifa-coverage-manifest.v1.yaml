  - {surface: "fact_kind:aws_tag_observation", scenario: odu, scenario_type: baseline, ref: "odu:aws-pack", proof_gate: ifa-contract-layer}
  - {surface: "narrowed_correlation:rc-29", scenario: odu, scenario_type: baseline, ref: "odu:kustomize-deploys-from", proof_gate: ifa-contract-layer}
  - {surface: "fact_kind:gcp_cloud_resource", scenario: odu, scenario_type: baseline, ref: "odu:demo-org-roundtrip", proof_gate: golden-corpus-gate}
