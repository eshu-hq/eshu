# Exemptions: supported surfaces deliberately not required to have a replay
# scenario, each with an auditable reason. Empty at seed time — every gap should
# be burned down by an authored scenario (C-2..C-6), not exempted away. Add an
# entry only when a surface genuinely cannot have a credential-free replay
# scenario, with a reason an operator would accept.
exemptions:
  # C-2 (#4174): the four implemented-lane collectors that cannot have a
  # credential-free cassette of the supply-chain-demo kind, each for a structural
  # reason an operator would accept (not "we didn't get to it").
  - surface: collector:git
    reason: >-
      Filesystem-native collector, not a credentialed upstream API. Git is
      already exercised end-to-end by the golden-corpus gate's 20-repo
      bootstrap-index corpus (sync -> discover -> parse -> emit), so a
      supply-chain-demo cassette would re-record a path the gate already
      replays from real fixtures. The fixture corpus is its replay scenario.
  - surface: collector:documentation
    reason: >-
      Offline export library, not a polling collector binary. Documentation
      facts are produced from offline export manifests (go/internal/collector/
      documentationexport), so there is no credentialed upstream to record into
      a cassette; the offline-manifest path is the credential-free input.
  - surface: collector:webhook
    reason: >-
      Inbound webhook sink, not a pollable source. The webhook collector
      verifies and normalizes inbound deliveries into refresh triggers; it never
      polls an upstream, so there is no generation to record into a cassette.
  - surface: collector:scanner_worker
    reason: >-
      Internal hosted worker with no external upstream. scanner-worker consumes
      coordinator work items (image refs, rootfs, SBOM targets) and emits
      analysis facts; it has no credentialed source to record, so a cassette of
      the supply-chain-demo kind does not apply.

  # C-5 (#4177): two fact-kind read surfaces that cannot be asserted by the
  # golden-corpus gate as-is.
  - surface: read_surface:GET /api/v0/semantic-evidence
    reason: >-
      Registry drift: the fact-kind registry declares read_surface
      "GET /api/v0/semantic-evidence", but no such route is mounted — the semantic
      evidence is served by /api/v0/semantic/documentation-observations and
      /api/v0/semantic/code-hints. A golden cannot call a non-existent route.
      Tracked by #4197 to reconcile the registry read_surface with the mounted
      route; exempt until the registry is corrected.
  - surface: read_surface:GET /api/v0/supply-chain/security-alerts/reconciliations
    reason: >-
      Truth-ceiling: the security_alert_reconciliations.list capability is
      unsupported in the golden-corpus gate's local_full_stack query profile (the
      route returns the profile-required refusal, HTTP 404), so the gate cannot
      assert a green response for it. The refusal is correct behavior under the
      capability matrix; covering it would require a profile that enables the
      provider security-alert reconciliation read model.
