# Replay coverage manifest (C-1, issue #4173, epic #4172).
#
# This is the curated, reviewable mapping from each supported surface to the
# replay scenario that exercises it. The replay-coverage-gate
# (go/cmd/replay-coverage-gate) enumerates the supported surfaces from the seven
# source-of-truth registries — surface-inventory implemented-lane collectors,
# fact-kind-registry read surfaces, B-12 CLI query shapes, parser-backing-ledger
# parsers, capability-matrix claims, product-claims public ledger rows, plus
# authorization-catalog scoped permission families — and reports any required
# surface/scenario_type pair with no entry here as UNCOVERED. That uncovered list
# is the C-2..C-10 backfill worklist.
#
# Surface keys are "<kind>:<name>":
#   collector:<name>          (surface-inventory implemented lane)
#   read_surface:<surface>    (fact-kind-registry read_surface)
#   cli_surface:<command>     (B-12 query_shapes.cli)
#   parser:<name>             (parser-backing-ledger)
#   capability:<id>           (capability-matrix positive claim)
#   product_claim:<id>        (product-claims public claim ledger)
#   authz_family:<family>:<mode> (authorization-catalog in/out grant mode)
#
# scenario artifact kinds: cassette | parser_fixture | api_mcp_golden |
#   cli_golden | correlation | capability_claim | product_claim |
#   authz_scoped_route | go_test | proof_artifact
#   - cassette / parser_fixture refs are repo-relative paths to the artifact.
#   - api_mcp_golden / cli_golden / correlation refs are B-12 snapshot ids
#     (query-shape key / rc-*).
#   - capability_claim refs are capability ids whose capability-matrix profile
#     rows carry supported-answer and refusal verification references.
#   - product_claim refs are product-claims ledger ids whose deterministic
#     proof is checked by capability-inventory docs mode.
#   - authz_scoped_route refs are <permission-family>:<grant-mode> rows in
#     specs/authorization-replay-coverage.v1.yaml.
#   - go_test refs are repo-relative Go package or test files run by the named
#     proof gate.
#   - proof_artifact refs are repo-relative proof contracts or evidence files
#     run by the named proof gate.
# scenario_type (C-8 depth class) is required on every coverage entry:
#   baseline | delta_tombstone | fault | ordering | crash | cost.
# Surfaces without an explicit scenario_requirements row require only baseline.
# Explicit rows must include baseline and opt a surface into additional depth
# dimensions when the matching R-11/R-13/R-14/R-16/R-17 proof artifact exists.
# proof_gate (REQUIRED on every coverage entry) names the gate that runs the
# scenario and proves it green; this gate only verifies the artifact exists, so a
# coverage entry without a named proof_gate would claim a green nothing verifies.
#
# Seed coverage = only what is genuinely green today: the five implemented-lane
# collectors whose cassettes the golden-corpus-gate already replays. Everything
# else is intentionally uncovered until the relevant C-lane child authors its
# scenario.
version: "v1"

