  # C-14 (#4367) fault backfill: the 12 HTTP-polling collector boundaries each
  # get a genuine timeout-fault proof. Each row maps to a go-test-race case in
  # go/internal/replay/inputtape/fault_collectors_test.go that drives the REAL
  # collector with inputtape.ErrFaultTimeout (the exact value the Replayer serves
  # for a FaultKindTimeout interaction) injected at its HTTP boundary through a
  # faultTransport RoundTripper, and asserts the collector surfaces a classified
  # timeout (not a swallowed error or a hang). The transport reproduces what a
  # recorded timeout-fault tape delivers without depending on request shape or
  # volatile query params, which defeat tape request-key matching. The go-test-race
  # gate runs the inputtape package, so the proof gate executes these tests, and
  # TestCollectorFaultManifestBinding ties each collector surface below to its
  # table case — so the coverage rows are neither a ref-only bulk map nor a stale
  # binding.
