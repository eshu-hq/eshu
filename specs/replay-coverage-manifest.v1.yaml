# Replay coverage manifest (C-1, issue #4173, epic #4172).
#
# This is the curated, reviewable mapping from each supported surface to the
# replay scenario that exercises it. The replay-coverage-gate
# (go/cmd/replay-coverage-gate) enumerates the supported surfaces from the four
# source-of-truth registries — surface-inventory implemented-lane collectors,
# fact-kind-registry read surfaces, parser-backing-ledger parsers, and
# capability-matrix claims — and reports any surface with no entry here as
# UNCOVERED. That uncovered list is the C-2..C-6 backfill worklist.
#
# Surface keys are "<kind>:<name>":
#   collector:<name>          (surface-inventory implemented lane)
#   read_surface:<surface>    (fact-kind-registry read_surface)
#   parser:<name>             (parser-backing-ledger)
#   capability:<id>           (capability-matrix positive claim)
#
# scenario types: cassette | parser_fixture | api_mcp_golden | correlation
#   - cassette / parser_fixture refs are repo-relative paths to the artifact.
#   - api_mcp_golden / correlation refs are B-12 snapshot ids (query-shape key /
#     rc-*).
# proof_gate (REQUIRED on every coverage entry) names the gate that runs the
# scenario and proves it green; this gate only verifies the artifact exists, so a
# coverage entry without a named proof_gate would claim a green nothing verifies.
#
# Seed coverage = only what is genuinely green today: the five implemented-lane
# collectors whose cassettes the golden-corpus-gate already replays. Everything
# else is intentionally uncovered until C-2..C-6 author its scenario.
version: "v1"

coverage:
  - surface: collector:aws
    scenario: cassette
    ref: testdata/cassettes/awscloud/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:oci_registry
    scenario: cassette
    ref: testdata/cassettes/ociregistry/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:package_registry
    scenario: cassette
    ref: testdata/cassettes/packageregistry/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:prometheus_mimir
    scenario: cassette
    ref: testdata/cassettes/prometheusmimir/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:terraform_state
    scenario: cassette
    ref: testdata/cassettes/terraformstate/supply-chain-demo.json
    proof_gate: golden-corpus-gate

  # C-3 (#4175): parser-backing-ledger parsers. Each fixture is an R-7 parser
  # envelope recording (provenance-bearing) produced by the real parser over a
  # package-local, parser-focused tree; the proof gate replays it credential-free
  # and asserts the live parser reproduces it byte-for-byte (catching dropped or
  # mis-attributed facts) and that provenance survives the round trip. proof_gate
  # parserfixture-tests = `cd go && go test ./internal/replay/parserfixture/`.
  - surface: parser:cloudformation
    scenario: parser_fixture
    ref: go/internal/replay/parserfixture/testdata/fixtures/cloudformation.fixture.json
    proof_gate: parserfixture-tests
  - surface: parser:dockerfile
    scenario: parser_fixture
    ref: go/internal/replay/parserfixture/testdata/fixtures/dockerfile.fixture.json
    proof_gate: parserfixture-tests
  - surface: parser:hcl
    scenario: parser_fixture
    ref: go/internal/replay/parserfixture/testdata/fixtures/hcl.fixture.json
    proof_gate: parserfixture-tests
  - surface: parser:yaml
    scenario: parser_fixture
    ref: go/internal/replay/parserfixture/testdata/fixtures/yaml.fixture.json
    proof_gate: parserfixture-tests

# Exemptions: supported surfaces deliberately not required to have a replay
# scenario, each with an auditable reason. Empty at seed time — every gap should
# be burned down by an authored scenario (C-2..C-6), not exempted away. Add an
# entry only when a surface genuinely cannot have a credential-free replay
# scenario, with a reason an operator would accept.
exemptions: []
