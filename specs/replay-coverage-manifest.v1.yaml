# Replay coverage manifest (C-1, issue #4173, epic #4172).
#
# This is the curated, reviewable mapping from each supported surface to the
# replay scenario that exercises it. The replay-coverage-gate
# (go/cmd/replay-coverage-gate) enumerates the supported surfaces from the four
# source-of-truth registries — surface-inventory implemented-lane collectors,
# fact-kind-registry read surfaces, parser-backing-ledger parsers, and
# capability-matrix claims — and reports any surface with no entry here as
# UNCOVERED. That uncovered list is the C-2..C-6 backfill worklist.
#
# Surface keys are "<kind>:<name>":
#   collector:<name>          (surface-inventory implemented lane)
#   read_surface:<surface>    (fact-kind-registry read_surface)
#   parser:<name>             (parser-backing-ledger)
#   capability:<id>           (capability-matrix positive claim)
#
# scenario types: cassette | parser_fixture | api_mcp_golden | correlation
#   - cassette / parser_fixture refs are repo-relative paths to the artifact.
#   - api_mcp_golden / correlation refs are B-12 snapshot ids (query-shape key /
#     rc-*).
# proof_gate (REQUIRED on every coverage entry) names the gate that runs the
# scenario and proves it green; this gate only verifies the artifact exists, so a
# coverage entry without a named proof_gate would claim a green nothing verifies.
#
# Seed coverage = only what is genuinely green today: the five implemented-lane
# collectors whose cassettes the golden-corpus-gate already replays. Everything
# else is intentionally uncovered until C-2..C-6 author its scenario.
version: "v1"

coverage:
  - surface: collector:aws
    scenario: cassette
    ref: testdata/cassettes/awscloud/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:oci_registry
    scenario: cassette
    ref: testdata/cassettes/ociregistry/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:package_registry
    scenario: cassette
    ref: testdata/cassettes/packageregistry/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:prometheus_mimir
    scenario: cassette
    ref: testdata/cassettes/prometheusmimir/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:terraform_state
    scenario: cassette
    ref: testdata/cassettes/terraformstate/supply-chain-demo.json
    proof_gate: golden-corpus-gate

  # C-2 (#4174): implemented-lane collectors backfilled with synthetic
  # supply-chain-demo cassettes (credential-free, matching each collector's real
  # fact schema). The golden-corpus-gate replays them; a wrong fact_kind lands
  # zero facts and fails the gate's collector-source assertion.
  - surface: collector:tempo
    scenario: cassette
    ref: testdata/cassettes/tempo/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:grafana
    scenario: cassette
    ref: testdata/cassettes/grafana/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:loki
    scenario: cassette
    ref: testdata/cassettes/loki/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:security_alert
    scenario: cassette
    ref: testdata/cassettes/securityalerts/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:jira
    scenario: cassette
    ref: testdata/cassettes/jira/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:pagerduty
    scenario: cassette
    ref: testdata/cassettes/pagerduty/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:sbom_attestation
    scenario: cassette
    ref: testdata/cassettes/sbomattestation/supply-chain-demo.json
    proof_gate: golden-corpus-gate
  - surface: collector:vulnerability_intelligence
    scenario: cassette
    ref: testdata/cassettes/vulnerabilityintelligence/supply-chain-demo.json
    proof_gate: golden-corpus-gate

  # C-5 (#4177): fact-kind read surfaces. Each maps to an api_mcp_golden whose ref
  # is the B-12 snapshot query-shape key; the golden-corpus-gate calls the endpoint
  # live against the 20-repo corpus and asserts the response shape (truth, not just
  # schema). HTTP query params, when required, are embedded in the shape key.
  - surface: read_surface:GET /api/v0/cloud/inventory
    scenario: api_mcp_golden
    ref: GET /api/v0/cloud/inventory
    proof_gate: golden-corpus-gate
  - surface: read_surface:GET /api/v0/cloud/resources
    scenario: api_mcp_golden
    ref: GET /api/v0/cloud/resources
    proof_gate: golden-corpus-gate
  - surface: read_surface:GET /api/v0/images
    scenario: api_mcp_golden
    ref: GET /api/v0/images
    proof_gate: golden-corpus-gate
  - surface: read_surface:GET /api/v0/package-registry/packages
    scenario: api_mcp_golden
    ref: GET /api/v0/package-registry/packages?ecosystem=go&limit=50
    proof_gate: golden-corpus-gate
  - surface: read_surface:GET /api/v0/incidents/{incident_id}/context
    scenario: api_mcp_golden
    ref: GET /api/v0/incidents/PSCD1/context
    proof_gate: golden-corpus-gate
  - surface: read_surface:GET /api/v0/work-items/evidence
    scenario: api_mcp_golden
    ref: GET /api/v0/work-items/evidence?limit=50&scope_id=jira:supply-chain-demo:SCD
    proof_gate: golden-corpus-gate
  - surface: read_surface:GET /api/v0/supply-chain/sbom-attestations/attachments
    scenario: api_mcp_golden
    ref: GET /api/v0/supply-chain/sbom-attestations/attachments?limit=50&document_id=scd-sbom
    proof_gate: golden-corpus-gate
  - surface: read_surface:GET /api/v0/supply-chain/impact/findings
    scenario: api_mcp_golden
    ref: GET /api/v0/supply-chain/impact/findings?limit=50&cve_id=CVE-2026-00000
    proof_gate: golden-corpus-gate
  # observability/coverage: the fact-kind registry read_surface was corrected from
  # the unmounted bare path to the real mounted route (.../coverage/correlations)
  # so the surface key and the proven route match (a query-param selector is
  # required).
  - surface: read_surface:GET /api/v0/observability/coverage/correlations
    scenario: api_mcp_golden
    ref: GET /api/v0/observability/coverage/correlations?provider=tempo&limit=50
    proof_gate: golden-corpus-gate
  - surface: read_surface:GET /api/v0/iac/resources
    scenario: api_mcp_golden
    ref: GET /api/v0/iac/resources?limit=50
    proof_gate: golden-corpus-gate
  - surface: read_surface:GET /api/v0/documentation/facts
    scenario: api_mcp_golden
    ref: GET /api/v0/documentation/facts?fact_kind=source
    proof_gate: golden-corpus-gate
  - surface: read_surface:GET /api/v0/secrets-iam/posture-summary
    scenario: api_mcp_golden
    ref: GET /api/v0/secrets-iam/posture-summary?scope_id=supply-chain-demo
    proof_gate: golden-corpus-gate
  - surface: read_surface:GET /api/v0/ci-cd/run-correlations
    scenario: api_mcp_golden
    ref: GET /api/v0/ci-cd/run-correlations?limit=50&scope_id=supply-chain-demo
    proof_gate: golden-corpus-gate
  - surface: read_surface:GET /api/v0/service-catalog/correlations
    scenario: api_mcp_golden
    ref: GET /api/v0/service-catalog/correlations?limit=50&scope_id=supply-chain-demo
    proof_gate: golden-corpus-gate

  # C-3 (#4175): parser-backing-ledger parsers. Each fixture is an R-7 parser
  # envelope recording (provenance-bearing) produced by the real parser over a
  # package-local, parser-focused tree; the proof gate replays it credential-free
  # and asserts the live parser reproduces it byte-for-byte (catching dropped or
  # mis-attributed facts) and that provenance survives the round trip. proof_gate
  # parserfixture-tests = `cd go && go test ./internal/replay/parserfixture/`.
  - surface: parser:cloudformation
    scenario: parser_fixture
    ref: go/internal/replay/parserfixture/testdata/fixtures/cloudformation.fixture.json
    proof_gate: parserfixture-tests
  - surface: parser:dockerfile
    scenario: parser_fixture
    ref: go/internal/replay/parserfixture/testdata/fixtures/dockerfile.fixture.json
    proof_gate: parserfixture-tests
  - surface: parser:hcl
    scenario: parser_fixture
    ref: go/internal/replay/parserfixture/testdata/fixtures/hcl.fixture.json
    proof_gate: parserfixture-tests
  - surface: parser:yaml
    scenario: parser_fixture
    ref: go/internal/replay/parserfixture/testdata/fixtures/yaml.fixture.json
    proof_gate: parserfixture-tests

# Exemptions: supported surfaces deliberately not required to have a replay
# scenario, each with an auditable reason. Empty at seed time — every gap should
# be burned down by an authored scenario (C-2..C-6), not exempted away. Add an
# entry only when a surface genuinely cannot have a credential-free replay
# scenario, with a reason an operator would accept.
exemptions:
  # C-2 (#4174): the four implemented-lane collectors that cannot have a
  # credential-free cassette of the supply-chain-demo kind, each for a structural
  # reason an operator would accept (not "we didn't get to it").
  - surface: collector:git
    reason: >-
      Filesystem-native collector, not a credentialed upstream API. Git is
      already exercised end-to-end by the golden-corpus gate's 20-repo
      bootstrap-index corpus (sync -> discover -> parse -> emit), so a
      supply-chain-demo cassette would re-record a path the gate already
      replays from real fixtures. The fixture corpus is its replay scenario.
  - surface: collector:documentation
    reason: >-
      Offline export library, not a polling collector binary. Documentation
      facts are produced from offline export manifests (go/internal/collector/
      documentationexport), so there is no credentialed upstream to record into
      a cassette; the offline-manifest path is the credential-free input.
  - surface: collector:webhook
    reason: >-
      Inbound webhook sink, not a pollable source. The webhook collector
      verifies and normalizes inbound deliveries into refresh triggers; it never
      polls an upstream, so there is no generation to record into a cassette.
  - surface: collector:scanner_worker
    reason: >-
      Internal hosted worker with no external upstream. scanner-worker consumes
      coordinator work items (image refs, rootfs, SBOM targets) and emits
      analysis facts; it has no credentialed source to record, so a cassette of
      the supply-chain-demo kind does not apply.

  # C-5 (#4177): two fact-kind read surfaces that cannot be asserted by the
  # golden-corpus gate as-is.
  - surface: read_surface:GET /api/v0/semantic-evidence
    reason: >-
      Registry drift: the fact-kind registry declares read_surface
      "GET /api/v0/semantic-evidence", but no such route is mounted — the semantic
      evidence is served by /api/v0/semantic/documentation-observations and
      /api/v0/semantic/code-hints. A golden cannot call a non-existent route.
      Tracked by #4197 to reconcile the registry read_surface with the mounted
      route; exempt until the registry is corrected.
  - surface: read_surface:GET /api/v0/supply-chain/security-alerts/reconciliations
    reason: >-
      Truth-ceiling: the security_alert_reconciliations.list capability is
      unsupported in the golden-corpus gate's local_full_stack query profile (the
      route returns the profile-required refusal, HTTP 404), so the gate cannot
      assert a green response for it. The refusal is correct behavior under the
      capability matrix; covering it would require a profile that enables the
      provider security-alert reconciliation read model.
