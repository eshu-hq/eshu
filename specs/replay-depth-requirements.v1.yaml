# Replay depth-requirement taxonomy (C-13, issue #4366, epic #4172).
#
# C-1 (#4173) proves every supported surface has *a* replay scenario; C-8 (#4187)
# added a scenario_type (depth) dimension but required only one scenario of each
# non-baseline type for the whole system. #4186 (a directory-tombstone deletion
# bug the gate could not see) proves that is not enough: a delete/timeout/crash
# hole can recur for any other piece while the gate still reads 100%.
#
# This file declares the depth-requirement taxonomy the replay-coverage gate uses
# to require scenario_type coverage PER applicable surface. The gate enumerates
# the required surface x scenario_type pairs and reports the missing ones; that
# list is the C-14 (#4367) backfill worklist. Depth requirements are ADVISORY
# first (they never fail the blocking breadth gate) until C-14 burns them down.
#
# Most applicability classes are DERIVED in code from already-loaded registries
# and are NOT listed here:
#   - fault     -> every implemented collector boundary (surface-inventory).
#   - cost      -> every projection = distinct reducer_domain (fact-kind registry).
#   - ordering  -> every shared-conflict-key projection = a reducer_domain written
#                  by >=2 distinct projection hooks (fact-kind registry).
# Only the classes that have no machine-readable registry of their own are
# declared here:
#   - delta_tombstone -> every retractable graph node type (below).
#   - delta_tombstone -> every retractable graph edge type (below).
#   - crash           -> the reducer projection drain (below).
#
# retractable_node_types MUST stay byte-equal to the canonical retract phase's
# label set (internal/storage/cypher.RetractableNodeEntityLabels()); a lockstep
# test fails when they drift, so adding a retractable label there makes the gate
# demand a new delta scenario here instead of the gap going unseen.
#
# retractable_edge_types MUST stay byte-equal to the static canonical and reducer
# edge retract path's relationship type set
# (internal/storage/cypher.RetractableEdgeTypes()); a lockstep test fails when
# they drift, so adding a retractable relationship type makes the gate demand a
# delta scenario here instead of the gap going unseen.
version: "v1"

