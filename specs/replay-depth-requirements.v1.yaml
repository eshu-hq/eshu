# The single reducer projection drain path. A mid-run crash must recover
# deterministically (R-14, deterministic replay design 11). The crash scenario is
# the crashreplay package (go/internal/replay/crashreplay).
reducer_drain:
  surface: reducer-projection-drain
  detail: >-
    The reducer projection drain claims queued projection work, applies it, and
    must recover deterministically when a worker crashes mid-run (R-14). One
    crash scenario covers the drain.

# Depth surfaces deliberately not required to have a replay scenario, each with an
# auditable reason. Every depth gap should be burned down by an authored scenario
# (C-14), not exempted away. Add an entry only when a surface genuinely has nothing
# for the required axis to bound.
exemptions:
  - surface: projection:config_state_drift
    scenario_type: cost
    reason: >-
      config_state_drift (the terraform_state fact family, projection_hook
      terraform_relationship_projection) has no reducer-level write instrument
      for the cost axis to bound. Its sole reducer handler,
      TerraformConfigStateDriftHandler.Handle
      (go/internal/reducer/terraform_config_state_drift.go), has no Writer field
      and performs zero Postgres or graph writes -- it only increments bounded
      OTel counters (CorrelationRuleMatches, CorrelationDriftDetected) and emits
      structured logs. This is explicit design intent:
      registry_additive_domains.go sets Ownership{CanonicalWrite: false,
      CounterEmit: true} with "Graph projection follows per design doc §10" -- a
      future, not-yet-implemented write path. The only Postgres access near this
      domain (storage/postgres/drift_enqueue.go) is a QueryContext read that
      enqueues intents, not a domain-output write. Remove this exemption when the
      graph-projection write path lands and add a cost scenario for it.
  - surface: retractable_node:TerraformStateResource
    scenario_type: delta_tombstone
    reason: >-
      TerraformStateResource retraction is unconditionally skipped on a delta
      cycle: terraformStateResourceRetractStatements
      (go/internal/storage/cypher/tfstate_canonical_writer_retract.go) returns
      nil whenever mat.DeltaProjection is true, before building any retract
      statement. A tfstate resource has no file-path scope this writer can use
      to build a delta-scoped retract the way file- and entity-scoped
      retraction do, and a delta materialization carries no positive list of
      untouched backends to safely exclude from a scoped delete -- so a
      delta_tombstone scenario for this node type is not an authored-scenario
      gap (C-14) but a structural impossibility: no input can ever reach the
      retract statement on a delta cycle for this label. Genuine deletions are
      still caught by the periodic full reconciliation generation
      (mat.ReconciliationProjection forces DeltaProjection=false; see
      internal/projector/canonical_builder.go), the same mechanism
      buildRepositoryCleanupStatements already relies on for repository-node
      cleanup, within the reconcile interval. A prior manifest row
      (specs/replay-coverage-manifest.v1.yaml) claimed cassette coverage of
      this exact surface/scenario_type via
      testdata/cassettes/replaydelta/multi-generation-tombstone.json; that
      cassette contains zero TerraformStateResource references, so the row
      was removed as a false coverage claim rather than an accurate one.
      Remove this exemption only if a future change adds a delta-scoped
      retract path for TerraformStateResource (e.g. by threading a
      backend-scoped exclusion list through the delta materialization).
