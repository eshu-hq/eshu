    collector_contract:
      fact_kinds: [documentation_claim_candidate, documentation_document, documentation_entity_mention, documentation_evidence_packet, documentation_finding, documentation_link, documentation_section, documentation_source, service_catalog.api_link, service_catalog.dependency, service_catalog.entity, service_catalog.operational_link, service_catalog.ownership, service_catalog.repository_link, service_catalog.scorecard_definition, service_catalog.scorecard_result, service_catalog.warning]
