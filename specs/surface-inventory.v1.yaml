# Surface inventory editorial overlay.
#
# The surface inventory (go/internal/capabilitycatalog/data/surface-inventory.generated.json)
# is GENERATED from live code, specs, and the source tree by
# `go run ./cmd/capability-inventory -mode generate`. This file carries only the
# editorial metadata that cannot be derived from code: the readiness lane, owner,
# promotion proof, docs, notes, and collector source-to-read-surface contract for
# surfaces whose lane is not the category default (implemented). Collectors MUST
# be classified here — an unclassified collector fails the drift gate so a new
# collector cannot silently claim a lane.
#
# Readiness lanes: implemented | partial | gated | foundation_only | fixture_only
#   | research_only | not_implemented | unsupported
# Only `implemented` asserts production readiness, so an implemented collector
# MUST link promotion proof. Collector contracts distinguish deterministic,
# provider-gated, and optional semantic output so no-provider behavior stays
# explicit.
version: v1
surfaces:
  # --- Implemented collector lanes (deployed, charted where applicable, provable
  #     end to end). See collector-reducer-readiness.md "Implemented Collector
  #     Lanes" and "Promotion Proof". ---
