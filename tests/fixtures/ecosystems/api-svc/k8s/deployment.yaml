apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-svc
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-svc
  template:
    metadata:
      labels:
        app: api-svc
    spec:
      containers:
        - name: api-svc
          image: ghcr.io/acme/api-svc:1.0.0
          ports:
            - containerPort: 8080
