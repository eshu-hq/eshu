apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployable-source
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deployable-source
  template:
    metadata:
      labels:
        app: deployable-source
    spec:
      containers:
        - name: app
          image: ghcr.io/eshu-hq/supply-chain-demo@sha256:abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890ab
          ports:
            - containerPort: 8080
