apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-bucket
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/production/apps-bucket
  prune: true
  sourceRef:
    kind: Bucket
    name: flux-artifacts
    namespace: flux-system
  targetNamespace: production
