apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo-cross-namespace
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: podinfo
      sourceRef:
        kind: HelmRepository
        name: podinfo
        # Declares a namespace no HelmRepository candidate in this fixture
        # repo carries. A declared-namespace mismatch is not an
        # absent-namespace case, so the edge resolver skips this honestly
        # rather than falling through to a false join.
        namespace: other-namespace
