apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-oci
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/production/apps-oci
  prune: true
  sourceRef:
    kind: OCIRepository
    name: app-manifests
    namespace: flux-system
  targetNamespace: production
