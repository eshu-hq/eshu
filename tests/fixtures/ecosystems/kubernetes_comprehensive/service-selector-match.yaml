apiVersion: v1
kind: Service
metadata:
  name: edge-router
  namespace: production
spec:
  selector:
    app: edge
    tier: gateway
  ports:
    - port: 443
      targetPort: 8443
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-workers
  namespace: production
  labels:
    app: edge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: edge
      tier: gateway
  template:
    metadata:
      labels:
        app: edge
        tier: gateway
        region: us
    spec:
      containers:
        - name: gateway
          image: myorg/gateway:v1.0.0
